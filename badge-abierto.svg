<svg xmlns="http://www.w3.org/2000/svg" width="220" height="34" viewBox="0 0 220 34">
  <defs>
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- fondo pill -->
  <rect width="220" height="34" rx="17" fill="rgba(15,180,80,0.14)" stroke="rgba(15,200,80,0.32)" stroke-width="1.2"/>
  <!-- dot pulsante -->
  <circle cx="20" cy="17" r="6" fill="rgba(74,222,128,0.2)" filter="url(#glow)"/>
  <circle cx="20" cy="17" r="4" fill="#4ade80"/>
  <!-- texto -->
  <text x="34" y="22" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12.5" font-weight="800" fill="#4ade80" letter-spacing="0.2">Abierto · Delivery disponible</text>
</svg>
