
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>🍕 La Pizzería</title>
<meta property="og:title" content="🍕 La Pizzería"/>
<meta property="og:description" content="🍕 Menú digital · Delivery y pedidos en mesa. Pizzas artesanales, bebidas y más. ¡Pedí por WhatsApp!"/>
<meta property="og:image" content="og-image.png"/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#0f0a08"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0a08;color:#fff;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;overscroll-behavior:none;background-image:radial-gradient(ellipse 120% 60% at 50% 0%,rgba(255,80,20,.06) 0%,transparent 70%),radial-gradient(ellipse 80% 40% at 50% 100%,rgba(255,122,0,.04) 0%,transparent 60%)}
button,a,[role=button]{touch-action:manipulation}

/* ── HEADER ── */
header{background:rgba(15,10,8,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:6px 14px 8px;position:sticky;top:0;z-index:99;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 1px 0 rgba(255,255,255,.04)}
.hrow{display:flex;align-items:center;justify-content:space-between;max-width:720px;margin:0 auto 5px;padding-top:max(22px,env(safe-area-inset-top))}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{height:38px;width:38px;border-radius:50%;object-fit:cover}
.htxt h1{font-size:18px;font-weight:900;line-height:1.1}
.htxt small{display:none}
#hcart-btn{margin-top:6px}
.hsubtitle{font-size:10px;opacity:0.6;padding:0 14px 6px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:720px;margin:0 auto;letter-spacing:0.15px}

/* ── BUTTONS ── */
.btnall{border:none;border-radius:10px;padding:0 14px;height:44px;color:#fff;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:filter .2s,box-shadow .2s}
.btnall:active{filter:brightness(.85)}
.btn-lista{background:transparent;box-shadow:none}
.btncart{background:#25D366;box-shadow:0 2px 6px rgba(37,211,102,.3);position:relative;min-width:90px}
.btncart:hover{box-shadow:0 4px 12px rgba(37,211,102,.5)}
.btncart.has-items{box-shadow:0 0 10px rgba(37,211,102,.6),0 2px 6px rgba(37,211,102,.4)}
@keyframes hcartswing{0%{transform:rotate(0deg)}25%{transform:rotate(-18deg)}50%{transform:rotate(14deg)}75%{transform:rotate(-8deg)}100%{transform:rotate(0deg)}}
@keyframes hcartflash{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes badgebounce{0%{transform:scale(0.5)}60%{transform:scale(1.35)}80%{transform:scale(0.9)}100%{transform:scale(1)}}
.hcart-pulse{animation:hcartswing .4s cubic-bezier(.36,.07,.19,.97),hcartflash .4s ease;transform-origin:top center}
.badge-bounce{animation:badgebounce .35s cubic-bezier(.36,.07,.19,.97)}
#hcart-btn.empty svg{stroke:#f5ede4}
#hcart-btn.has-items svg{stroke:#ff7a00}
@keyframes cartnum{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.cart-num-pop{animation:cartnum .25s ease}

/* ── NAV TABS ── */
.navtabs{width:100%;background:rgba(15,10,8,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:0 0 env(safe-area-inset-bottom);display:flex;position:fixed;bottom:0;left:0;z-index:98;height:calc(64px + env(safe-area-inset-bottom));box-shadow:0 -1px 0 rgba(255,255,255,.04)}
.navtab{flex:1;border:none;background:transparent;color:#555;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;transition:color .2s}
.navtab.on{color:#D62828}
.navtab.off{color:#555}
.navtab svg{width:26px;height:26px}
.navtab span{font-size:10px;font-weight:700;letter-spacing:.3px}
#tab-juegos.on .pizza-fill{display:block}
#tab-juegos.on .pizza-outline{display:none}
#tab-juegos.off .pizza-fill{display:none}
#tab-juegos.off .pizza-outline{display:block}
#tab-bebidas.on .bebidas-fill{display:block}
#tab-bebidas.on .bebidas-outline{display:none}
#tab-bebidas.off .bebidas-fill{display:none}
#tab-bebidas.off .bebidas-outline{display:block}
#tab-mercado.on  .mercado-off{display:none}
#tab-mercado.off .mercado-on{display:none}
#tab-mercado.on  .mercado-on{fill:#e6392e}
#tab-mercado.off .mercado-off{fill:#F5EDE4}
@keyframes springback{0%{transform:scale(.82)}60%{transform:scale(1.18)}80%{transform:scale(.95)}100%{transform:scale(1)}}
.navtab-spring svg,.navtab-spring img{animation:springback .35s cubic-bezier(.36,.07,.19,.97) forwards}

/* ── SEARCH ── */
.swrap{max-width:720px;margin:0 auto}
#si{width:100%;padding:11px 44px 11px 20px;border-radius:50px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:16px;outline:none;transition:border-color .25s,box-shadow .25s}
#si:focus{border-color:rgba(216,40,40,.8);box-shadow:0 0 0 2px rgba(216,40,40,.15),0 0 12px rgba(216,40,40,.2)}
#si::placeholder{color:rgba(255,255,255,.35)}

/* ── MAIN BODY ── */
.body{max-width:720px;margin:0 auto;padding:13px 11px calc(80px + env(safe-area-inset-bottom))}

/* ── GENRE BAR ── */
.gbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:11px;scrollbar-width:none;position:sticky;top:var(--header-h,0px);z-index:97;background:rgba(15,10,8,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding-top:8px;margin-left:-11px;margin-right:-11px;padding-left:11px;padding-right:11px}
.gbar::-webkit-scrollbar{display:none}
.gb{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:#1a1208;color:#fff;font-weight:600;cursor:pointer;font-size:11px;transition:background .15s;overflow:hidden;-webkit-tap-highlight-color:transparent}
.gb.on{background:#D62828;border-color:#D62828}

/* ── SORT / TBAR ── */
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.cnt{font-size:12px;color:#555}
.vista-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#777;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.vista-btn svg{width:15px;height:15px;fill:currentColor;pointer-events:none}
.vista-btn.on{background:rgba(214,40,40,.18);border-color:#D62828;color:#D62828;box-shadow:0 0 10px rgba(214,40,40,.2)}

/* ── GRID CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:10px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;background:linear-gradient(145deg,#1a1208,#140e04);box-shadow:0 4px 20px rgba(0,0,0,.65),0 0 0 1px var(--gcol-border,rgba(255,255,255,.06)),0 0 10px var(--gcol-glow-soft,transparent);border:1px solid var(--gcol-border,rgba(255,255,255,.06));transition:transform .18s,box-shadow .18s,border-color .18s;-webkit-tap-highlight-color:transparent;user-select:none;animation:fadeInUp .2s ease both}
.cimg{position:relative;padding-top:140%;overflow:hidden}
.cimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fall{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.fall img{width:55%;opacity:.65}
.fall p{font-size:10px;color:#bbb;margin-top:7px;font-weight:700;line-height:1.3}
.bg{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);padding:3px 8px;border-radius:18px;font-size:9px;font-weight:700}
.bg.con-ribbon{top:auto;bottom:7px}
.bp{position:absolute;top:7px;right:7px;background:#D62828;padding:3px 8px;border-radius:18px;font-size:10px;font-weight:900}
.ov{position:absolute;inset:0;background:rgba(0,0,0,.91);padding:11px;display:flex;flex-direction:column;justify-content:center;gap:5px;opacity:0;transition:opacity .22s;pointer-events:none}
.ov.on{opacity:1}
.ovt{font-size:12px;font-weight:800;line-height:1.3}
.ovd{font-size:10px;color:#aaa}
.ovs{color:#FFD700;font-size:12px}
.cfoot{padding:8px 8px 0}
.ctit{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:6px;min-height:28px}
.csize{font-size:12px;font-weight:500;color:#9CA3AF;margin-bottom:8px;margin-top:2px}
.cbtns{display:flex;gap:5px;padding-bottom:8px}
.bped{flex:1;background:#D62828;border:none;border-radius:7px;padding:7px 3px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s}
.bped:active,.bped.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.bcom{flex:1;background:transparent;border:1.5px solid rgba(232,160,32,.6);border-radius:7px;padding:7px 3px;color:#E8A020;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,border-color .15s,background .15s}
.bcom:active,.bcom.tap{transform:scale(.94);background:rgba(232,160,32,.1)}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#444}
.empty p{font-size:15px;margin-top:10px}

/* ── RIBBONS ── */
.ribbon-wrap{position:absolute;top:0;left:0;width:72px;height:72px;overflow:hidden;z-index:5;pointer-events:none}
.ribbon{position:absolute;top:14px;left:-22px;width:96px;padding:5px 0;text-align:center;transform:rotate(-45deg);font-size:8px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ribbon-estreno{background:linear-gradient(135deg,#7b2ff7,#f107a3)}
.ribbon-oferta{background:linear-gradient(135deg,#ff6a00,#ee0979)}
.ribbon-nuevo{background:linear-gradient(135deg,#00b09b,#96c93d)}

/* ── BEBIDAS SECTION ── */
.con-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-top:4px}
.con-card{background:#1a1208;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 18px rgba(0,0,0,.55);transition:transform .18s;-webkit-tap-highlight-color:transparent;user-select:none}
.con-card:hover{transform:translateY(-3px)}
.con-img{position:relative;z-index:1;width:100%;height:148px;object-fit:contain;object-position:center;display:block}
.con-img-fall{height:148px;display:flex;align-items:center;justify-content:center;background:#0f0807;font-size:36px}
.con-info{padding:8px}
.con-name{font-size:12px;font-weight:900;margin-bottom:3px;line-height:1.3}
.con-price{font-size:13px;font-weight:900;color:#E8A020;margin-bottom:0}
.con-specs{font-size:10px;color:#888;margin-top:3px}
.con-desc{font-size:10px;color:#aaa;margin-top:2px;font-style:italic;line-height:1.3}
.con-btns,.con-stock-si,.con-stock-no{display:none}
.con-loading{text-align:center;padding:40px;color:#555;font-size:14px}

/* ── WRAPPER DE IMAGEN BEBIDA / MERCADO ── */
.con-img-wrap{position:relative;display:block;background-size:cover;background-position:center;overflow:hidden}
.con-img-wrap::before{content:'';position:absolute;inset:-8px;background:inherit;filter:blur(14px) brightness(.35);transform:scale(1.08)}

/* ── MERCADO: FILTROS DE CATEGORÍA ── */
.mcat-row{display:flex;gap:8px;padding:12px 12px 8px;overflow-x:auto;scrollbar-width:none}
.mcat-row::-webkit-scrollbar{display:none}
.mcat-btn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#ccc;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s,color .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.mcat-btn.active{background:#E8A020;color:#000;border-color:#E8A020}
/* ── BUSCADOR MERCADO ── */
.mercado-search-wrap{padding:14px 14px 6px}
.mercado-search-wrap>div{position:relative}
.mercado-search-wrap input{width:100%;box-sizing:border-box;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 42px 10px 16px;color:#fff;font-size:16px;outline:none;-webkit-appearance:none;font-family:inherit}
.mercado-search-wrap input::placeholder{color:#777}
.mercado-search-wrap input:focus{border-color:#E8A020;background:rgba(232,160,32,.07)}
.mercado-search-wrap input::-webkit-search-cancel-button{-webkit-appearance:none}
.mercado-search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;pointer-events:none;transition:opacity .2s}
.mercado-search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;cursor:pointer;color:#E8A020;display:none;background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.3);border-radius:50%;width:28px;height:28px;align-items:center;justify-content:center;line-height:1;transition:all .2s}
#mercado-no-results{text-align:center;padding:48px 20px 80px;color:#777;font-size:15px;display:none}
#mercado-no-results .nores-icon{display:flex;justify-content:center;margin-bottom:14px;opacity:.35}
.mcat-badge{position:absolute;top:8px;left:8px;z-index:9;background:rgba(0,0,0,.72);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:800;color:#E8A020;letter-spacing:.3px;pointer-events:none}
.con-bebida-cart-btn{position:absolute;bottom:8px;right:8px;z-index:8;background:#D62828;border:none;border-radius:50%;width:34px;height:34px;color:#fff;font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.55);transition:background .18s,transform .12s;-webkit-tap-highlight-color:transparent}
.con-bebida-cart-btn:active{transform:scale(.84)}
.con-bebida-cart-btn.in-cart{background:#25D366}
.con-bebida-cart-btn:disabled{background:#444;cursor:not-allowed;opacity:.5}

/* ── FAB CARRITO ── */
#cart-fab{position:fixed;top:auto;left:auto;bottom:calc(90px + env(safe-area-inset-bottom));right:20px;width:56px;height:56px;background:linear-gradient(135deg,#E8A020 0%,#c05c0a 100%);border:none;border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(232,160,32,.55),0 2px 8px rgba(0,0,0,.45);cursor:grab;z-index:200;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;will-change:transform}
#cart-fab:active{cursor:grabbing;box-shadow:0 2px 12px rgba(232,160,32,.4),0 1px 4px rgba(0,0,0,.4)}
#cart-fab svg{width:26px;height:26px;fill:#fff;stroke:none}
#cart-badge{position:absolute;top:-4px;right:-4px;background:#1a1a1a;color:#E8A020;font-size:11px;font-weight:900;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #E8A020}
@keyframes fabIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fabShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fab-shake{animation:fabShake .3s ease}

/* ── GAME / PIZZA SHEET ── */
.game-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.game-sheet-overlay.on{opacity:1;pointer-events:all}
.game-sheet{position:fixed;bottom:0;left:0;width:100%;max-height:85vh;background:rgba(15,10,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:24px 24px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto}
.game-sheet.on{transform:translateY(0)}
.game-sheet-img{width:100%;height:400px;object-fit:cover;flex-shrink:0}
.game-sheet-img-fall{width:100%;height:400px;display:flex;align-items:center;justify-content:center;font-size:72px}
.gs-carousel{width:100%;height:180px;position:relative;overflow:hidden;border-radius:10px;margin-top:8px}
.gs-carousel-track{display:flex;height:100%;width:100%;will-change:transform;transition:transform .35s cubic-bezier(.32,.72,0,1)}
.gs-carousel-slide{width:100%;min-width:100%;height:100%;flex-shrink:0;overflow:hidden}
.gs-carousel-slide img{width:100%;height:100%;object-fit:cover;display:block}
.gs-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px}
.gs-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .2s,transform .2s}
.gs-dot.on{background:#fff;transform:scale(1.3)}
.img-viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;overflow:auto;-webkit-overflow-scrolling:touch}
.img-viewer-overlay.on{opacity:1;pointer-events:all}
.img-viewer-overlay img{max-width:100%;max-height:100vh;object-fit:contain;display:block;margin:auto;min-height:100vh}
.game-sheet-body{padding:20px;overflow-y:auto}
.game-sheet-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:8px}
.game-sheet-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.game-sheet-genre{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.game-sheet-stars{color:#FFD700;font-size:15px}
.game-sheet-price{font-size:22px;font-weight:900;color:#D62828;margin-bottom:14px}
.game-sheet-desc{font-size:14px;color:#ccc;line-height:1.7;margin-bottom:22px}
.game-sheet-btns{display:flex;gap:10px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.gs-btn-cart{flex:1;background:#D62828;border:none;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;transition:background .2s,transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent}
.gs-btn-cart:active,.gs-btn-cart.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.gs-btn-cart.added{background:#25D366}
.rating-widget{margin:16px 0 4px;padding:14px 14px 12px;background:rgba(255,255,255,.06);border-radius:14px}
.rating-widget-label{font-size:10px;font-weight:900;color:#888;letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.rating-stars-row{display:flex;gap:4px}
.gs-star-btn{font-size:32px;background:none;border:none;padding:2px 3px;cursor:pointer;color:#3a3a3a;line-height:1;transition:color .12s,transform .1s;-webkit-tap-highlight-color:transparent}
.gs-star-btn:active{transform:scale(1.25)}
.gs-star-btn.lit{color:#FFD700}
.rating-msg{font-size:12px;color:#888;margin-top:8px;min-height:18px;line-height:1.4}
.rating-avg-row{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
.rating-avg-stars{color:#FFD700;font-size:15px;letter-spacing:1px}
.rating-avg-num{font-size:14px;font-weight:900;color:#fff}
.rating-avg-count{font-size:11px;color:#888}
.rating-comment{width:100%;margin-top:12px;padding:10px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:13px;font-family:inherit;resize:none;outline:none;transition:border-color .2s}
.rating-comment::placeholder{color:#666}
.rating-comment:focus{border-color:rgba(255,107,0,.5)}
.rating-submit-btn{margin-top:10px;width:100%;padding:11px;background:#D62828;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;transition:background .2s;-webkit-tap-highlight-color:transparent}
.rating-submit-btn:active{background:#b01f1f}
.rating-avg-row{cursor:pointer}
.rating-avg-row:hover .rating-avg-count{color:#FF8C42}

/* ── MODAL RESEÑAS ── */
.rev-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1100;backdrop-filter:blur(4px)}
.rev-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1208;border-radius:20px 20px 0 0;z-index:1101;max-width:500px;margin:0 auto;max-height:88vh;overflow:hidden;display:none;flex-direction:column;box-shadow:0 -8px 50px rgba(0,0,0,.9)}
.rev-panel.open{display:flex}
.rev-handle{width:36px;height:4px;background:#444;border-radius:2px;margin:14px auto 0;flex-shrink:0}
.rev-header{padding:16px 20px 0;flex-shrink:0}
.rev-product-name{font-size:15px;font-weight:900;color:#fff;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rev-summary{display:flex;gap:20px;align-items:center;margin-bottom:16px}
.rev-big-num{font-size:52px;font-weight:900;color:#fff;line-height:1}
.rev-big-stars{display:flex;flex-direction:column;gap:2px}
.rev-big-star-row{color:#FFD700;font-size:18px;letter-spacing:2px}
.rev-big-total{font-size:11px;color:#888;margin-top:4px}
.rev-bars{flex:1;display:flex;flex-direction:column;gap:5px}
.rev-bar-row{display:flex;align-items:center;gap:6px;font-size:10px;color:#aaa;white-space:nowrap}
.rev-bar-track{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.rev-bar-fill{height:100%;background:#FFD700;border-radius:4px;transition:width .4s ease}
.rev-bar-count{width:20px;text-align:right;color:#666;font-size:10px}
.rev-divider{height:1px;background:rgba(255,255,255,.08);margin:0 20px}
.rev-body{overflow-y:auto;flex:1;padding:14px 20px max(24px,calc(env(safe-area-inset-bottom) + 14px))}
.rev-no-comments{text-align:center;color:#555;font-size:13px;padding:20px 0}
.rev-comment{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.rev-comment:last-of-type{border-bottom:none}
.rev-comment-stars{color:#FFD700;font-size:12px;letter-spacing:1px;margin-bottom:4px}
.rev-comment-text{font-size:13px;color:#ddd;line-height:1.5}
.rev-comment-date{font-size:10px;color:#555;margin-top:4px}
.rev-load-more{width:100%;padding:11px;margin-top:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#ccc;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rev-load-more:active{background:rgba(255,255,255,.12)}
.rev-loading{text-align:center;color:#666;font-size:12px;padding:12px}
.rev-write-btn{width:100%;padding:11px;margin-top:10px;background:#D62828;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0}

/* ── SIZE SELECTOR ── */
.size-btn{padding:8px 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#ccc;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;white-space:nowrap}
.size-btn.on{background:#D62828;border-color:#D62828;color:#fff}

/* ── CART SHEET ── */
.cart-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-sheet-overlay.on{opacity:1;pointer-events:all}
.cart-sheet{position:fixed;bottom:0;left:0;width:100%;max-height:85vh;background:rgba(15,10,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:24px 24px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding:20px 20px calc(20px + env(safe-area-inset-bottom))}
.cart-sheet.on{transform:translateY(0)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f0a08;border-radius:10px;margin-bottom:8px}

/* ── ORDER TYPE ── */
.otype-btn{flex:1;padding:8px 4px 7px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#777;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.2}
.otype-btn.on{background:#D62828;border-color:#D62828;color:#fff}
.otype-btn:disabled{opacity:.38;cursor:not-allowed;border-style:dashed}
.otype-btn:disabled.on{background:rgba(214,40,40,.2);border-color:rgba(214,40,40,.3);color:#D62828}
.otype-hint{font-size:9px;font-weight:600;letter-spacing:0;opacity:.75;display:none;line-height:1.1}
.otype-btn:disabled .otype-hint{display:block}
#otype-alert{font-size:11px;color:#E8A020;background:rgba(232,160,32,.08);border:1px solid rgba(232,160,32,.15);border-radius:8px;padding:8px 10px;margin-top:8px;text-align:center;display:none;line-height:1.5}
/* ── HERO STATUS BADGE ── */
.hero-status{position:absolute;top:14px;left:14px;z-index:10;display:flex;align-items:center;gap:7px;padding:6px 13px 6px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);pointer-events:none}
.hero-status.full{background:rgba(10,180,70,.15);border:1px solid rgba(10,180,70,.3);color:#4ade80}
.hero-status.parcial{background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.3);color:#E8A020}
.hero-status.cerrado{background:rgba(15,10,8,.72);border:1px solid rgba(255,255,255,.1);color:#999}
.hero-sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.full .hero-sdot{background:#4ade80;box-shadow:0 0 7px rgba(74,222,128,.8)}
.parcial .hero-sdot{background:#E8A020;box-shadow:0 0 6px rgba(232,160,32,.7)}
.cerrado .hero-sdot{background:#666}

/* ── GB NEW (Recién agregadas) ── */
@keyframes shine{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes borderflow{0%,100%{border-color:#E8A020}50%{border-color:#ffcc55}}
.gb-new{animation:shine 2.5s linear infinite,borderflow 2s ease-in-out infinite;border-color:#E8A020 !important;color:#E8A020 !important;border-radius:30px !important;padding:6px 16px !important;background:linear-gradient(90deg,#1a1208 30%,#E8A02020 50%,#1a1208 70%) !important;background-size:200% auto !important;box-shadow:0 0 8px rgba(232,160,32,.3),3px 3px 6px rgba(0,0,0,.5) !important;font-weight:800 !important;overflow:hidden !important;-webkit-tap-highlight-color:transparent !important}
.gb-new.on{background:linear-gradient(145deg,#E8A020,#c47a00) !important;color:#fff !important;animation:none !important;box-shadow:inset 2px 2px 5px rgba(0,0,0,.3) !important}

/* ── FEATURED BANNER ── */
#featured-banner-wrap,#featured-banner-wrap *{-webkit-tap-highlight-color:transparent}
#featured-banner-wrap:focus,#featured-banner-wrap:active,#featured-banner-wrap *:focus,#featured-banner-wrap *:active{outline:none}
.fb-arrows{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:3}
.fb-arrow{pointer-events:auto;width:30px;height:30px;margin:0 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.30);backdrop-filter:blur(6px);color:#fff;font-size:16px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fb-arrow:active{transform:scale(.92)}
.fb-dots-viewport{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:60px;overflow:hidden;pointer-events:none;z-index:3}
.fb-dots-track{display:flex;gap:6px;transition:transform .35s ease}
.fb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.fb-dot.center{background:#fff;transform:scale(1.4)}

/* ── MISC ── */
footer{text-align:center;padding:20px;color:#1e1e2e;font-size:11px;margin-top:8px}
@media(min-width:768px){.body{max-width:100%;padding:16px 30px}.swrap{max-width:100%}.hrow{max-width:100%}}

/* ══════════════════════════════════════════════
   HERO SECTION
══════════════════════════════════════════════ */
.hero{margin:-13px -11px 0;width:calc(100% + 22px);position:relative;height:74vh;min-height:360px;max-height:600px;overflow:hidden;background:#0f0a08}
.hero-track{display:flex;height:100%;will-change:transform}
.hero-slide{min-width:100%;height:100%;position:relative;flex-shrink:0;transition:opacity .05s}
.hero-slide img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.hero-slide-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(15,10,8,.15) 0%,rgba(15,10,8,.45) 45%,rgba(15,10,8,.95) 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:22px 20px 30px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(214,40,40,.9);backdrop-filter:blur(6px);color:#fff;font-size:9px;font-weight:900;letter-spacing:1.8px;text-transform:uppercase;padding:5px 11px;border-radius:20px;margin-bottom:10px}
.hero-title{font-size:clamp(22px,6vw,32px);font-weight:900;line-height:1.13;margin-bottom:7px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.hero-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:20px;line-height:1.5}
.hero-actions{display:flex;align-items:center;gap:12px}
.hero-btn{display:inline-flex;align-items:center;gap:7px;background:#D62828;color:#fff;font-size:13px;font-weight:900;border:none;border-radius:50px;padding:12px 22px;cursor:pointer;box-shadow:0 4px 22px rgba(214,40,40,.55);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.hero-btn:active{transform:scale(.95);box-shadow:0 2px 10px rgba(214,40,40,.4)}
.hero-dots{display:flex;gap:5px;align-items:center}
.hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .3s,width .3s,border-radius .3s}
.hero-dot.on{background:#fff;width:16px;border-radius:3px}
@keyframes heroKenBurns{0%{transform:scale(1)}100%{transform:scale(1.06)}}
.hero-slide.active img{animation:heroKenBurns 6s ease forwards}

/* ══════════════════════════════════════════════
   CATEGORY CAROUSEL ROWS
══════════════════════════════════════════════ */
.carousel-section{margin-top:22px}
.cat-row{margin-bottom:28px}
.cat-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;padding:0 2px}
.cat-row-title{font-size:16px;font-weight:900;color:#fff;display:flex;align-items:center;gap:7px}
.cat-row-title-dot{width:7px;height:7px;border-radius:50%;background:#D62828;flex-shrink:0}
.cat-row-link{font-size:11px;font-weight:700;color:#D62828;display:flex;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;opacity:.9}
.cat-scroll{display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:6px}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll.is-dragging{cursor:grabbing;scroll-snap-type:none;user-select:none}

/* ── EFECTO CALOR EN CARDS ── */
.cc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(255,90,0,.13) 0%,transparent 100%);pointer-events:none;border-radius:0 0 16px 16px;z-index:1}
.cc-body{position:relative;z-index:2}
.cc-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,rgba(255,70,0,.22) 0%,transparent 100%);pointer-events:none;z-index:2}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(255,80,0,.1) 0%,transparent 100%);pointer-events:none;z-index:1;border-radius:0 0 14px 14px}
.card{position:relative}

/* ── BADGE FUEGO ── */
.fire-badge{position:absolute;top:8px;left:8px;font-size:13px;z-index:6;filter:drop-shadow(0 0 4px rgba(255,120,0,.8));animation:firePulse 2s ease-in-out infinite}
@keyframes firePulse{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.15) rotate(3deg)}}

/* ── ANIMACIÓN AGREGAR AL CARRITO ── */
@keyframes cartPop{0%{transform:scale(1)}30%{transform:scale(1.18)}60%{transform:scale(.93)}80%{transform:scale(1.07)}100%{transform:scale(1)}}
@keyframes addFlash{0%,100%{box-shadow:0 2px 6px rgba(37,211,102,.3)}50%{box-shadow:0 0 20px rgba(37,211,102,.7),0 0 40px rgba(37,211,102,.3)}}
.cart-add-pop{animation:cartPop .35s cubic-bezier(.36,.07,.19,.97)}
.cart-add-flash{animation:addFlash .6s ease}

/* ── CAROUSEL CARDS ── */
.cc{flex-shrink:0;border-radius:16px;overflow:hidden;cursor:pointer;background:linear-gradient(145deg,#1e1508,#140e04);border:1px solid var(--cc-border,rgba(255,255,255,.08));box-shadow:0 4px 22px rgba(0,0,0,.65),0 0 12px var(--cc-glow,transparent);transition:transform .18s ease,box-shadow .18s ease;-webkit-tap-highlight-color:transparent;user-select:none;scroll-snap-align:start;animation:fadeInUp .22s ease both;position:relative}
.cc:hover{transform:translateY(-4px) scale(1.025);box-shadow:0 10px 32px rgba(0,0,0,.75),0 0 16px var(--cc-glow,transparent)}
.cc:active{transform:scale(.97)}
.cc.feat{width:195px}
.cc.std{width:148px}
.cc-img{position:relative;overflow:hidden}
.cc.feat .cc-img{height:216px}
.cc.std .cc-img{height:155px}
.cc-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .32s ease}
.cc:hover .cc-img img{transform:scale(1.07) brightness(1.05)}
.cc-img-fall{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:46px}
.cc-ribbon-wrap{position:absolute;top:0;left:0;width:66px;height:66px;overflow:hidden;z-index:5;pointer-events:none}
.cc-ribbon{position:absolute;top:13px;left:-20px;width:88px;padding:4px 0;text-align:center;transform:rotate(-45deg);font-size:7.5px;font-weight:900;color:#fff;letter-spacing:.8px;text-transform:uppercase;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.cc-ribbon.oferta{background:#E53935}
.cc-ribbon.combo{background:#FB8C00}
.cc-ribbon.recomendada{background:#43A047}
.cc-ribbon.especialidad{background:#8E24AA}
.cc-ribbon.nueva{background:#00C853}
.cc-ribbon.de-la-casa{background:#424242}
.cc-price-badge{position:absolute;top:9px;right:9px;background:#D62828;padding:3px 9px;border-radius:18px;font-size:10px;font-weight:900;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.cc-cat-badge{position:absolute;bottom:9px;left:9px;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);padding:3px 9px;border-radius:14px;font-size:9px;font-weight:700;color:#fff}
.cc-body{padding:9px 11px 10px}
.cc-name{font-weight:800;line-height:1.25;margin-bottom:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc.feat .cc-name{font-size:14px}
.cc.std .cc-name{font-size:12px}
.cc-sizes{font-size:10px;color:#9CA3AF;margin-bottom:8px;line-height:1.4}
.cc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.cc-add{flex:1;background:#D62828;border:none;border-radius:8px;padding:7px 4px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,background .18s;white-space:nowrap}
.cc-add:active{transform:scale(.92)}
.cc-add.added{background:#25D366}
.cc-stars{font-size:9px;color:#FFD700;flex-shrink:0}

/* ── BOTÓN CARRITO EN TARJETA ── */
.card-cart-btn{position:absolute;bottom:8px;right:8px;z-index:8;background:#D62828;border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.55);transition:background .18s,transform .12s;-webkit-tap-highlight-color:transparent}
.card-cart-btn:active{transform:scale(.84)}
.card-cart-btn.in-cart{background:#25D366}
.card-agotada .card-cart-btn,.card-agotada .cc-cart-btn{display:none !important}
.cc-cart-btn{position:absolute;bottom:7px;right:7px;z-index:8;background:#D62828;border:none;border-radius:50%;width:30px;height:30px;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.55);transition:background .18s,transform .12s;-webkit-tap-highlight-color:transparent}
.cc-cart-btn:active{transform:scale(.84)}
.cc-cart-btn.in-cart{background:#25D366}
/* cfoot sin botones */
.cfoot{padding:8px 8px 8px}
.ccard-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.ccard-rating{font-size:10px;color:#FFD700;font-weight:700}

/* ── CONTROLES DE CANTIDAD EN CARRITO ── */
.qty-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qty-btn{background:rgba(255,255,255,.11);border:none;border-radius:7px;color:#fff;width:27px;height:27px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.qty-btn:active{background:rgba(255,255,255,.28)}
.qty-num{font-size:13px;font-weight:800;min-width:20px;text-align:center;color:#fff}

/* ── CANTIDAD EN MODAL ── */
.modal-qty-wrap{display:flex;align-items:center;gap:12px;margin:10px 0 2px}
.modal-qty-lbl{font-size:10px;font-weight:800;color:#888;letter-spacing:.5px;text-transform:uppercase}
.modal-qty-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;width:34px;height:34px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent}
.modal-qty-btn:active{background:rgba(255,255,255,.25)}
.modal-qty-num{font-size:17px;font-weight:900;min-width:28px;text-align:center;color:#fff}

/* ── SISTEMA COMERCIAL: BADGES, URGENCIA, JERARQUÍA ── */
.cc-label-wrap{position:absolute;top:8px;left:8px;z-index:6;display:flex;flex-direction:column;gap:4px;pointer-events:none;max-width:calc(100% - 56px)}
.cc-commercial-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap}
.cc-commercial-badge.cb-oferta{background:#E53935}
.cc-commercial-badge.cb-combo{background:#FB8C00}
.cc-commercial-badge.cb-recomendada{background:#43A047}
.cc-commercial-badge.cb-especialidad{background:#8E24AA}
.cc-commercial-badge.cb-nueva{background:#00C853}
.cc-commercial-badge.cb-mas-pedida{background:#FBC02D;color:#333}
.cc-commercial-badge.cb-de-la-casa{background:#424242}
.cc-commercial-badge.cb-default{background:rgba(255,255,255,.18);backdrop-filter:blur(4px)}
.cc-auto-label{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:8px;font-size:7.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#fff;white-space:nowrap}
.cc-auto-label.mas-pedida{background:#FBC02D;color:#333;box-shadow:0 2px 6px rgba(251,192,45,.4)}
.cc-auto-label.top-valorada{background:#1E88E5;box-shadow:0 2px 6px rgba(30,136,229,.4)}
.cc-urgency{position:absolute;bottom:30px;left:0;right:0;z-index:7;text-align:center}
.cc-urgency-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:8px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:#fff;backdrop-filter:blur(4px);animation:urgencyPulse 2s ease-in-out infinite}
.cc-urgency-tag.urg-hoy{background:rgba(211,47,47,.92);box-shadow:0 2px 10px rgba(211,47,47,.5)}
.cc-urgency-tag.urg-pocas{background:rgba(239,108,0,.92);box-shadow:0 2px 10px rgba(239,108,0,.5)}
@keyframes urgencyPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.85;transform:scale(1.03)}}
.hero-commercial-badge{display:inline-flex;align-items:center;gap:5px;color:#fff;font-size:9px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:16px;margin-bottom:6px;box-shadow:0 2px 8px rgba(0,0,0,.3);background:rgba(255,255,255,.18);backdrop-filter:blur(6px)}
.hero-commercial-badge.cb-oferta{background:#E53935}
.hero-commercial-badge.cb-combo{background:#FB8C00}
.hero-commercial-badge.cb-recomendada{background:#43A047}
.hero-commercial-badge.cb-especialidad{background:#8E24AA}
.hero-commercial-badge.cb-nueva{background:#00C853}
.hero-commercial-badge.cb-mas-pedida{background:#FBC02D;color:#333}
.hero-commercial-badge.cb-de-la-casa{background:#424242}
.hero-urgency{display:inline-flex;align-items:center;gap:4px;background:rgba(214,40,40,.92);color:#fff;font-size:10px;font-weight:800;padding:4px 12px;border-radius:16px;animation:urgencyPulse 2s ease-in-out infinite;margin-bottom:8px}
.cc.anchor{width:220px !important}
.cc.anchor .cc-img{height:240px !important}
.cc.anchor .cc-name{font-size:15px !important}

/* ── SISTEMA DE PEDIDOS — FORM ── */
.oform-section{margin-bottom:14px}
.oform-label{display:block;font-size:10px;font-weight:800;color:#888;letter-spacing:.6px;margin-bottom:5px;text-transform:uppercase}
.ofield{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-weight:600;outline:none;margin-bottom:0;-webkit-appearance:none;transition:border-color .2s,background .2s;display:block}
.ofield:focus{border-color:rgba(214,40,40,.6);background:rgba(255,255,255,.09)}
.ofield::placeholder{color:rgba(255,255,255,.28);font-weight:400}
.ofield-opt::placeholder{font-style:italic}
.obtn-confirm{width:100%;margin-top:16px;padding:18px;font-weight:900;background:linear-gradient(135deg,#1a8a44,#25D366);border:none;border-radius:12px;color:#fff;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.35);transition:opacity .2s,transform .15s,box-shadow .2s;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:10px}
.obtn-confirm:active{transform:scale(.97)}
.obtn-confirm:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.obtn-confirm.loading{background:linear-gradient(135deg,#333,#444);box-shadow:none}
/* ── DESGLOSE DE PRECIO (Amazon-style) ── */
#cart-resumen{background:#111;border:1px solid #222;border-radius:14px;padding:14px 16px;margin-top:12px}
.rsm-title{font-size:10px;font-weight:900;letter-spacing:1.2px;color:#555;text-transform:uppercase;margin-bottom:10px}
.rsm-section{font-size:10px;font-weight:900;letter-spacing:.8px;color:#666;text-transform:uppercase;margin:8px 0 4px;padding-bottom:4px;border-bottom:1px dashed #222}
.rsm-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;gap:8px}
.rsm-row .rsm-label{font-size:11px;color:#888;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsm-row .rsm-amt{font-size:11px;font-weight:700;color:#bbb;flex-shrink:0;white-space:nowrap}
.rsm-divider{border:none;border-top:1px solid #222;margin:10px 0}
.rsm-row.rsm-envio .rsm-label{color:#aaa;font-weight:700}
.rsm-row.rsm-envio .rsm-amt{color:#E8A020;font-weight:900}
.rsm-row.rsm-envio.gratis .rsm-amt{color:#4ade80}
.rsm-row.rsm-total .rsm-label{font-size:13px;font-weight:900;color:#fff;letter-spacing:.3px}
.rsm-row.rsm-total .rsm-amt{font-size:15px;font-weight:900;color:#fff}
.order-num-banner{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.35);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;animation:fadeInUp .3s ease}
.order-num-banner .pznum{font-size:26px;font-weight:900;color:#25D366;letter-spacing:1px;margin:6px 0 2px}
.order-num-banner .pzmsg{font-size:12px;color:#aaa}

/* ── STATUS PILL (header, top edge) ── */
.spill-wrap{position:absolute;top:0;right:14px;z-index:101}
.spill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px 4px 8px;border-radius:0 0 12px 12px;font-size:10px;font-weight:700;letter-spacing:.2px;cursor:pointer;transition:all .25s;-webkit-tap-highlight-color:transparent;user-select:none;border:1px solid transparent;border-top:none;white-space:nowrap}
.spill.full{background:rgba(10,200,80,.12);border-color:rgba(10,200,80,.3);color:#4ade80;box-shadow:0 0 14px rgba(10,200,80,.18)}
.spill.parcial{background:rgba(232,160,32,.12);border-color:rgba(232,160,32,.35);color:#E8A020;box-shadow:0 0 14px rgba(232,160,32,.18)}
.spill.solo-mercado{background:rgba(155,89,182,.12);border-color:rgba(155,89,182,.35);color:#c084fc;box-shadow:0 0 14px rgba(155,89,182,.18)}
.spill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:spillpulse 2.4s ease-in-out infinite}
.spill.full .spill-dot{background:#4ade80}
.spill.parcial .spill-dot{background:#E8A020}
.spill.solo-mercado .spill-dot{background:#c084fc}
@keyframes spillpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.65)}}
/* Popover */
.spopover{position:absolute;top:calc(100% + 10px);right:0;background:#1a1208;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 16px;min-width:230px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:200;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:opacity .2s,transform .2s;transform-origin:top right}
.spopover.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.spopover-title{font-size:10px;font-weight:800;color:#888;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.spopover-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.spopover-row:last-child{border-bottom:none;padding-bottom:0}
.spopover-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.spopover-info{flex:1;min-width:0}
.spopover-label{font-size:12px;font-weight:700;color:#e5e5e5}
.spopover-time{font-size:10.5px;color:#888;margin-top:1px}
.spopover-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:auto;flex-shrink:0;white-space:nowrap}
.spopover-badge.act{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.spopover-badge.inact{background:rgba(100,100,100,.12);color:#666;border:1px solid rgba(100,100,100,.2)}
.spopover-badge.always{background:rgba(192,132,252,.15);color:#c084fc;border:1px solid rgba(192,132,252,.3)}

/* ── INVENTARIO — ESTADOS ── */
.card-agotada .cimg img{opacity:.42;filter:grayscale(.5)}
.card-agotada .cc-img img{opacity:.42;filter:grayscale(.5)}
.card-agotada .bped,.card-agotada .cc-add{opacity:.38;cursor:not-allowed;background:#555 !important;pointer-events:none;color:#999 !important;border-color:transparent !important}
.agotada-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.78);border:1px solid rgba(255,100,100,.4);color:#ff8080;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;z-index:7;letter-spacing:.3px;pointer-events:none}
#inv-toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e1e;border:1px solid #444;color:#eee;font-size:13px;font-weight:600;padding:10px 18px;border-radius:24px;z-index:9999;opacity:0;transition:opacity .35s,transform .35s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.55)}
#inv-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.inv-loading{font-size:11px;color:#555;text-align:center;padding:8px;letter-spacing:.3px}
/* ── SAFE AREA: paneles rating fijos al fondo ── */
#bRatingPanel{padding-bottom:max(32px,calc(env(safe-area-inset-bottom) + 20px)) !important}

function _cup(n) { return Math.round(n).toLocaleString('es-CU') + ' CUP'; }

// ── ABRIR WHATSAPP ─────────────────────────────────────────────
// Móvil → esquema nativo whatsapp:// (sin web intermedia, sin pestaña en blanco)
// Escritorio → wa.me en nueva pestaña
function _wa(msg, phone) {
  const tel = phone || WA;
  const enc = encodeURIComponent(msg);
  if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
    const a = document.createElement('a');
    a.href = `whatsapp://send?phone=${tel}&text=${enc}`;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => document.body.removeChild(a), 500);
  } else {
    window.open(`https://wa.me/${tel}?text=${enc}`, '_blank');
  }
}

// ── ESTADO GLOBAL ─────────────────────────────────────────────
let aG = 'Todos';
let curTab = 'juegos';

function setOrderType(t) {
  // Guardia de horario: no permite seleccionar una modalidad deshabilitada
  const e = typeof getEstadoHorario === 'function' ? getEstadoHorario() : null;
  if (e) {
    const activo = { delivery: e.deliveryActivo, recoger: e.recogerActivo, table: e.mesaActiva };
    if (!activo[t]) return; // ignorar click si está fuera de horario
  }
  orderType = t;
  document.querySelectorAll('.otype-btn').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('ot-' + t);
  if (btn) btn.classList.add('on');
  const fieldsEl = document.getElementById('order-fields');
  // Guardar valores antes de reconstruir el HTML del formulario
  const _sv = {
    nombre: document.getElementById('of-nombre')?.value || '',
    ci:     document.getElementById('of-ci')?.value     || '',
    dir:    document.getElementById('of-dir')?.value    || '',
    ref:    document.getElementById('of-ref')?.value    || '',
    mesa:   document.getElementById('of-mesa')?.value   || ''
  };
  if (fieldsEl) {
    fieldsEl.innerHTML = ORDER_FIELDS[t] || '';
    // Restaurar valores guardados en los campos que existen en el nuevo tipo
    ['nombre','ci','dir','ref','mesa'].forEach(k => {
      const f = document.getElementById('of-' + k);
      if (f && _sv[k]) f.value = _sv[k];
    });
    fieldsEl.style.opacity = '0';
    requestAnimationFrame(() => { fieldsEl.style.transition = 'opacity .2s'; fieldsEl.style.opacity = '1'; });
  }
}

// ── MOTOR DE HORARIOS EN EL CARRITO ───────────────────────────
function applyHorarios() {
  if (typeof getEstadoHorario !== 'function') return;
  const e = getEstadoHorario();

  // Si el carrito es 100% mercado → solo delivery disponible (sin recoger ni mesa)
  const onlyMercado = cart.length > 0 && cart.every(x => x.seccion === 'mercado');

  const map = { delivery: e.deliveryActivo, recoger: e.recogerActivo, table: e.mesaActiva };

  ['delivery', 'recoger', 'table'].forEach(tipo => {
    const btn = document.getElementById('ot-' + tipo);
    if (!btn) return;
    if (onlyMercado && tipo !== 'delivery') {
      btn.disabled = true;   // mercado-only: bloquear recoger y mesa
    } else {
      btn.disabled = !map[tipo];
    }
  });

  // Si el tipo actual quedó deshabilitado, forzar delivery
  if (onlyMercado && orderType !== 'delivery') {
    setOrderType('delivery');
  } else if (!onlyMercado && map[orderType] === false) {
    const valido = typeof getPrimerTipoValido === 'function' ? getPrimerTipoValido() : null;
    if (valido) setOrderType(valido);
  }

  // Alerta informativa
  const alertEl = document.getElementById('otype-alert');
  const hayAlguno = e.deliveryActivo || e.recogerActivo || e.mesaActiva;
  if (alertEl) {
    if (onlyMercado) {
      alertEl.textContent = '🛒 El Mercado solo admite pedidos con Delivery';
      alertEl.style.display = 'block';
    } else if (!hayAlguno) {
      alertEl.textContent = '⏰ Pedidos disponibles de 9:00 AM a 12:00 AM. Puedes seguir explorando el catálogo.';
      alertEl.style.display = 'block';
    } else if (!e.deliveryActivo) {
      alertEl.textContent = '🛵 Delivery disponible de 11:00 AM a 5:00 PM';
      alertEl.style.display = 'block';
    } else {
      alertEl.style.display = 'none';
    }
  }

  // Ocultar botón WhatsApp si no hay ninguna opción y hay productos
  const wappBtn = document.getElementById('cartWapp');
  if (wappBtn && !hayAlguno && cart.length > 0) {
    wappBtn.style.display = 'none';
  }
}

// ── CARRITO ───────────────────────────────────────────────────
function toggleCart(game, btn) {
  const idx = cart.findIndex(x => x.t === game.t);
  if (idx === -1) {
    const defSize = game.sizes ? (game.sizes[1] || game.sizes[0]) : null;
    const unitPrice = defSize ? defSize.price : (game.price || 0);
    const size = defSize ? defSize.label : '';
    cart.push({ t: game.t, type: 'pizza', unitPrice, price: unitPrice.toFixed(0) + ' CUP', size, qty: 1 });
    if (btn) {
      btn.textContent = '✅ Agregado';
      btn.style.background = '#25D366';
      btn.classList.remove('cart-add-pop','cart-add-flash');
      void btn.offsetWidth;
      btn.classList.add('cart-add-pop','cart-add-flash');
      if (navigator.vibrate) navigator.vibrate([40]);
      setTimeout(() => btn.classList.remove('cart-add-pop','cart-add-flash'), 600);
    }
  } else {
    cart.splice(idx, 1);
    if (btn) { btn.innerHTML = `${CART_SVG} Agregar`; btn.style.background = ''; }
  }
  updateCartBtn();
  _syncCartBtns();
}

const CART_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.56L23 6H6"/></svg>';

// Sincronizar visualmente todos los botones de carrito de las tarjetas

  document.querySelectorAll('.card-cart-btn[data-t]').forEach(b => {
    const inCart = cart.some(x => x.t === b.dataset.t);
    b.classList.toggle('in-cart', inCart);
    b.innerHTML = inCart ? '✓' : CART_SVG;
  });
  document.querySelectorAll('.cc-cart-btn[data-t]').forEach(b => {
    const inCart = cart.some(x => x.t === b.dataset.t);
    b.classList.toggle('in-cart', inCart);
    b.innerHTML = inCart ? '✓' : CART_SVG;
  });
}

function updateCartQty(i, delta) {

}

function updateCartBtn() {
  localStorage.setItem('pizzeria_cart', JSON.stringify(cart));
  const count = cart.reduce((s, x) => s + (x.qty || 1), 0);
  const fab = document.getElementById('cart-fab');
  const badge = document.getElementById('cart-badge');
  const hbtn = document.getElementById('hcart-btn');
  const hbadge = document.getElementById('hcart-badge');
  const hicon = document.getElementById('hcart-icon');

  badge.textContent = count;
  hbadge.textContent = count;

  if (count > 0) {
    hbadge.style.display = 'flex';
    hbtn.classList.remove('empty');
    hbtn.classList.add('has-items');
    hicon.classList.add('hcart-pulse');
    setTimeout(() => hicon.classList.remove('hcart-pulse'), 400);
    hbadge.classList.remove('badge-bounce');
    void hbadge.offsetWidth;
    hbadge.classList.add('badge-bounce');
    setTimeout(() => hbadge.classList.remove('badge-bounce'), 350);
    if (fab.style.display === 'none' || fab.style.display === '') {
      fab.style.display = 'flex';
      fab.style.animation = 'fabIn .3s ease';
      setTimeout(() => fab.style.animation = '', 300);
    } else {
      fab.classList.add('fab-shake');
      setTimeout(() => fab.classList.remove('fab-shake'), 300);
    }
  } else {
    hbadge.style.display = 'none';
    hbtn.classList.remove('has-items');
    hbtn.classList.add('empty');
    fab.style.display = 'none';
  }
}

function _buildResumen({ pzItems, mktItems, pzTotal, mktTotal, grandTotal, envioMonto, gratis, totalFinal }) {
  const el = document.getElementById('cart-resumen');
  if (!el) return;
  const isMixed = pzItems.length > 0 && mktItems.length > 0;

  let html = `<div class="rsm-title">Resumen del pedido</div>`;

  if (pzItems.length > 0) {
    html += `<div class="rsm-section">🍕 Pizzería</div>`;
    pzItems.forEach(({ item }) => {
      const qty = item.qty || 1;
      const up  = item.unitPrice || parseFloat((item.price || '0').replace(/[^0-9.]/g, '')) || 0;
      const label = (qty > 1 ? `${qty}× ` : '') + item.t + (item.size ? ` (${item.size})` : '');
      html += `<div class="rsm-row"><span class="rsm-label">${label}</span><span class="rsm-amt">${_cup(qty * up)}</span></div>`;
    });
  }

  if (mktItems.length > 0) {
    html += `<div class="rsm-section" style="margin-top:${pzItems.length > 0 ? '10px' : '0'}">🛒 Mercado</div>`;
    mktItems.forEach(({ item }) => {
      const qty = item.qty || 1;
      const up  = item.unitPrice || parseFloat((item.price || '0').replace(/[^0-9.]/g, '')) || 0;
      const label = (qty > 1 ? `${qty}× ` : '') + item.t;
      html += `<div class="rsm-row"><span class="rsm-label">${label}</span><span class="rsm-amt">${_cup(qty * up)}</span></div>`;
    });
  }

  html += `<hr class="rsm-divider"/>`;

  // Envío (solo se muestra en delivery)
  if (orderType === 'delivery') {
    const envLabel = gratis ? 'Envío gratis 🎉' : 'Envío';
    const envAmt   = gratis ? `0 CUP` : _cup(CFG_ENVIO.costo);
    html += `<div class="rsm-row rsm-envio${gratis ? ' gratis' : ''}"><span class="rsm-label">${envLabel}</span><span class="rsm-amt">${envAmt}</span></div>`;
  }

  // Total
  html += `<div class="rsm-row rsm-total" style="margin-top:8px"><span class="rsm-label">TOTAL</span><span class="rsm-amt">${_cup(totalFinal)}</span></div>`;

  el.innerHTML = html;
  el.style.display = 'block';
}

    if (resumenEl) resumenEl.style.display = 'none';
    wappBtn.style.display = 'none';

    const pzItems  = cart.map((item, i) => ({ item, i })).filter(x => x.item.seccion !== 'mercado');

    };

    const _buildItem = ({ item, i }, accentColor) => {

      const unitPrice = item.unitPrice || parseFloat((item.price || '0').replace(/[^0-9.]/g, '')) || 0;

          <div style="font-size:11px;font-weight:900;letter-spacing:1.4px;color:${glowColor};text-transform:uppercase">${label}</div>
        </div>
        <div style="background:${glowColor}22;border:1px solid ${glowColor}55;border-radius:20px;padding:2px 9px;font-size:10px;font-weight:800;color:${glowColor}">${count} ${count === 1 ? 'producto' : 'productos'}</div>`;
      return h;
    };

    let grandTotal = 0;

    // ── Sección Pizzería ──────────────────────────────────────
    let pzTotal = 0;
    if (pzItems.length > 0) {
      container.appendChild(_buildSectionHeader('🍕', 'La Pizzería', 'linear-gradient(135deg,#1a0c00,#241200)', '#E8A020', pzItems.length));
      pzItems.forEach(entry => {
        const qty = entry.item.qty || 1;
        const up  = entry.item.unitPrice || parseFloat((entry.item.price || '0').replace(/[^0-9.]/g, '')) || 0;
        pzTotal    += qty * up;
        grandTotal += qty * up;
        container.appendChild(_buildItem(entry, '#E8A020'));
      });
    }

    // ── Sección Mercado ───────────────────────────────────────
    let mktTotal = 0;
    if (mktItems.length > 0) {
      container.appendChild(_buildSectionHeader('🛒', 'Mercado', 'linear-gradient(135deg,#001a10,#00241a)', '#2ecc71', mktItems.length));
      mktItems.forEach(entry => {
        const qty = entry.item.qty || 1;
        const up  = entry.item.unitPrice || parseFloat((entry.item.price || '0').replace(/[^0-9.]/g, '')) || 0;
        mktTotal   += qty * up;
        grandTotal += qty * up;
        container.appendChild(_buildItem(entry, '#2ecc71'));
      });
    }

    // ── Desglose de precios (siempre visible) ─────────────────
    const gratis    = orderType === 'delivery' && grandTotal >= CFG_ENVIO.gratis_desde;
    const envioMonto = orderType === 'delivery' ? (gratis ? 0 : CFG_ENVIO.costo) : 0;
    const totalFinal = grandTotal + envioMonto;
    _buildResumen({ pzItems, mktItems, pzTotal, mktTotal, grandTotal, envioMonto, gratis, totalFinal });

    wappBtn.style.display = 'block';
  }

  document.getElementById('cartOverlay').classList.add('on');
  document.getElementById('cartModal').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('on');
  document.getElementById('cartModal').classList.remove('on');
  document.body.style.overflow = '';
}

function removeFromCart(i) {
  cart.splice(i, 1);
  updateCartBtn();
  render();
  openCart();
}

// ── GENERAR NÚMERO DE PEDIDO LOCAL ────────────────────────────
function genOrderNum() {
  let n = parseInt(localStorage.getItem('pz_order_counter') || '0') + 1;
  localStorage.setItem('pz_order_counter', n);
  return 'PZ-' + String(n).padStart(3, '0');
}

// ── CONFIRMAR PEDIDO ──────────────────────────────────────────
async function confirmOrder() {
  // ── Validación de horario ──────────────────────────────────
  if (typeof getEstadoHorario === 'function') {
    const e = getEstadoHorario();
    const mapActivo = { delivery: e.deliveryActivo, recoger: e.recogerActivo, table: e.mesaActiva };
    const hayAlguno = e.deliveryActivo || e.recogerActivo || e.mesaActiva;
    if (!hayAlguno) {
      alert('⏰ Los pedidos están disponibles de 9:00 AM a 12:00 AM.\nPuedes explorar el catálogo mientras tanto.');
      return;
    }
    if (!mapActivo[orderType]) {
      const hint = typeof getMensajeModalidad === 'function' ? getMensajeModalidad(orderType) : '';
      alert(`Esta modalidad no está disponible ahora.\n${hint ? 'Horario: ' + hint : ''}\nSelecciona otra opción.`);
      applyHorarios();
      return;
    }
  }

  // ── Validación por tipo ──────────────────────────────────
  const nombre = document.getElementById('of-nombre')?.value?.trim();
  const ci = document.getElementById('of-ci')?.value?.trim();
  const dir = document.getElementById('of-dir')?.value?.trim();
  const mesa = document.getElementById('of-mesa')?.value?.trim();

  if (orderType === 'delivery') {
    if (!nombre) return alert('Introduce tu nombre para el delivery.');
    if (!dir) return alert('Introduce la dirección de entrega.');
  } else if (orderType === 'recoger') {
    if (!nombre) return alert('Introduce tu nombre para recoger.');
    if (!ci) return alert('Introduce tu número de Carnet de Identidad completo.');
  } else if (orderType === 'table') {
    if (!mesa) return alert('Introduce el número de mesa.');
  }

  const btn = document.getElementById('cartWapp');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<span style="font-size:18px;animation:firePulse 1s infinite">⏳</span> Guardando pedido…';

  // En escritorio: abrir ventana ANTES del await (evita bloqueo por popup)
  // En móvil: NO se pre-abre nada (evita la pestaña en blanco)
  const _isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const _waWin    = _isMobile ? null : window.open('', '_blank');

  // Calcular subtotal de productos
  let total = 0;
  cart.forEach(item => {
    const qty = item.qty || 1;
    const unitPrice = item.unitPrice || parseFloat((item.price || '0').replace(/[^0-9.]/g, '')) || 0;
    total += qty * unitPrice;
  });

  // Costo de envío (solo delivery)
  let envioCosto = 0;
  if (orderType === 'delivery') {
    envioCosto = total >= CFG_ENVIO.gratis_desde ? 0 : CFG_ENVIO.costo;
  }
  const totalConEnvio = total + envioCosto;

  // Construir lista agrupada por sección
  const _pzItems  = cart.filter(x => x.seccion !== 'mercado');
  const _mktItems = cart.filter(x => x.seccion === 'mercado');
  let productosStr = '';
  let _n = 1;
  const _fmtLine = (item) => {
    const qty = item.qty || 1;
    const up  = item.unitPrice || parseFloat((item.price || '0').replace(/[^0-9.]/g, '')) || 0;
    const qtyStr = qty > 1 ? `${qty}x ` : '';
    return `  ${_n++}. ${qtyStr}${item.t}${item.size ? ' (' + item.size + ')' : ''} — ${_cup(qty * up)}\n`;
  };
  if (_pzItems.length > 0) {
    productosStr += `🍕 *Pizzería:*\n`;
    _pzItems.forEach(item => { productosStr += _fmtLine(item); });
  }
  if (_mktItems.length > 0) {
    if (_pzItems.length > 0) productosStr += '\n';
    productosStr += `🛒 *Mercado:*\n`;
    _mktItems.forEach(item => { productosStr += _fmtLine(item); });
  }
  productosStr = productosStr.trimEnd();

  // Número de pedido desde el backend — única fuente de verdad
  let orderNum;
  try {
    const _nr = await fetch(SCRIPT_URL + '?_t=' + Date.now(), { cache: 'no-store' });
    const _nd = await _nr.json();
    if (_nd && _nd.nextNum) orderNum = _nd.nextNum;
  } catch (_e) { /* sin red, se usa fallback */ }
  if (!orderNum) orderNum = genOrderNum(); // fallback solo si no hay conexión
  lastOrderNum = orderNum;

  // Enviar pedido a Google Sheets con mode:'no-cors' para garantizar
  // que el POST llega siempre, sin bloqueo CORS en la respuesta
  if (SCRIPT_URL) {
    const now = new Date();
    const payload = {
      orderNumber: orderNum,
      tipo: orderType,
      nombre: nombre || '',
      ci: ci || '',
      mesa: mesa || '',
      direccion: dir || '',
      referencia: document.getElementById('of-ref')?.value?.trim() || '',
      productos: cart.map(x => { const qty = x.qty||1; const up = x.unitPrice||parseFloat((x.price||'0').replace(/[^0-9.]/g,''))||0; return (qty>1?qty+'x ':'')+x.t+(x.size?' ('+x.size+')':'')+' '+_cup(qty*up); }).join('; '),
      total: Math.round(totalConEnvio),
      fecha: now.toLocaleDateString('es-CU'),
      hora: now.toLocaleTimeString('es-CU', { hour: '2-digit', minute: '2-digit' }),
      estado: 'Pendiente'
    };
  fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
      body: JSON.stringify(payload)
    }).catch(e => console.warn('Sheets no disponible:', e));
  }

  // Construir mensaje WhatsApp
  const typeLabel = { delivery: '🛵 Delivery', recoger: '🥡 Recoger', table: '🍽️ Mesa' }[orderType];
  let msg = `🍕 *Pedido — ${NOMBRE_LOCAL}*\n📋 *${typeLabel}*\n\n`;
  msg += `🆔 *Pedido: ${orderNum}*\n`;

  if (orderType === 'delivery') {
    msg += `👤 Nombre: ${nombre}\n`;
    msg += `📍 Dirección: ${dir}\n`;
    if (document.getElementById('of-ref')?.value?.trim()) msg += `📝 Referencia: ${document.getElementById('of-ref').value.trim()}\n`;
    if (ci) msg += `🪪 CI: ${ci}\n`;
  } else if (orderType === 'recoger') {
    msg += `👤 Nombre: ${nombre}\n`;
    msg += `🪪 CI: ${ci}\n`;
  } else if (orderType === 'table') {
    msg += `🪑 Mesa: ${mesa}\n`;
    if (nombre) msg += `👤 Nombre: ${nombre}\n`;
  }

  if (orderType === 'delivery' && envioCosto > 0) {
    msg += `\n${productosStr}\n\n🚴 Envío: ${_cup(envioCosto)}\n💰 *Total: ${_cup(totalConEnvio)}*`;
  } else if (orderType === 'delivery') {
    msg += `\n${productosStr}\n\n🚴 Envío: ¡GRATIS!\n💰 *Total: ${_cup(totalConEnvio)}*`;
  } else {
    msg += `\n${productosStr}\n\n💰 *Total: ${_cup(total)}*`;
  }

  // Banner de número de pedido: solo visible en Recoger
  const container = document.getElementById('cartItems');
  if (orderType === 'recoger') {
    container.insertAdjacentHTML('afterbegin', `
      <div class="order-num-banner">
        <div style="font-size:11px;color:#888;font-weight:700;letter-spacing:.5px">NÚMERO DE PEDIDO</div>
        <div class="pznum">${orderNum}</div>
        <div class="pzmsg">Guarda este número · Te lo pedirán al recoger</div>
      </div>`);
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 510 512.459" fill="currentColor" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" fill-rule="evenodd" clip-rule="evenodd"><path d="M435.689 74.468C387.754 26.471 324 .025 256.071 0 116.098 0 2.18 113.906 2.131 253.916c-.024 44.758 11.677 88.445 33.898 126.946L0 512.459l134.617-35.311c37.087 20.238 78.85 30.891 121.345 30.903h.109c139.949 0 253.88-113.917 253.928-253.928.024-67.855-26.361-131.645-74.31-179.643v-.012zm-179.618 390.7h-.085c-37.868-.011-75.016-10.192-107.428-29.417l-7.707-4.577-79.886 20.953 21.32-77.889-5.017-7.987c-21.125-33.605-32.29-72.447-32.266-112.322.049-116.366 94.729-211.046 211.155-211.046 56.373.025 109.364 22.003 149.214 61.903 39.853 39.888 61.781 92.927 61.757 149.313-.05 116.377-94.728 211.058-211.057 211.058v.011zm115.768-158.067c-6.344-3.178-37.537-18.52-43.358-20.639-5.82-2.119-10.044-3.177-14.27 3.178-4.225 6.357-16.388 20.651-20.09 24.875-3.702 4.238-7.403 4.762-13.747 1.583-6.343-3.178-26.787-9.874-51.029-31.487-18.86-16.827-31.597-37.598-35.297-43.955-3.702-6.355-.39-9.789 2.775-12.943 2.849-2.848 6.344-7.414 9.522-11.116s4.225-6.355 6.343-10.581c2.12-4.238 1.06-7.937-.522-11.117-1.584-3.177-14.271-34.409-19.568-47.108-5.151-12.37-10.385-10.69-14.269-10.897-3.703-.183-7.927-.219-12.164-.219s-11.105 1.582-16.925 7.939c-5.82 6.354-22.209 21.709-22.209 52.927 0 31.22 22.733 61.405 25.911 65.642 3.177 4.237 44.745 68.318 108.389 95.812 15.135 6.538 26.957 10.446 36.175 13.368 15.196 4.834 29.027 4.153 39.96 2.52 12.19-1.825 37.54-15.353 42.824-30.172 5.283-14.818 5.283-27.529 3.701-30.172-1.582-2.641-5.819-4.237-12.163-7.414l.011-.024z"/></svg> Enviar por WhatsApp`;

  const _enc = encodeURIComponent(msg);

  if (_isMobile) {
    // Móvil: enlace oculto con esquema nativo → abre WhatsApp directo,
    // sin pestaña en blanco ni página intermedia de api.whatsapp.com
    const _a = document.createElement('a');
    _a.href = `whatsapp://send?phone=${WA}&text=${_enc}`;
    _a.style.display = 'none';
    document.body.appendChild(_a);
    _a.click();
    setTimeout(() => document.body.removeChild(_a), 500);
  } else {
    // Escritorio: redirigir la ventana pre-abierta (evita bloqueo de popup)
    const _waUrl = `https://wa.me/${WA}?text=${_enc}`;
    if (_waWin && !_waWin.closed) {
      _waWin.location.href = _waUrl;
    } else {
      window.open(_waUrl, '_blank');
    }
  }
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  // Limpiar carrito tras enviar el pedido por WhatsApp
  cart.length = 0;
  updateCartBtn();
  render();
  _syncCartBtns();
}

let _mercadoLoaded = false;

function loadMercado() {
  if (typeof fetchMercado !== 'function') return;
  const grid    = document.getElementById('mercadogrid');
  const loading = document.getElementById('mercado-loading');
  const catRow  = document.getElementById('mercado-cats');

  if (_mercadoLoaded) {
    _syncMercadoBtns();
    filterMercado(_mercadoCatActual);
    // Verificación silenciosa de disponibilidad al volver al tab
    _pollMercado();
    return;
  }

  // Mostrar skeleton mientras carga
  loading.style.display = 'block';
  grid.innerHTML = '';
  catRow.innerHTML = '';

  fetchMercado().then(productos => {
    _mercadoLoaded = true;
    loading.style.display = 'none';

    if (!productos || productos.length === 0) {
      grid.innerHTML = '<p style="color:#aaa;text-align:center;padding:30px">El mercado está vacío por ahora.</p>';
      return;
    }

    // Botones de categoría dinámicos
    const cats = ['Todos', ...new Set(productos.map(p => p.categoria).filter(Boolean))];
    catRow.innerHTML = cats.map(c =>
      `<button class="mcat-btn${c === 'Todos' ? ' active' : ''}" onclick="filterMercado('${c}')">${c}</button>`
    ).join('');

    // Renderizar tarjetas
    productos.forEach(p => {
      const d = document.createElement('div');
      d.className = 'con-card';
      d.dataset.cat = p.categoria || '';
      d.dataset.keywords = _getMercadoKeywords(p.nombre, p.categoria, p.descripcion);
      const disponible = p.disponible !== false;
      const inCart   = cart.some(x => x.t === p.nombre && x.seccion === 'mercado');
      const safeName = p.nombre.replace(/'/g, "\\'");
      const safeImg  = (p.img || '').replace(/'/g, "\\'");
      const specs    = p.presentacion || p.specs || '';
      const _MFALLBACK_SVG = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:44px;height:44px;opacity:.35"><path d="M8 16H40V38C40 39.1 39.1 40 38 40H10C8.9 40 8 39.1 8 38V16Z" stroke="#E8A020" stroke-width="2"/><path d="M6 10C6 8.9 6.9 8 8 8H40C41.1 8 42 8.9 42 10V16H6V10Z" stroke="#E8A020" stroke-width="2"/><path d="M20 24H28" stroke="#E8A020" stroke-width="2" stroke-linecap="round"/></svg>`;
      d.innerHTML = `
        <div class="con-img-wrap">
          ${p.img
            ? `<img class="con-img" src="${p.img}" loading="lazy" decoding="async"
                 onload="this.parentElement.style.backgroundImage='url('+this.src+')'"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${p.nombre}"/>
               <div class="con-img-fall" style="display:none">${_MFALLBACK_SVG}</div>`
            : `<div class="con-img-fall">${_MFALLBACK_SVG}</div>`
          }
          <div class="mcat-badge">${p.categoria}</div>
          <button class="con-bebida-cart-btn${inCart ? ' in-cart' : ''}" data-mname="${p.nombre}"
            ${!disponible ? 'disabled' : ''}
            onclick="event.stopPropagation();_mercadoCartToggle('${safeName}','${p.precio}','${safeImg}',this)">
            ${inCart ? '✓' : CART_SVG}
          </button>
        </div>
        <div class="con-info">
          <div class="con-name">${p.nombre}</div>
          <div class="con-price">${_cup(parseFloat(p.precio))}</div>
          ${specs ? `<div class="con-specs">${specs}</div>` : ''}
          ${p.descripcion ? `<div class="con-desc">${p.descripcion}</div>` : ''}
        </div>`;
      grid.appendChild(d);
    });

    _syncMercadoBtns();
    filterMercado(_mercadoCatActual);
  }).catch(() => {
    loading.style.display = 'none';
    grid.innerHTML = '<p style="color:#aaa;text-align:center;padding:30px">Error al cargar el mercado. Intenta de nuevo.</p>';
  });
}

// ── BUSCADOR MERCADO ─────────────────────────────────────────
// Normaliza texto: minúsculas + sin tildes
function _normMercado(s) {
  return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

// Tabla de sinónimos extendida — cubre errores tipográficos y términos coloquiales
const _MERCADO_SYNS = [
  { keys: ['jabon','jabones','soap'],           extra: 'aseo higiene limpieza baño personal lavado manos cuerpo' },
  { keys: ['detergente','lavar ropa'],          extra: 'polvo ropa lavado lavar limpieza' },
  { keys: ['shampoo','champu','champú','champ'], extra: 'pelo cabello lavado hair acondicionador' },
  { keys: ['acondicionador','suavizante'],      extra: 'pelo cabello shampoo champu hair' },
  { keys: ['pasta dental','pasta diente','colgate','dentifrico','cepillar','cepillo dental'],
                                                extra: 'diente dental oral higiene boca colgate crest' },
  { keys: ['papel higienico','papel sanitario','rollo','tissue'],
                                                extra: 'bano baño sanitario higiene rollo papel' },
  { keys: ['servilleta','servilletas'],         extra: 'papel mesa comedor' },
  { keys: ['bolsa','bolsas','basura'],          extra: 'plastico residuo basurero desecho' },

  { keys: ['cafe','café'],                      extra: 'bebida caliente desayuno cafetera' },
  { keys: ['leche'],                            extra: 'lacteo dairy desayuno cafe' },
  { keys: ['desodorante','antitranspirante'],   extra: 'aseo personal axilas olor axe rexona' },
  { keys: ['crema','locion','cuerpo'],          extra: 'hidratante piel aseo personal' },
  { keys: ['macarron','pasta','espagueti'],     extra: 'comida cereal harina alimento' },
  { keys: ['harina'],                           extra: 'pan cereal cocinar alimento trigo maiz' },
  { keys: ['galleta'],                          extra: 'dulce merienda snack' },
  { keys: ['pañal','panal'],                    extra: 'bebe higiene aseo' },
  { keys: ['toalla femenina','higiene femenina','femenino'], extra: 'mujer aseo personal higiene' },
  { keys: ['cepillo diente','cepillo dental'],  extra: 'oral higiene pasta dental diente boca' },
];

function _getMercadoKeywords(nombre, categoria, descripcion) {
  const n = _normMercado(nombre);
  const c = _normMercado(categoria);
  const d = _normMercado(descripcion || '');
  let kw  = n + ' ' + c + (d ? ' ' + d : '');
  _MERCADO_SYNS.forEach(entry => {
    if (entry.keys.some(k => n.includes(k) || d.includes(k))) kw += ' ' + entry.extra;
  });
  return kw;
}

function _applyMercadoFilters() {
  let visible = 0;
  document.querySelectorAll('#mercadogrid .con-card').forEach(c => {
    const catOk  = _mercadoCatActual === 'Todos' || c.dataset.cat === _mercadoCatActual;
    const kwOk   = !_mercadoSearchQ || (c.dataset.keywords || '').includes(_mercadoSearchQ);
    const show   = catOk && kwOk;
    c.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const noRes = document.getElementById('mercado-no-results');
  const noResQ = document.getElementById('mercado-no-results-q');
  if (noRes) {
    const show = visible === 0 && _mercadoSearchQ;
    noRes.style.display = show ? 'block' : 'none';
    if (noResQ) noResQ.textContent = document.getElementById('mercado-search')?.value || '';
  }
}

  document.querySelectorAll('#mercado-cats .mcat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === cat);

}

function _mercadoCartToggle(nombre, precio, img, btn) {
  const idx = cart.findIndex(x => x.t === nombre && x.seccion === 'mercado');
