<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🍕 La Pizzería</title>
<meta property="og:title" content="🍕 La Pizzería"/>
<meta property="og:description" content="🍕 Menú digital · Delivery y pedidos en mesa. Pizzas artesanales, bebidas y más. ¡Pedí por WhatsApp!"/>
<meta property="og:image" content="og-image.png"/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#0f0a08"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0a08;color:#fff;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ── HEADER ── */
header{background:rgba(15,10,8,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 14px 12px;position:sticky;top:0;z-index:99;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 1px 0 rgba(255,255,255,.04)}
.hrow{display:flex;align-items:center;justify-content:space-between;max-width:720px;margin:0 auto 11px}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{height:42px;width:42px;border-radius:10px;object-fit:contain;background:#1a1208;padding:2px}
.htxt h1{font-size:18px;font-weight:900;line-height:1.1}
.htxt small{font-size:11px;opacity:.8}

/* ── BUTTONS ── */
.btnall{border:none;border-radius:10px;padding:0 14px;height:44px;color:#fff;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:filter .2s,box-shadow .2s}
.btnall:active{filter:brightness(.85)}
.btn-lista{background:transparent;box-shadow:none}
.btncart{background:#25D366;box-shadow:0 2px 6px rgba(37,211,102,.3);position:relative;min-width:90px}
.btncart:hover{box-shadow:0 4px 12px rgba(37,211,102,.5)}
.btncart.has-items{box-shadow:0 0 10px rgba(37,211,102,.6),0 2px 6px rgba(37,211,102,.4)}
@keyframes hcartswing{0%{transform:rotate(0deg)}25%{transform:rotate(-18deg)}50%{transform:rotate(14deg)}75%{transform:rotate(-8deg)}100%{transform:rotate(0deg)}}
@keyframes hcartflash{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes badgebounce{0%{transform:scale(0.5)}60%{transform:scale(1.35)}80%{transform:scale(0.9)}100%{transform:scale(1)}}
.hcart-pulse{animation:hcartswing .4s cubic-bezier(.36,.07,.19,.97),hcartflash .4s ease;transform-origin:top center}
.badge-bounce{animation:badgebounce .35s cubic-bezier(.36,.07,.19,.97)}
#hcart-btn.empty svg{stroke:rgba(255,255,255,.35)}
#hcart-btn.has-items svg{stroke:#25D366}
@keyframes cartnum{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.cart-num-pop{animation:cartnum .25s ease}

/* ── NAV TABS ── */
.navtabs{width:100%;background:rgba(15,10,8,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:0;display:flex;position:fixed;bottom:0;left:0;z-index:98;height:64px;box-shadow:0 -1px 0 rgba(255,255,255,.04)}
.navtab{flex:1;border:none;background:transparent;color:#555;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;transition:color .2s}
.navtab.on{color:#D62828}
.navtab.off{color:#555}
.navtab svg{width:26px;height:26px}
.navtab span{font-size:10px;font-weight:700;letter-spacing:.3px}
@keyframes springback{0%{transform:scale(.82)}60%{transform:scale(1.18)}80%{transform:scale(.95)}100%{transform:scale(1)}}
.navtab-spring svg{animation:springback .35s cubic-bezier(.36,.07,.19,.97) forwards}

/* ── SEARCH ── */
.swrap{max-width:720px;margin:0 auto}
#si{width:100%;padding:11px 44px 11px 20px;border-radius:50px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:14px;outline:none;transition:border-color .25s,box-shadow .25s}
#si:focus{border-color:rgba(216,40,40,.8);box-shadow:0 0 0 2px rgba(216,40,40,.15),0 0 12px rgba(216,40,40,.2)}
#si::placeholder{color:rgba(255,255,255,.35)}

/* ── MAIN BODY ── */
.body{max-width:720px;margin:0 auto;padding:13px 11px 80px}

/* ── GENRE BAR ── */
.gbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:11px;scrollbar-width:none;position:sticky;top:var(--header-h,0px);z-index:97;background:rgba(15,10,8,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding-top:8px;margin-left:-11px;margin-right:-11px;padding-left:11px;padding-right:11px}
.gbar::-webkit-scrollbar{display:none}
.gb{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:#1a1208;color:#fff;font-weight:600;cursor:pointer;font-size:11px;transition:background .15s;overflow:hidden;-webkit-tap-highlight-color:transparent}
.gb.on{background:#D62828;border-color:#D62828}

/* ── SORT / TBAR ── */
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.cnt{font-size:12px;color:#555}
.vista-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#777;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.vista-btn svg{width:15px;height:15px;fill:currentColor;pointer-events:none}
.vista-btn.on{background:rgba(214,40,40,.18);border-color:#D62828;color:#D62828;box-shadow:0 0 10px rgba(214,40,40,.2)}

/* ── GRID CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:10px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;background:linear-gradient(145deg,#1a1208,#140e04);box-shadow:0 4px 20px rgba(0,0,0,.65),0 0 0 1px var(--gcol-border,rgba(255,255,255,.06)),0 0 10px var(--gcol-glow-soft,transparent);border:1px solid var(--gcol-border,rgba(255,255,255,.06));transition:transform .18s,box-shadow .18s,border-color .18s;-webkit-tap-highlight-color:transparent;animation:fadeInUp .2s ease both}
.cimg{position:relative;padding-top:140%;overflow:hidden}
.cimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fall{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.fall img{width:55%;opacity:.65}
.fall p{font-size:10px;color:#bbb;margin-top:7px;font-weight:700;line-height:1.3}
.bg{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);padding:3px 8px;border-radius:18px;font-size:9px;font-weight:700}
.bg.con-ribbon{top:auto;bottom:7px}
.bp{position:absolute;top:7px;right:7px;background:#D62828;padding:3px 8px;border-radius:18px;font-size:10px;font-weight:900}
.ov{position:absolute;inset:0;background:rgba(0,0,0,.91);padding:11px;display:flex;flex-direction:column;justify-content:center;gap:5px;opacity:0;transition:opacity .22s;pointer-events:none}
.ov.on{opacity:1}
.ovt{font-size:12px;font-weight:800;line-height:1.3}
.ovd{font-size:10px;color:#aaa}
.ovs{color:#FFD700;font-size:12px}
.cfoot{padding:8px 8px 0}
.ctit{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:6px;min-height:28px}
.csize{font-size:12px;font-weight:500;color:#9CA3AF;margin-bottom:8px;margin-top:2px}
.cbtns{display:flex;gap:5px;padding-bottom:8px}
.bped{flex:1;background:#D62828;border:none;border-radius:7px;padding:7px 3px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s}
.bped:active,.bped.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.bcom{flex:1;background:#E8A020;border:none;border-radius:7px;padding:7px 3px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s}
.bcom:active,.bcom.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#444}
.empty p{font-size:15px;margin-top:10px}

/* ── RIBBONS ── */
.ribbon-wrap{position:absolute;top:0;left:0;width:72px;height:72px;overflow:hidden;z-index:5;pointer-events:none}
.ribbon{position:absolute;top:14px;left:-22px;width:96px;padding:5px 0;text-align:center;transform:rotate(-45deg);font-size:8px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ribbon-estreno{background:linear-gradient(135deg,#7b2ff7,#f107a3)}
.ribbon-oferta{background:linear-gradient(135deg,#ff6a00,#ee0979)}
.ribbon-nuevo{background:linear-gradient(135deg,#00b09b,#96c93d)}

/* ── BEBIDAS SECTION (formerly consolas) ── */
.con-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:4px}
.con-card{background:#1a1208;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 18px rgba(0,0,0,.55);transition:transform .18s;-webkit-tap-highlight-color:transparent}
.con-card:hover{transform:translateY(-3px)}
.con-img{width:100%;height:180px;object-fit:contain;object-position:center;display:block;background:#0f0a08}
.con-img-fall{height:180px;display:flex;align-items:center;justify-content:center;background:#0f0807;font-size:56px}
.con-info{padding:14px}
.con-name{font-size:15px;font-weight:900;margin-bottom:5px}
.con-desc{font-size:12px;color:#aaa;margin-bottom:8px;line-height:1.5}
.con-specs{font-size:11px;color:#ccc;margin-bottom:10px;line-height:1.6;border-left:2px solid #E8A020;padding-left:8px}
.con-price{font-size:18px;font-weight:900;color:#E8A020;margin-bottom:12px}
.con-stock-si{display:inline-block;background:#25D366;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;margin-bottom:10px}
.con-stock-no{display:inline-block;background:#555;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;margin-bottom:10px}
.con-btns{display:flex;gap:8px}
.cbped{flex:1;background:#D62828;border:none;border-radius:10px;padding:10px;color:#fff;font-size:12px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s}
.cbped:active{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.cbcom{flex:1;background:#E8A020;border:none;border-radius:10px;padding:10px;color:#fff;font-size:12px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s}
.cbcom:active{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.con-loading{text-align:center;padding:40px;color:#555;font-size:14px}

/* ── VISTA BEBIDAS ── */
.con-grid.mosaico{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.con-grid.mosaico .con-img{height:148px}
.con-grid.mosaico .con-img-fall{height:148px;font-size:36px}
.con-grid.mosaico .con-specs,.con-grid.mosaico .con-btns,.con-grid.mosaico .con-desc{display:none}
.con-grid.mosaico .con-info{padding:8px}
.con-grid.mosaico .con-name{font-size:12px;margin-bottom:3px}
.con-grid.mosaico .con-price{font-size:13px;margin-bottom:4px}
.con-grid.mosaico .con-stock-si,.con-grid.mosaico .con-stock-no{font-size:9px;padding:2px 7px;margin-bottom:0}
.con-grid.lista{grid-template-columns:1fr;gap:6px}
.con-grid.lista .con-card{display:flex;align-items:center}
.con-grid.lista .con-img{width:72px;height:72px;flex-shrink:0;object-fit:contain}
.con-grid.lista .con-img-fall{width:72px;height:72px;flex-shrink:0;font-size:28px}
.con-grid.lista .con-info{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.con-grid.lista .con-name{font-size:13px;margin-bottom:0}
.con-grid.lista .con-price{font-size:13px;margin-bottom:0}
.con-grid.lista .con-stock-si,.con-grid.lista .con-stock-no{margin-bottom:0}
.con-grid.lista .con-specs,.con-grid.lista .con-desc{display:none}
.con-grid.lista .con-btns .cbped,.con-grid.lista .con-btns .cbcom{padding:7px 10px;font-size:11px}

/* ── FAB CARRITO ── */
#cart-fab{position:fixed;top:auto;left:auto;bottom:90px;right:20px;width:56px;height:56px;background:#fff;border:3px solid #25D366;border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.4);cursor:grab;z-index:200;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;will-change:transform}
#cart-fab:active{cursor:grabbing}
#cart-fab svg{width:26px;height:26px;fill:none;stroke:#25D366;stroke-width:1.5}
#cart-badge{position:absolute;top:-4px;right:-4px;background:#FF6B00;color:#fff;font-size:11px;font-weight:900;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
@keyframes fabIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fabShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fab-shake{animation:fabShake .3s ease}

/* ── GAME / PIZZA SHEET ── */
.game-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.game-sheet-overlay.on{opacity:1;pointer-events:all}
.game-sheet{position:fixed;bottom:0;left:0;width:100%;max-height:85vh;background:rgba(15,10,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:24px 24px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto}
.game-sheet.on{transform:translateY(0)}
.game-sheet-img{width:100%;height:400px;object-fit:cover;flex-shrink:0}
.game-sheet-img-fall{width:100%;height:400px;display:flex;align-items:center;justify-content:center;font-size:72px}
.gs-carousel{width:100%;height:180px;position:relative;overflow:hidden;border-radius:10px;margin-top:8px}
.gs-carousel-track{display:flex;height:100%;width:100%;will-change:transform;transition:transform .35s cubic-bezier(.32,.72,0,1)}
.gs-carousel-slide{width:100%;min-width:100%;height:100%;flex-shrink:0;overflow:hidden}
.gs-carousel-slide img{width:100%;height:100%;object-fit:cover;display:block}
.gs-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px}
.gs-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .2s,transform .2s}
.gs-dot.on{background:#fff;transform:scale(1.3)}
.img-viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;overflow:auto;-webkit-overflow-scrolling:touch}
.img-viewer-overlay.on{opacity:1;pointer-events:all}
.img-viewer-overlay img{max-width:100%;max-height:100vh;object-fit:contain;display:block;margin:auto;min-height:100vh}
.game-sheet-body{padding:20px;overflow-y:auto}
.game-sheet-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:8px}
.game-sheet-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.game-sheet-genre{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.game-sheet-stars{color:#FFD700;font-size:15px}
.game-sheet-price{font-size:22px;font-weight:900;color:#D62828;margin-bottom:14px}
.game-sheet-desc{font-size:14px;color:#ccc;line-height:1.7;margin-bottom:22px}
.game-sheet-btns{display:flex;gap:10px;padding-bottom:24px}
.gs-btn-cart{flex:1;background:#D62828;border:none;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;transition:background .2s,transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent}
.gs-btn-cart:active,.gs-btn-cart.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.gs-btn-cart.added{background:#25D366}
.gs-btn-share{flex:1;background:#E8A020;border:none;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent}
.gs-btn-share:active,.gs-btn-share.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}

/* ── SIZE SELECTOR ── */
.size-btn{padding:8px 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#ccc;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;white-space:nowrap}
.size-btn.on{background:#D62828;border-color:#D62828;color:#fff}

/* ── CART SHEET ── */
.cart-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-sheet-overlay.on{opacity:1;pointer-events:all}
.cart-sheet{position:fixed;bottom:0;left:0;width:100%;max-height:85vh;background:rgba(15,10,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:24px 24px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding:20px}
.cart-sheet.on{transform:translateY(0)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f0a08;border-radius:10px;margin-bottom:8px}

/* ── ORDER TYPE ── */
.otype-btn{flex:1;padding:9px 4px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#777;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;text-align:center}
.otype-btn.on{background:#D62828;border-color:#D62828;color:#fff}

/* ── GB NEW (Recién agregadas) ── */
@keyframes shine{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes borderflow{0%,100%{border-color:#E8A020}50%{border-color:#ffcc55}}
.gb-new{animation:shine 2.5s linear infinite,borderflow 2s ease-in-out infinite;border-color:#E8A020 !important;color:#E8A020 !important;border-radius:30px !important;padding:6px 16px !important;background:linear-gradient(90deg,#1a1208 30%,#E8A02020 50%,#1a1208 70%) !important;background-size:200% auto !important;box-shadow:0 0 8px rgba(232,160,32,.3),3px 3px 6px rgba(0,0,0,.5) !important;font-weight:800 !important;overflow:hidden !important;-webkit-tap-highlight-color:transparent !important}
.gb-new.on{background:linear-gradient(145deg,#E8A020,#c47a00) !important;color:#fff !important;animation:none !important;box-shadow:inset 2px 2px 5px rgba(0,0,0,.3) !important}

/* ── FEATURED BANNER ── */
#featured-banner-wrap,#featured-banner-wrap *{-webkit-tap-highlight-color:transparent}
#featured-banner-wrap:focus,#featured-banner-wrap:active,#featured-banner-wrap *:focus,#featured-banner-wrap *:active{outline:none}
.fb-arrows{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:3}
.fb-arrow{pointer-events:auto;width:30px;height:30px;margin:0 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.30);backdrop-filter:blur(6px);color:#fff;font-size:16px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fb-arrow:active{transform:scale(.92)}
.fb-dots-viewport{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:60px;overflow:hidden;pointer-events:none;z-index:3}
.fb-dots-track{display:flex;gap:6px;transition:transform .35s ease}
.fb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.fb-dot.center{background:#fff;transform:scale(1.4)}

/* ── MISC ── */
footer{text-align:center;padding:20px;color:#1e1e2e;font-size:11px;margin-top:8px}
@media(min-width:768px){.body{max-width:100%;padding:16px 30px}.swrap{max-width:100%}.hrow{max-width:100%}}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════════════════════ -->
<script src="menu.js"></script>
<script>

// ── CONFIGURACIÓN ─────────────────────────────────────────────
const WA = '5355207586'; // ← Cambiar por número real (solo dígitos)
const NOMBRE_LOCAL = 'La Pizzería';

// ── ESTADO GLOBAL ─────────────────────────────────────────────
let aG = 'Todos';
let curTab = 'juegos';
let aSort = 'az';
let orderType = 'delivery';
let cart = JSON.parse(localStorage.getItem('pizzeria_cart') || '[]');

// ── TIPO DE PEDIDO ────────────────────────────────────────────
function setOrderType(t) {
  orderType = t;
  document.querySelectorAll('.otype-btn').forEach(b => b.classList.remove('on'));
  const btn = document.getElementById('ot-' + t);
  if (btn) btn.classList.add('on');
  const tw = document.getElementById('tableNumWrap');
  if (tw) tw.style.display = t === 'table' ? 'block' : 'none';
}

// ── CARRITO ───────────────────────────────────────────────────
function toggleCart(game, btn) {
  const idx = cart.findIndex(x => x.t === game.t);
  if (idx === -1) {
    // Agregar con tamaño mediano por defecto
    const defSize = game.sizes ? (game.sizes[1] || game.sizes[0]) : null;
    const price = defSize ? defSize.price : (game.price || 0);
    const size = defSize ? defSize.label : '';
    cart.push({ t: game.t, type: 'pizza', price: '$' + price.toFixed(2), size });
    btn.textContent = '✅ Agregado';
    btn.style.background = '#25D366';
  } else {
    cart.splice(idx, 1);
    btn.textContent = '🛒 Agregar';
    btn.style.background = '';
  }
  updateCartBtn();
}

function addBebidaToCart(nombre, precio, img, btn) {
  const idx = cart.findIndex(x => x.t === nombre);
  if (idx === -1) {
    cart.push({ t: nombre, type: 'bebida', price: '$' + parseFloat(precio).toFixed(2), img });
    btn.textContent = '✅ Agregado';
    btn.style.background = '#25D366';
  } else {
    cart.splice(idx, 1);
    btn.textContent = '🛒 Agregar';
    btn.style.background = '';
  }
  updateCartBtn();
}

function updateCartBtn() {
  localStorage.setItem('pizzeria_cart', JSON.stringify(cart));
  const count = cart.length;
  const fab = document.getElementById('cart-fab');
  const badge = document.getElementById('cart-badge');
  const hbtn = document.getElementById('hcart-btn');
  const hbadge = document.getElementById('hcart-badge');
  const hicon = document.getElementById('hcart-icon');

  badge.textContent = count;
  hbadge.textContent = count;

  if (count > 0) {
    hbadge.style.display = 'flex';
    hbtn.classList.remove('empty');
    hbtn.classList.add('has-items');
    hicon.classList.add('hcart-pulse');
    setTimeout(() => hicon.classList.remove('hcart-pulse'), 400);
    hbadge.classList.remove('badge-bounce');
    void hbadge.offsetWidth;
    hbadge.classList.add('badge-bounce');
    setTimeout(() => hbadge.classList.remove('badge-bounce'), 350);
    if (fab.style.display === 'none' || fab.style.display === '') {
      fab.style.display = 'flex';
      fab.style.animation = 'fabIn .3s ease';
      setTimeout(() => fab.style.animation = '', 300);
    } else {
      fab.classList.add('fab-shake');
      setTimeout(() => fab.classList.remove('fab-shake'), 300);
    }
  } else {
    hbadge.style.display = 'none';
    hbtn.classList.remove('has-items');
    hbtn.classList.add('empty');
    fab.style.display = 'none';
  }
}

function openCart() {
  // Re-aplicar estado del orderType
  setOrderType(orderType);

  const container = document.getElementById('cartItems');
  const wappBtn = document.getElementById('cartWapp');
  container.innerHTML = '';

  if (cart.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:30px;color:#aaa;font-size:14px;line-height:2">🍕🍷🥤<br><br>¡Tu pedido está vacío...<br>Explorá el menú y elegí<br>tus pizzas favoritas!</div>`;
    wappBtn.style.display = 'none';
  } else {
    let total = 0;
    cart.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      const gameData = G.find(x => x.t === item.t);
      const imgSrc = (gameData && gameData.c) || item.img || '';
      const thumb = imgSrc
        ? `<img src="${imgSrc}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'"/>`
        : `<div style="width:44px;height:44px;border-radius:8px;background:${gameData && gameData.col ? gameData.col : '#1a1208'};flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px">${item.type === 'bebida' ? '🥤' : '🍕'}</div>`;
      div.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
          ${thumb}
          <div style="min-width:0">
            <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.t}</div>
            ${item.size ? `<div style="font-size:10px;color:#888;margin-top:1px">${item.size}</div>` : ''}
            <div style="font-size:11px;color:#E8A020;margin-top:2px">${item.price}</div>
          </div>
        </div>
        <button onclick="removeFromCart(${i})" style="background:rgba(255,255,255,.1);border:none;border-radius:8px;color:#ff6b6b;padding:6px 10px;cursor:pointer;font-size:16px;flex-shrink:0">✕</button>`;
      container.appendChild(div);
      total += parseFloat(item.price.replace(/[^0-9.]/g, '')) || 0;
    });

    // Total
    const totalDiv = document.createElement('div');
    totalDiv.innerHTML = `<div style="text-align:right;padding:10px 4px;font-size:14px;font-weight:900;color:#fff;border-top:1px solid rgba(255,255,255,.1);margin-top:4px">Total estimado: <span style="color:#E8A020">$${total.toFixed(2)}</span></div>`;
    container.appendChild(totalDiv);
    wappBtn.style.display = 'block';
  }

  document.getElementById('cartOverlay').classList.add('on');
  document.getElementById('cartModal').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('on');
  document.getElementById('cartModal').classList.remove('on');
  document.body.style.overflow = '';
}

function removeFromCart(i) {
  cart.splice(i, 1);
  updateCartBtn();
  render();
  openCart();
}

function sendCartWhatsApp() {
  const tableNum = document.getElementById('tableNumInput')?.value?.trim();
  const typeLabel = { delivery: '🛵 Delivery', takeaway: '🥡 Para llevar', table: '🍽️ En mesa' }[orderType];

  let msg = `🍕 *Pedido — ${NOMBRE_LOCAL}*\n`;
  msg += `📋 *${typeLabel}*`;
  if (orderType === 'table' && tableNum) msg += ` N°${tableNum}`;
  msg += `\n\n`;

  let total = 0;
  cart.forEach((item, i) => {
    msg += `${i + 1}. *${item.t}*`;
    if (item.size) msg += ` (${item.size})`;
    msg += ` — ${item.price}\n`;
    total += parseFloat(item.price.replace(/[^0-9.]/g, '')) || 0;
  });

  msg += `\n💰 *Total aprox: $${total.toFixed(2)}*`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── BEBIDAS ───────────────────────────────────────────────────
function loadBebidas() {
  const cg = document.getElementById('congrid');
  const cl = document.getElementById('con-loading');
  if (cg.children.length > 0) { cl.style.display = 'none'; return; }

  if (typeof BEBIDAS === 'undefined') {
    cl.textContent = '⚠️ No se encontró bebidas.js';
    return;
  }

  cl.style.display = 'none';
  BEBIDAS.forEach(b => {
    const d = document.createElement('div');
    d.className = 'con-card';
    const disponible = b.disponible !== false;
    d.innerHTML = `
      ${b.img
        ? `<img class="con-img" src="${b.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${b.nombre}"/>
           <div class="con-img-fall" style="display:none">${b.emoji || '🥤'}</div>`
        : `<div class="con-img-fall">${b.emoji || '🥤'}</div>`
      }
      <div class="con-info">
        <div class="con-name">${b.nombre}</div>
        <div class="${disponible ? 'con-stock-si' : 'con-stock-no'}">${disponible ? '✅ Disponible' : '❌ Agotado'}</div>
        <div class="con-specs">${b.specs || ''}</div>
        <div class="con-price">$${parseFloat(b.precio).toFixed(2)}</div>
        <div class="con-btns">
          <button class="cbped" data-img="${b.img || ''}" ${!disponible ? 'disabled style="opacity:.35;cursor:not-allowed"' : ''}
            onclick="addBebidaToCart('${b.nombre}','${b.precio}','${b.img || ''}',this)">
            🛒 Agregar
          </button>
          <button class="cbcom" onclick="compartirBebida('${b.nombre}','${b.precio}',event)">📤 Compartir</button>
        </div>
      </div>`;
    cg.appendChild(d);
  });
}

function compartirBebida(nombre, precio, e) {
  e.stopPropagation();
  const msg = `🥤 *${nombre}*\n💰 $${parseFloat(precio).toFixed(2)}\n\n📲 Pedidos: wa.me/${WA}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── TABS ──────────────────────────────────────────────────────
function setTab(t, pushState = true) {
  if (pushState) history.pushState({ tab: t }, '');
  curTab = t;
  ['juegos', 'noticias', 'bebidas'].forEach(id => {
    const btn = document.getElementById('tab-' + id);
    btn.className = 'navtab ' + (t === id ? 'on' : 'off');
  });
  const active = document.getElementById('tab-' + t);
  active.classList.add('navtab-spring');
  setTimeout(() => active.classList.remove('navtab-spring'), 350);

  document.getElementById('sec-juegos').style.display = t === 'juegos' ? 'block' : 'none';
  document.getElementById('sec-bebidas').style.display = t === 'bebidas' ? 'block' : 'none';
  document.getElementById('sec-noticias').style.display = t === 'noticias' ? 'block' : 'none';
  document.getElementById('si').style.display = t === 'juegos' ? 'block' : 'none';

  if (t === 'bebidas') loadBebidas();
}

// ── SHEET DE DETALLE (PIZZA) ──────────────────────────────────
function openGameSheet(game) {
  history.pushState({ modal: 'gameSheet' }, '');
  const overlay = document.getElementById('gsOverlay');
  const sheet = document.getElementById('gameSheet');

  document.getElementById('gsTitle').textContent = game.t;
  document.getElementById('gsGenre').textContent = game.g;
  document.getElementById('gsStars').textContent = stars(game.r);
  document.getElementById('gsRating').textContent = '⭐ ' + game.r + '/5';
  document.getElementById('gsDesc').textContent = game.d || '';

  // Imagen principal
  const imgWrap = document.getElementById('gsImgWrap');
  imgWrap.innerHTML = game.c
    ? `<img class="game-sheet-img" src="${game.c}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="game-sheet-img-fall" style="display:none;background:${game.col}">🍕</div>`
    : `<div class="game-sheet-img-fall" style="background:${game.col}">🍕</div>`;

  // Fotos / carousel
  const allPhotos = (game.fotos || []).filter(Boolean);
  const capturas = document.getElementById('gsCapturas');
  if (allPhotos.length > 0) {
    const slides = allPhotos.map(url =>
      `<div class="gs-carousel-slide"><img src="${url}" onerror="this.style.display='none'" onclick="openImgViewer('${url}')" style="width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in"/></div>`
    ).join('');
    const dots = allPhotos.length > 1
      ? `<div class="gs-dots">${allPhotos.map((_, i) => `<div class="gs-dot${i === 0 ? ' on' : ''}"></div>`).join('')}</div>` : '';
    capturas.innerHTML = `<div style="font-size:13px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:.5px">FOTOS</div><div class="gs-carousel"><div class="gs-carousel-track">${slides}</div>${dots}</div>`;
    capturas.style.display = 'block';
    const track = capturas.querySelector('.gs-carousel-track');
    const dotEls = capturas.querySelectorAll('.gs-dot');
    let currentSlide = 0;
    const goToSlide = n => {
      currentSlide = Math.max(0, Math.min(n, allPhotos.length - 1));
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dotEls.forEach((d, i) => d.classList.toggle('on', i === currentSlide));
    };
    let tsX = 0, tsY = 0;
    track.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, { passive: true });
    track.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tsX;
      const dy = e.changedTouches[0].clientY - tsY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) goToSlide(currentSlide + (dx < 0 ? 1 : -1));
    }, { passive: true });
  } else {
    capturas.style.display = 'none';
  }

  // ── Selector de tamaño ──
  const sizeWrap = document.getElementById('gsSizeWrap');
  const sizeBtns = document.getElementById('gsSizeBtns');
  sizeBtns.innerHTML = '';
  const cartBtn = document.getElementById('gsCartBtn');

  let selectedSize = null;

  if (game.sizes && game.sizes.length > 0) {
    sizeWrap.style.display = 'block';
    selectedSize = game.sizes[Math.min(1, game.sizes.length - 1)]; // default: mediana o la única

    game.sizes.forEach((sz, i) => {
      const b = document.createElement('button');
      b.className = 'size-btn' + (sz === selectedSize ? ' on' : '');
      b.textContent = `${sz.label} ${sz.cm}cm · $${sz.price.toFixed(2)}`;
      b.onclick = () => {
        selectedSize = sz;
        sizeBtns.querySelectorAll('.size-btn').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        document.getElementById('gsPrice').textContent = `$${sz.price.toFixed(2)}`;
        // Actualizar estado del botón
        const inCart = cart.some(x => x.t === game.t);
        if (!inCart) {
          cartBtn.textContent = '🛒 Agregar';
          cartBtn.className = 'gs-btn-cart';
        }
      };
      sizeBtns.appendChild(b);
    });

    document.getElementById('gsPrice').textContent = `$${selectedSize.price.toFixed(2)}`;
  } else {
    sizeWrap.style.display = 'none';
    document.getElementById('gsPrice').textContent = game.price ? `$${game.price.toFixed(2)}` : '';
  }

  // Botón carrito
  const inCart = cart.some(x => x.t === game.t);
  cartBtn.textContent = inCart ? '✅ Agregado' : '🛒 Agregar';
  cartBtn.className = 'gs-btn-cart' + (inCart ? ' added' : '');
  cartBtn.onclick = () => {
    const idx = cart.findIndex(x => x.t === game.t);
    if (idx === -1) {
      const price = selectedSize ? selectedSize.price : (game.price || 0);
      const size = selectedSize ? selectedSize.label : '';
      cart.push({ t: game.t, type: 'pizza', price: '$' + price.toFixed(2), size });
      cartBtn.textContent = '✅ Agregado';
      cartBtn.className = 'gs-btn-cart added';
    } else {
      cart.splice(idx, 1);
      cartBtn.textContent = '🛒 Agregar';
      cartBtn.className = 'gs-btn-cart';
    }
    updateCartBtn();
  };

  document.getElementById('gsShareBtn').onclick = () => compartir(game, { stopPropagation: () => {} });
  overlay.classList.add('on');
  sheet.classList.add('on');
  document.body.style.overflow = 'hidden';
}

// ── FILTROS / SORT ────────────────────────────────────────────
function setSort(v) {
  aSort = v;
  ['az', 'rating', 'genre'].forEach(x => {
    document.getElementById('sbtn-' + x).classList.toggle('on', x === v);
  });
  render();
}

function stars(n) {
  const f = Math.floor(n), h = n % 1 >= .5;
  return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(5 - f - (h ? 1 : 0));
}

function filtered() {
  const q = document.getElementById('si').value.toLowerCase().trim();
  let list = [...G];

  if (aG === '__new__') list = G.slice(-6).reverse();
  else if (aG !== 'Todos') list = list.filter(x => x.g === aG);

  if (q) {
    const words = q.split(' ').filter(w => w.length > 0);
    list = list.filter(x => words.every(w =>
      x.t.toLowerCase().includes(w) ||
      x.g.toLowerCase().includes(w) ||
      (x.d && x.d.toLowerCase().includes(w))
    ));
  }

  if (aSort === 'az') list.sort((a, b) => a.t.localeCompare(b.t));
  else if (aSort === 'rating') list.sort((a, b) => b.r - a.r);
  else if (aSort === 'genre') list.sort((a, b) => a.g.localeCompare(b.g) || a.t.localeCompare(b.t));

  return list;
}

// ── GLOW POR RATING ───────────────────────────────────────────
function getCardGlowByRating(r) {
  const rating = Number(r) || 0;
  if (rating >= 4.8) return { border: 'rgba(0,255,159,.38)', glow: 'rgba(0,255,159,.28)' };
  if (rating >= 4.5) return { border: 'rgba(232,160,32,.34)', glow: 'rgba(232,160,32,.24)' };
  if (rating >= 4.2) return { border: 'rgba(214,40,40,.32)', glow: 'rgba(214,40,40,.22)' };
  if (rating >= 4.0) return { border: 'rgba(192,132,252,.30)', glow: 'rgba(192,132,252,.20)' };
  return { border: 'rgba(255,255,255,.06)', glow: 'transparent' };
}

// ── RENDER GRID ───────────────────────────────────────────────
function render() {
  const list = filtered();
  const cntEl = document.getElementById('juegos-cnt');
  if (cntEl) cntEl.textContent = list.length < G.length
    ? list.length + ' de ' + G.length + ' pizzas'
    : G.length + ' pizzas';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!list.length) {
    const q = document.getElementById('si').value.trim();
    grid.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" style="margin-bottom:12px">
        <path d="M12 2L3 21h18L12 2z"/>
        <circle cx="12" cy="16" r="1.2" fill="rgba(255,255,255,0.15)" stroke="none"/>
      </svg>
      <p style="font-size:14px;font-weight:700;color:#444;margin-bottom:6px">Sin resultados</p>
      <p style="font-size:12px;color:#333">${q ? 'No encontramos "' + q + '" — probá con otro nombre' : 'No hay pizzas en esta categoría'}</p>
    </div>`;
    return;
  }

  list.forEach(game => {
    const card = document.createElement('div');
    card.className = 'card';
    const glowCfg = getCardGlowByRating(game.r);
    card.style.setProperty('--gcol-border', glowCfg.border);
    card.style.setProperty('--gcol-glow-soft', glowCfg.glow);

    const priceDisplay = game.price ? 'Desde $' + game.price.toFixed(2) : '';
    const inCart = cart.some(x => x.t === game.t);

    card.innerHTML = `
      <div class="cimg" style="background:${game.col}">
        ${game.badge ? `<div class="ribbon-wrap"><div class="ribbon ribbon-${game.badge.toLowerCase()}">${game.badge}</div></div>` : ''}
        ${game.c ? `<img src="${game.c}" alt="${game.t}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}
        <div class="fall" style="${!game.c ? 'display:flex;' : ''}background:${game.col}">
          <img src="logo.png" alt="" onerror="this.outerHTML='<span style=font-size:38px>🍕</span>'"/>
          <p>${game.t}</p>
        </div>
        <div class="bg ${game.badge ? 'con-ribbon' : ''}">${game.g}</div>
        <div class="bp">${priceDisplay}</div>
        <div class="ov">
          <div class="ovt">${game.t}</div>
          <div class="ovd">⭐ ${game.r}/5 · ${game.g}</div>
          <div class="ovs">${stars(game.r)}</div>
          <div style="font-size:10px;color:#ccc;margin-top:4px;line-height:1.5">${game.d || ''}</div>
        </div>
      </div>
      <div class="cfoot">
        <div class="ctit">${game.t}</div>
        ${game.s ? `<div class="csize">${game.s}</div>` : ''}
        <div class="cbtns">
          <button class="bped" onclick="toggleCart(${JSON.stringify(game).replace(/"/g, '&quot;')},this)"
            style="${inCart ? 'background:#25D366' : ''}">
            ${inCart ? '✅ Agregado' : '🛒 Agregar'}
          </button>
          <button class="bcom" onclick="compartir(${JSON.stringify(game).replace(/"/g, '&quot;')},event)">📤 Compartir</button>
        </div>
      </div>`;

    card.querySelector('.cimg').onclick = () => openGameSheet(game);
    grid.appendChild(card);
  });
}

// ── BANNER DESTACADO ──────────────────────────────────────────
function initFeaturedBanner() {
  const wrap = document.getElementById('featured-banner-wrap');
  if (!wrap || typeof G === 'undefined') return;
  const topGames = G.filter(g => g.r >= 4.7).sort((a, b) => b.r - a.r);
  if (!topGames.length) return;

  let currentIndex = 0, isPaused = false;

  const slides = topGames.map((g, i) =>
    `<div class="fb-slide" style="position:absolute;inset:0;opacity:${i === 0 ? '1' : '0'};transition:opacity .6s ease;pointer-events:${i === 0 ? 'all' : 'none'}">` +
    `<img src="${g.c || ''}" style="width:100%;height:100%;object-fit:cover;object-position:center;display:block;background:#0f0a08" onerror="this.style.display='none'">` +
    `<div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.85))"></div>` +
    `<div style="position:absolute;bottom:14px;left:14px;right:80px">` +
    `<div style="font-size:9px;font-weight:800;color:#fff;background:${g.col};display:inline-block;padding:3px 8px;border-radius:10px;margin-bottom:6px">${g.g}</div>` +
    `<div style="font-size:16px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:4px">${g.t}</div>` +
    `<div style="font-size:11px;color:rgba(255,255,255,.6)">${g.s ? g.s + ' &nbsp;·&nbsp; ' : ''} ${g.r}/5 ⭐</div>` +
    `</div></div>`
  ).join('');

  wrap.style.cssText = 'border-radius:16px;overflow:hidden;cursor:pointer;position:relative;height:190px;margin-bottom:12px;border:1px solid rgba(255,255,255,.10);box-shadow:0 4px 20px rgba(0,0,0,.65)';
  wrap.innerHTML = slides + `
    <div class="fb-arrows">
      <div class="fb-arrow" onclick="event.stopPropagation();fbPrev()">‹</div>
      <div class="fb-arrow" onclick="event.stopPropagation();fbNext()">›</div>
    </div>
    <div class="fb-dots-viewport">
      <div class="fb-dots-track" id="fbDotsTrack">
        <div class="fb-dot"></div><div class="fb-dot"></div>
        <div class="fb-dot center"></div>
        <div class="fb-dot"></div><div class="fb-dot"></div>
      </div>
    </div>`;

  wrap.onclick = function () { openGameSheet(topGames[currentIndex]); };

  window.fbGoTo = function (n) {
    const sEls = wrap.querySelectorAll('.fb-slide');
    sEls[currentIndex].style.opacity = '0';
    sEls[currentIndex].style.pointerEvents = 'none';
    currentIndex = (n + topGames.length) % topGames.length;
    sEls[currentIndex].style.opacity = '1';
    sEls[currentIndex].style.pointerEvents = 'all';
  };
  window.fbPrev = function () { window.fbGoTo(currentIndex - 1); };
  window.fbNext = function () { window.fbGoTo(currentIndex + 1); };

  wrap.addEventListener('touchstart', () => { isPaused = true; }, { passive: true });
  wrap.addEventListener('touchend', () => { setTimeout(() => { isPaused = false; }, 2500); }, { passive: true });
  setInterval(() => { if (!isPaused) window.fbGoTo(currentIndex + 1); }, 4500);
}

// ── FAB DRAGGABLE ─────────────────────────────────────────────
(function () {
  const fab = document.getElementById('cart-fab');
  let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0, moved = false, activePointerId = null, suppressClick = false;

  function finishDrag() {
    if (!dragging) return;
    dragging = false;
    if (!moved) return;
    const r = fab.getBoundingClientRect();
    const sw = window.innerWidth, sh = window.innerHeight;
    const snapLeft = r.left + r.width / 2 < sw / 2;
    const nextLeft = snapLeft ? 12 : sw - r.width - 12;
    const nextTop = Math.min(Math.max(r.top, 12), sh - r.height - 12);
    fab.style.transition = 'left .25s ease, top .25s ease';
    fab.style.left = nextLeft + 'px';
    fab.style.top = nextTop + 'px';
    suppressClick = true;
    setTimeout(() => { suppressClick = false; }, 250);
  }

  fab.addEventListener('pointerdown', e => {
    activePointerId = e.pointerId; dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY;
    const r = fab.getBoundingClientRect();
    origX = r.left; origY = r.top;
    fab.style.transition = 'none'; fab.style.right = 'auto'; fab.style.bottom = 'auto';
    fab.style.left = origX + 'px'; fab.style.top = origY + 'px';
    if (fab.setPointerCapture) fab.setPointerCapture(e.pointerId);
  });
  fab.addEventListener('pointermove', e => {
    if (!dragging || e.pointerId !== activePointerId) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 12 || Math.abs(dy) > 12) moved = true;
    if (moved) {
      fab.style.left = Math.min(Math.max(origX + dx, 12), window.innerWidth - fab.offsetWidth - 12) + 'px';
      fab.style.top = Math.min(Math.max(origY + dy, 12), window.innerHeight - fab.offsetHeight - 12) + 'px';
    }
  });
  fab.addEventListener('pointerup', e => { if (e.pointerId !== activePointerId) return; finishDrag(); activePointerId = null; });
  fab.addEventListener('pointercancel', e => { if (e.pointerId !== activePointerId) return; finishDrag(); activePointerId = null; });
  fab.addEventListener('click', e => { if (suppressClick) { e.preventDefault(); e.stopPropagation(); } }, true);
})();
