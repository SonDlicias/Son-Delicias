let _currentGameSheet = null;

function openGameSheet(game) {
  // Bloquear si está agotada
  if (getInventoryState(game.t) === 'Agotada') return;
  _currentGameSheet = game.t;

  history.pushState({ modal: 'gameSheet' }, '');
  const overlay = document.getElementById('gsOverlay');
  const sheet = document.getElementById('gameSheet');

  document.getElementById('gsTitle').textContent = game.t;
  document.getElementById('gsGenre').textContent = game.g;
  const _lr = ratingsCache[game.t];
  if (_lr && _lr.count > 0) {
    document.getElementById('gsStars').textContent = stars(_lr.avg);
    document.getElementById('gsRating').textContent = '⭐ ' + _lr.avg + '/5 (' + _lr.count + ')';
  } else {
    document.getElementById('gsStars').textContent = '';
    document.getElementById('gsRating').textContent = 'Sin valoraciones aún';
  }
  document.getElementById('gsDesc').textContent = game.d || '';

  // Imagen principal
  const imgWrap = document.getElementById('gsImgWrap');
  imgWrap.innerHTML = game.c
    ? `<img class="game-sheet-img" src="${game.c}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="game-sheet-img-fall" style="display:none;background:${game.col}">🍕</div>`
    : `<div class="game-sheet-img-fall" style="background:${game.col}">🍕</div>`;

  // Fotos / carousel
  const allPhotos = (game.fotos || []).filter(Boolean);
  const capturas = document.getElementById('gsCapturas');
  if (allPhotos.length > 0) {
    const slides = allPhotos.map(url =>
      `<div class="gs-carousel-slide"><img src="${url}" onerror="this.style.display='none'" onclick="openImgViewer('${url}')" style="width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in"/></div>`
    ).join('');
    const dots = allPhotos.length > 1
      ? `<div class="gs-dots">${allPhotos.map((_, i) => `<div class="gs-dot${i === 0 ? ' on' : ''}"></div>`).join('')}</div>` : '';
    capturas.innerHTML = `<div style="font-size:13px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:.5px">FOTOS</div><div class="gs-carousel"><div class="gs-carousel-track">${slides}</div>${dots}</div>`;
    capturas.style.display = 'block';
    const track = capturas.querySelector('.gs-carousel-track');
    const dotEls = capturas.querySelectorAll('.gs-dot');
    let currentSlide = 0;
    const goToSlide = n => {
      currentSlide = Math.max(0, Math.min(n, allPhotos.length - 1));
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dotEls.forEach((d, i) => d.classList.toggle('on', i === currentSlide));
    };
    let tsX = 0, tsY = 0;
    track.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, { passive: true });
    track.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tsX;
      const dy = e.changedTouches[0].clientY - tsY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) goToSlide(currentSlide + (dx < 0 ? 1 : -1));
    }, { passive: true });
  } else {
    capturas.style.display = 'none';
  }

  // ── Selector de tamaño ──
  const sizeWrap = document.getElementById('gsSizeWrap');
  const sizeBtns = document.getElementById('gsSizeBtns');
  sizeBtns.innerHTML = '';
  const cartBtn = document.getElementById('gsCartBtn');

  let selectedSize = null;
  let modalQty = 1;

  // Recuperar qty actual si ya está en carrito
  const existingItem = cart.find(x => x.t === game.t);
  if (existingItem) modalQty = existingItem.qty || 1;

  // ── Selector de cantidad en modal ──
  const qtyWrapId = 'gs-qty-wrap';
  let qtyWrapEl = document.getElementById(qtyWrapId);
  if (!qtyWrapEl) {
    qtyWrapEl = document.createElement('div');
    qtyWrapEl.id = qtyWrapId;
    cartBtn.parentNode.insertBefore(qtyWrapEl, cartBtn);
  }
  const renderModalQty = () => {
    qtyWrapEl.innerHTML = `
      <div class="modal-qty-wrap">
        <span class="modal-qty-lbl">Cantidad</span>
        <button class="modal-qty-btn" id="mqty-minus">−</button>
        <span class="modal-qty-num" id="mqty-num">${modalQty}</span>
        <button class="modal-qty-btn" id="mqty-plus">+</button>
      </div>`;
    document.getElementById('mqty-minus').onclick = () => { modalQty = Math.max(1, modalQty - 1); document.getElementById('mqty-num').textContent = modalQty; syncCartBtnLabel(); };
    document.getElementById('mqty-plus').onclick = () => { modalQty++; document.getElementById('mqty-num').textContent = modalQty; syncCartBtnLabel(); };
  };
  renderModalQty();

  const syncCartBtnLabel = () => {
    const idx = cart.findIndex(x => x.t === game.t);
    if (idx !== -1) {
      cartBtn.textContent = `✅ Actualizar (${modalQty})`;
      cartBtn.className = 'gs-btn-cart added';
    } else {
      cartBtn.innerHTML = `${CART_SVG} Agregar (${modalQty})`;
      cartBtn.className = 'gs-btn-cart';
    }
  };

  if (game.sizes && game.sizes.length > 0) {
    sizeWrap.style.display = 'block';
    // Si ya está en carrito, usar su tamaño; si no, default mediana
    if (existingItem && existingItem.size) {
      selectedSize = game.sizes.find(s => s.label === existingItem.size) || game.sizes[Math.min(1, game.sizes.length - 1)];
    } else {
      selectedSize = game.sizes[Math.min(1, game.sizes.length - 1)];
    }

    game.sizes.forEach((sz) => {
      const b = document.createElement('button');
      b.className = 'size-btn' + (sz === selectedSize ? ' on' : '');
      b.textContent = `${sz.label} ${sz.cm}cm · ${_cup(sz.price)}`;
      b.onclick = () => {
        selectedSize = sz;
        sizeBtns.querySelectorAll('.size-btn').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        document.getElementById('gsPrice').textContent = _cup(sz.price);
        // Si ya está en carrito, actualizar tamaño y precio en tiempo real
        const idx = cart.findIndex(x => x.t === game.t);
        if (idx !== -1) {
          cart[idx].size = sz.label;
          cart[idx].unitPrice = sz.price;
          cart[idx].price = sz.price.toFixed(0) + ' CUP';
          updateCartBtn();
          _syncCartBtns();
        }
        syncCartBtnLabel();
      };
      sizeBtns.appendChild(b);
    });

    document.getElementById('gsPrice').textContent = _cup(selectedSize.price);
  } else {
    sizeWrap.style.display = 'none';
    document.getElementById('gsPrice').textContent = game.price ? _cup(game.price) : '';
  }

  // Botón carrito
  syncCartBtnLabel();
  cartBtn.onclick = () => {
    const idx = cart.findIndex(x => x.t === game.t);
    if (idx === -1) {
      const unitPrice = selectedSize ? selectedSize.price : (game.price || 0);
      const size = selectedSize ? selectedSize.label : '';
      cart.push({ t: game.t, type: 'pizza', unitPrice, price: unitPrice.toFixed(0) + ' CUP', size, qty: modalQty });
    } else {
      // Actualizar tamaño, precio y cantidad
      const unitPrice = selectedSize ? selectedSize.price : (cart[idx].unitPrice || 0);
      cart[idx].unitPrice = unitPrice;
      cart[idx].price = unitPrice.toFixed(0) + ' CUP';
      if (selectedSize) cart[idx].size = selectedSize.label;
      cart[idx].qty = modalQty;
    }
    updateCartBtn();
    _syncCartBtns();
    syncCartBtnLabel();
  };

  // Widget de valoración
  renderRatingWidget(game.t);

  overlay.classList.add('on');
  sheet.classList.add('on');
  document.body.style.overflow = 'hidden';
  // Período de gracia: bloquea clics en el overlay 350ms tras abrir
  // para que ningún ghost-click móvil lo cierre inmediatamente
  overlay.style.pointerEvents = 'none';
  setTimeout(() => { overlay.style.pointerEvents = ''; }, 350);
}

function setSort(v) {
  aSort = v;
  ['az', 'rating', 'genre'].forEach(x => {
    document.getElementById('sbtn-' + x).classList.toggle('on', x === v);
  });
  render();

function stars(n) {
  if (!n || n <= 0) return '';
  const f = Math.floor(n), h = n % 1 >= .5;
  return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(5 - f - (h ? 1 : 0));
}

function liveRating(nombre) {
  return ratingsCache[nombre] || null;
}

function filtered() {
  const q = document.getElementById('si').value.toLowerCase().trim();
  let list = [...G];

  if (aG === '__new__') list = G.slice(-6).reverse();
  else if (aG !== 'Todos') list = list.filter(x => x.g === aG);

  if (q) {
    const words = q.split(' ').filter(w => w.length > 0);
    list = list.filter(x => words.every(w =>
      x.t.toLowerCase().includes(w) ||
      x.g.toLowerCase().includes(w) ||
      (x.d && x.d.toLowerCase().includes(w))
    ));
  }

  if (aSort === 'az') list.sort((a, b) => a.t.localeCompare(b.t));
  else if (aSort === 'rating') list.sort((a, b) => b.r - a.r);
  else if (aSort === 'genre') list.sort((a, b) => a.g.localeCompare(b.g) || a.t.localeCompare(b.t));

  return list;
}

// ── GLOW POR RATING ───────────────────────────────────────────
function getCardGlowByRating(r) {
  const rating = Number(r) || 0;
  if (rating >= 4.8) return { border: 'rgba(0,255,159,.38)', glow: 'rgba(0,255,159,.28)' };
  if (rating >= 4.5) return { border: 'rgba(232,160,32,.34)', glow: 'rgba(232,160,32,.24)' };
  if (rating >= 4.2) return { border: 'rgba(214,40,40,.32)', glow: 'rgba(214,40,40,.22)' };
  if (rating >= 4.0) return { border: 'rgba(192,132,252,.30)', glow: 'rgba(192,132,252,.20)' };
  return { border: 'rgba(255,255,255,.06)', glow: 'transparent' };
}

// ── HELPER: tap sin ghost-click móvil ─────────────────────────
// En móvil usa touchend+preventDefault para cancelar el click sintético
// que el browser genera ~300ms después y que aterrizaría en el overlay.
// En escritorio usa click normal.
function _bindCardTap(el, handler, excludeSel) {
  let _moved = false;
  el.addEventListener('touchstart', () => { _moved = false; }, { passive: true });
  el.addEventListener('touchmove',  () => { _moved = true;  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (_moved) return;
    if (excludeSel && e.target.closest(excludeSel)) return;
    e.preventDefault();
    handler(e);
  });
  el.addEventListener('click', e => {
    if (excludeSel && e.target.closest(excludeSel)) return;
    handler(e);
  });
}

// ── RENDER (carousel o grid según contexto) ───────────────────
function render() {
  const q = document.getElementById('si').value.trim();
  const isDefault = (aG === 'Todos' && q === '');
  const grid = document.getElementById('grid');
  const carouselView = document.getElementById('carousel-view');

    grid.style.display = 'none';
    carouselView.style.display = '';
    if (filterTbar) filterTbar.style.display = 'none';
    renderCarousels();
    return;
  }

  // Grid view for filtered/search
  carouselView.style.display = 'none';
  grid.style.display = '';
  if (filterTbar) filterTbar.style.display = '';

  const list = filtered();
  const cntEl = document.getElementById('juegos-cnt');
  if (cntEl) cntEl.textContent = list.length < G.length
    ? list.length + ' de ' + G.length + ' pizzas'
    : G.length + ' pizzas';

  grid.innerHTML = '';

  if (!list.length) {
    const q = document.getElementById('si').value.trim();
    grid.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" style="margin-bottom:12px">
        <path d="M12 2L3 21h18L12 2z"/>

      <p style="font-size:12px;color:#333">${q ? 'No encontramos "' + q + '" — probá con otro nombre' : 'No hay pizzas en esta categoría'}</p>
    </div>`;
    return;
  }

  list.forEach(game => {
    const invState = getInventoryState(game.t);
    if (invState === 'Oculta') return; // no mostrar

    const card = document.createElement('div');
    card.className = 'card' + (invState === 'Agotada' ? ' card-agotada' : '');

    const gridUrgencyHtml = game._urgencia ? '<div class="cc-urgency"><span class="cc-urgency-tag ' + _gUrgClass + '">' + game._urgencia + '</span></div>' : '';
    const gameJson = JSON.stringify(game).replace(/"/g, '&quot;');

    card.innerHTML = `
      <div class="cimg" style="background:${game.col}">
        ${agotadaTag}
        ${gridLabelHtml}
        ${game.c ? `<img src="${game.c}" alt="${game.t}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}
        ${gridUrgencyHtml}
        <div class="fall" style="${!game.c ? 'display:flex;' : ''}background:${game.col}">
          <img src="logo-app.png" alt="" onerror="this.outerHTML='<span style=font-size:38px>🍕</span>'"/>
          <p>${game.t}</p>
        </div>
        <div class="bg">${game.g}</div>
        <div class="bp">${priceDisplay}</div>
        <div class="ov">
          <div class="ovt">${game.t}</div>
          <div class="ovd"><span data-cardrating="${game.t}"></span> ${game.g}</div>
          <div class="ovs"><span data-cardstars="${game.t}"></span></div>
          <div style="font-size:10px;color:#ccc;margin-top:4px;line-height:1.5">${game.d || ''}</div>
        </div>
        ${invState !== 'Agotada' ? `<button class="card-cart-btn${inCart?' in-cart':''}" data-t="${game.t.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();quickAddToCart(${gameJson},this)">${inCart?'✓':CART_SVG}</button>` : ''}
      </div>
      <div class="cfoot">
        <div class="ctit">${game.t}</div>
        ${game.s ? `<div class="csize">${game.s}</div>` : ''}

    }
    grid.appendChild(card);
  });
}

  const slides = G.filter(g => g.featured).slice(0, 6);
  if (!slides.length) { hero.style.display = 'none'; return; }

  let cur = 0, paused = false, autoTimer = null;

  const track = document.createElement('div');
  track.className = 'hero-track';

  slides.forEach((g, i) => {

// ── FAB DRAGGABLE ─────────────────────────────────────────────
(function () {
  const fab = document.getElementById('cart-fab');
  let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0, moved = false, activePointerId = null, suppressClick = false;

  function finishDrag() {
    if (!dragging) return;
    dragging = false;
    if (!moved) return;
    const r = fab.getBoundingClientRect();
    const sw = window.innerWidth, sh = window.innerHeight;
    const snapLeft = r.left + r.width / 2 < sw / 2;
    const nextLeft = snapLeft ? 12 : sw - r.width - 12;
    const nextTop = Math.min(Math.max(r.top, 12), sh - r.height - 12);
    fab.style.transition = 'left .25s ease, top .25s ease';
    fab.style.left = nextLeft + 'px';
    fab.style.top = nextTop + 'px';
    suppressClick = true;
    setTimeout(() => { suppressClick = false; }, 250);
  }

  fab.addEventListener('pointerdown', e => {
    activePointerId = e.pointerId; dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY;
    const r = fab.getBoundingClientRect();
    origX = r.left; origY = r.top;
    fab.style.transition = 'none'; fab.style.right = 'auto'; fab.style.bottom = 'auto';
    fab.style.left = origX + 'px'; fab.style.top = origY + 'px';
    if (fab.setPointerCapture) fab.setPointerCapture(e.pointerId);
  });
  fab.addEventListener('pointermove', e => {
    if (!dragging || e.pointerId !== activePointerId) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 12 || Math.abs(dy) > 12) moved = true;
    if (moved) {
      fab.style.left = Math.min(Math.max(origX + dx, 12), window.innerWidth - fab.offsetWidth - 12) + 'px';
      fab.style.top = Math.min(Math.max(origY + dy, 12), window.innerHeight - fab.offsetHeight - 12) + 'px';
    }
  });
  fab.addEventListener('pointerup', e => { if (e.pointerId !== activePointerId) return; finishDrag(); activePointerId = null; });
  fab.addEventListener('pointercancel', e => { if (e.pointerId !== activePointerId) return; finishDrag(); activePointerId = null; });
  fab.addEventListener('click', e => { if (suppressClick) { e.preventDefault(); e.stopPropagation(); } }, true);
})();

let _autoLabels = {};

function _processAutoLabels() {
  _autoLabels = {};
  if (!ratingsCache || !Object.keys(ratingsCache).length) return;

  let maxCount = 0, maxCountName = '';
  let bestAvg = 0, bestAvgName = '';
  const byCount = [];

  Object.entries(ratingsCache).forEach(([nombre, data]) => {
    if (!data || !data.count) return;
    const isInMenu = G.some(g => g.t === nombre);
    if (!isInMenu) return;
    if (data.count >= 3) byCount.push({ nombre, count: data.count, avg: data.avg });
    if (data.count >= 5 && data.count > maxCount) { maxCount = data.count; maxCountName = nombre; }
    if (data.count >= 3 && data.avg >= 4.5 && data.avg > bestAvg) { bestAvg = data.avg; bestAvgName = nombre; }
  });

  if (maxCountName) _autoLabels[maxCountName] = { type: 'mas-pedida', text: '\uD83D\uDD25 MÁS PEDIDA' };
  if (bestAvgName && bestAvgName !== maxCountName) _autoLabels[bestAvgName] = { type: 'top-valorada', text: 'TOP \u2B50' };
}

function _mapBadgeClass(text) {
  if (!text) return 'cb-default';
  var t = text.toLowerCase();
  if (t.includes('oferta')) return 'cb-oferta';
  if (t.includes('combo')) return 'cb-combo';
  if (t.includes('recomendada')) return 'cb-recomendada';
  if (t.includes('especialidad')) return 'cb-especialidad';
  if (t.includes('nueva')) return 'cb-nueva';
  if (t.includes('pedida')) return 'cb-mas-pedida';
  if (t.includes('de la casa') || t.includes('casa')) return 'cb-de-la-casa';
  return 'cb-default';
}

function _escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function _getProductLabelsHtml(g) {
  var html = '';
  var manual = g._etiquetaComercial;
  var auto = _autoLabels[g.t];
  if (manual && auto) {
    html = '<div class="cc-label-wrap">';
    html += '<span class="cc-commercial-badge ' + _mapBadgeClass(manual) + '">' + _escHtml(manual) + '</span>';
    html += '</div>';
  } else if (manual) {
    html = '<div class="cc-label-wrap"><span class="cc-commercial-badge ' + _mapBadgeClass(manual) + '">' + _escHtml(manual) + '</span></div>';
  } else if (auto) {
    html = '<div class="cc-label-wrap"><span class="cc-auto-label ' + auto.type + '">' + auto.text + '</span></div>';
  }
  return html;
}

    var slides = [];
    var seenOrden = {};
    heroData.forEach(function(h, rowIdx) {
      if (!h || typeof h !== 'object') return;
      var producto = (h.producto || '').trim();
      var product = producto ? G.find(function(g) { return g.t.toLowerCase().trim() === producto.toLowerCase(); }) : null;
      var img = (h.imagen || '').trim() || (product ? product.c : '');
      var titulo = (h.titulo || '').trim() || (product ? product.t : producto);
      if (!titulo && !img) return;
      var orden = (h.orden != null && h.orden !== '') ? h.orden : ('_row' + rowIdx);
      if (seenOrden[orden]) return;
      seenOrden[orden] = true;
      var _esc = function(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
      slides.push({
        t: _esc(titulo || 'Sin título'),
        d: _esc((h.subtitulo || (product ? (product.d || '') : '')).slice(0, 120)),
        c: img,
        col: product ? product.col : '#1a1a1a',
        g: product ? product.g : '',
        _etiqueta: _esc((h.etiqueta || '').trim()),
        _cta: _esc((h.cta || '').trim() || 'Ordenar ahora'),
        _product: product
      });
    });

    if (!slides.length) return;

    hero.innerHTML = '';
    window.__heroSlides = slides.map(function(s) { return s._product || s; });

    var cur = 0, paused = false, autoTimer = null;

    slides.forEach(function(s, i) {
      var sl = document.createElement('div');
      sl.className = 'hero-slide' + (i === 0 ? ' active' : '');
      sl.style.cssText = 'position:absolute;inset:0;opacity:' + (i === 0 ? 1 : 0) + ';transition:opacity .65s ease;pointer-events:' + (i === 0 ? 'all' : 'none');

      sl.innerHTML = s.c
        ? '<img src="' + s.c + '" alt="' + s.t + '" loading="' + (i === 0 ? 'eager' : 'lazy') + '" onerror="this.style.display=\'none\'">'
        : '<div class="hero-slide-fallback" style="background:' + s.col + '">\uD83C\uDF55</div>';
      sl.innerHTML += '<div class="hero-overlay"></div>';

      var badgeHtml = s._etiqueta ? '<div class="hero-commercial-badge ' + _mapBadgeClass(s._etiqueta) + '">' + s._etiqueta + '</div>' : '';
      var productUrgency = s._product && s._product._urgencia
        ? '<div class="hero-urgency">\u23F0 ' + s._product._urgencia + '</div>' : '';

      sl.innerHTML += '<div class="hero-content">'
        + badgeHtml
        + '<div class="hero-eyebrow"><svg width="10" height="10" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l2.47 7.6H22l-6.47 4.7 2.47 7.6L12 17.2l-6 4.7 2.47-7.6L2 9.24l7.53-.64z"/></svg>'
        + '<span data-herorating="' + (s._product ? s._product.t : s.t) + '">' + s.g + '</span></div>'
        + productUrgency
        + '<div class="hero-title">' + s.t + '</div>'
        + '<div class="hero-sub">' + (s.d || '').slice(0, 72) + (s.d && s.d.length > 72 ? '\u2026' : '') + '</div>'
        + '<div class="hero-actions"><button class="hero-btn" onclick="event.stopPropagation();' + (s._product ? 'openGameSheet(window.__heroSlides[' + i + '])' : '') + '">'
        + '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.56L23 6H6"/></svg>'
        + s._cta + '</button></div></div>';

      sl.onclick = function() { if (slides[cur]._product) openGameSheet(slides[cur]._product); };
      hero.appendChild(sl);
    });

    var dotsWrap = document.createElement('div');
    dotsWrap.style.cssText = 'position:absolute;bottom:16px;right:20px;display:flex;gap:5px;align-items:center;z-index:10';
    slides.forEach(function(_, i) {
      var d = document.createElement('div');
      d.className = 'hero-dot' + (i === 0 ? ' on' : '');
      dotsWrap.appendChild(d);
    });
    hero.appendChild(dotsWrap);

    function goTo(n) {
      var sEls = hero.querySelectorAll('.hero-slide');
      sEls[cur].style.opacity = '0';
      sEls[cur].style.pointerEvents = 'none';
      sEls[cur].classList.remove('active');
      cur = (n + slides.length) % slides.length;
      sEls[cur].style.opacity = '1';
      sEls[cur].style.pointerEvents = 'all';
      sEls[cur].classList.add('active');
      hero.querySelectorAll('.hero-dot').forEach(function(d, i) { d.classList.toggle('on', i === cur); });
    }

    autoTimer = setInterval(function() { if (!paused) goTo(cur + 1); }, 5000);

    var tsx = 0;
    hero.addEventListener('touchstart', function(e) { tsx = e.touches[0].clientX; paused = true; }, { passive: true });
    hero.addEventListener('touchend', function(e) {
      var dx = e.changedTouches[0].clientX - tsx;
      if (Math.abs(dx) > 45) goTo(cur + (dx < 0 ? 1 : -1));
      setTimeout(function() { paused = false; }, 3000);
    }, { passive: true });

    hero.querySelectorAll('.hero-btn').forEach(function(b) {
      b.addEventListener('click', function(e) { e.stopPropagation(); paused = true; setTimeout(function() { paused = false; }, 4000); });
    });

    refreshRatingsUI();
  } catch (e) {
    console.warn('Hero dinamico no disponible:', e);
  }
}

async function loadInventory() {
  if (!SCRIPT_URL) return;
  try {
    const res = await fetch(SCRIPT_URL + '?action=inventory', { method: 'GET' });
    const data = await res.json();
    if (!data || !Array.isArray(data)) return;

    let createdNew = false;

    data.forEach(row => {
      if (!row.nombre) return;
       _upsertBebidaFromSheetRow(row);

      const key = _normMenuKey(row.nombre);
      if (row.estado) inventoryMap[key] = row.estado;

      if (_upsertPizzaFromSheetRow(row)) {
        createdNew = true;
      }
    });

    _processAutoLabels();

    if (createdNew) {
      const currentGenres = new Set(
        [...document.querySelectorAll('#gbar .gb')]
          .map(btn => btn.textContent.trim())
          .filter(Boolean)
      );

      G.map(x => x.g)
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b))

            b.classList.add('on');
            render();
          };
          document.getElementById('gbar').appendChild(b);
          currentGenres.add(cat);
        });
    }

    render();
  } catch (e) {
    console.warn('Inventario no disponible:', e);
  }
}

async function _pollInventory() {
  if (!SCRIPT_URL) return;
  try {
    const res  = await fetch(SCRIPT_URL + '?action=inventory&_t=' + Date.now(), { cache: 'no-store' });
    const data = await res.json();
    if (!data || !Array.isArray(data)) return;

    let changed = false;
    let createdNew = false;

    data.forEach(row => {
      if (!row.nombre) return;
       if (_upsertBebidaFromSheetRow(row)) {
  changed = true;
}

      const key = _normMenuKey(row.nombre);

      if (row.estado && inventoryMap[key] !== row.estado) {
        inventoryMap[key] = row.estado;
        changed = true;
      }

      if (_upsertPizzaFromSheetRow(row)) {
        createdNew = true;
        changed = true;
      }
    });

    _processAutoLabels();

    if (createdNew) {
      const currentGenres = new Set(
        [...document.querySelectorAll('#gbar .gb')]
          .map(btn => btn.textContent.trim())
          .filter(Boolean)
      );

      G.map(x => x.g)
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b))
        .forEach(cat => {
          if (cat === 'Todos' || currentGenres.has(cat)) return;

          const b = document.createElement('button');
          b.className = 'gb';
          b.textContent = cat;
          b.onclick = () => {
            aG = cat;
            document.querySelectorAll('.gb').forEach(x => x.classList.remove('on'));
            b.classList.add('on');
            render();
          };
          document.getElementById('gbar').appendChild(b);
          currentGenres.add(cat);
        });
    }

    if (changed) {
      render();
      showToast('🔄 El menú fue actualizado');
    }
  } catch (_) {}
}
async function _pollMercado() {
  if (!_mercadoLoaded) return;
  try {
    // Forzar bypass de caché en memoria para obtener datos frescos
    _mercadoMemCache = null;
    _mercadoMemTs    = 0;

    const productos = await fetchMercado();
    _patchMercadoUI(productos);
  } catch (_) {}
}

function _patchMercadoUI(productos) {
  const prodMap = new Map(productos.map(p => [p.nombre.toLowerCase().trim(), p]));
  let changed = false;

  document.querySelectorAll('#mercadogrid .con-card').forEach(card => {
    const btn = card.querySelector('.con-bebida-cart-btn[data-mname]');
    if (!btn) return;
    const prod = prodMap.get(btn.dataset.mname.toLowerCase().trim());
    if (!prod) return;

    const debeEstarDeshabilitado = !prod.disponible;
    const estaDeshabilitado      = btn.disabled;

    if (debeEstarDeshabilitado === estaDeshabilitado) return;

    // Cambió el estado → actualizar quirúrgicamente
    changed = true;
    btn.disabled = debeEstarDeshabilitado;

    if (debeEstarDeshabilitado) {
      card.classList.add('card-agotada');
      if (!card.querySelector('.agotada-tag')) {
        const tag = document.createElement('div');
        tag.className = 'agotada-tag';
        tag.textContent = 'Agotado';
        const wrap = card.querySelector('.con-img-wrap');
        if (wrap) wrap.appendChild(tag);
      }
    } else {
      card.classList.remove('card-agotada');
      const tag = card.querySelector('.agotada-tag');
      if (tag) tag.remove();
    }
  });

  if (changed) showToast('🔄 El mercado fue actualizado');
}

function _startPolling() {
  const INTERVAL = 90 * 1000; // 90 segundos
  setInterval(_pollInventory, INTERVAL);
  setInterval(_pollMercado,   INTERVAL);
}

// ID anónimo por dispositivo/navegador — sin datos personales
function getAnonId() {
  let id = localStorage.getItem('lapizzeria_aid');
  if (!id) {
    id = 'anon_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    localStorage.setItem('lapizzeria_aid', id);
  }
  return id;
}

// Caché local de promedios (se llena desde Google Sheets)
let ratingsCache = {};

// Carga promedios desde Google Sheets al iniciar
async function loadRatings() {
  if (!SCRIPT_URL) return;
  try {
    const res = await fetch(SCRIPT_URL + '?action=ratings');
    const data = await res.json();
    if (data && typeof data === 'object') ratingsCache = data;
  } catch (e) {}
}

// Envía valoración (con comentario opcional) al servidor y actualiza caché local
async function doSubmitRating(producto, estrellas, comentario) {
  localStorage.setItem('lapizzeria_rated_' + producto, String(estrellas));
  if (comentario) localStorage.setItem('lapizzeria_comment_' + producto, comentario);

  // Actualización optimista del caché (incluyendo distribución)
  const old = ratingsCache[producto];
  const idx = Math.round(estrellas) - 1;
  if (!old) {
    const dist = [0,0,0,0,0];
    if (idx >= 0 && idx <= 4) dist[idx] = 1;
    ratingsCache[producto] = { avg: estrellas, count: 1, dist };
  } else {
    const newSum   = old.avg * old.count + estrellas;
    const newCount = old.count + 1;
    const dist     = (old.dist || [0,0,0,0,0]).slice();
    if (idx >= 0 && idx <= 4) dist[idx]++;
    ratingsCache[producto] = { avg: Math.round(newSum / newCount * 10) / 10, count: newCount, dist };
  }

  if (!SCRIPT_URL) return;
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'rating', producto, estrellas, comentario: comentario || '', anonId: getAnonId() })
    });
  } catch (e) {}
}

// Convierte número (ej: 4.3) en cadena de estrellas redondeadas (ej: ★★★★☆)
function ratingToStars(n) {
  const rounded = Math.round(n);
  return '★'.repeat(rounded) + '☆'.repeat(5 - rounded);
}

// Renderiza el widget interactivo de valoración
function renderRatingWidget(producto) {
  const widget     = document.getElementById('gsRatingWidget');
  const starRow    = document.getElementById('gsStarBtns');
  const commentEl  = document.getElementById('gsRatingComment');
  const submitBtn  = document.getElementById('gsRatingSubmit');
  const msg        = document.getElementById('gsRatingMsg');
  const avgWrap    = document.getElementById('gsRatingAvg');
  if (!widget) return;

  widget.style.display = 'block';

  // Promedio real del servidor
  const serverData = ratingsCache[producto];
  if (serverData && serverData.count > 0) {
    avgWrap.style.display = 'flex';
    document.getElementById('gsAvgStars').textContent = ratingToStars(serverData.avg);
    document.getElementById('gsAvgNum').textContent   = serverData.avg + '★';
    const c = serverData.count;
    document.getElementById('gsAvgCount').textContent = '(' + c + ' valoraci' + (c === 1 ? 'ón' : 'ones') + ')';
  } else {
    avgWrap.style.display = 'none';
  }

  const userRating  = parseInt(localStorage.getItem('lapizzeria_rated_' + producto)) || 0;
  const userComment = localStorage.getItem('lapizzeria_comment_' + producto) || '';

  if (userRating > 0) {
    // Ya valoró — mostrar estrellas bloqueadas y su comentario
    starRow.innerHTML = Array.from({ length: 5 }, (_, i) =>
      `<span class="gs-star-btn" style="color:${i < userRating ? '#FFD700' : '#3a3a3a'};cursor:default">★</span>`
    ).join('');
    commentEl.style.display = 'none';
    submitBtn.style.display  = 'none';
    msg.innerHTML = 'Valoraste con ' + userRating + ' estrella' + (userRating === 1 ? '' : 's') + '. ¡Gracias!'
      + (userComment ? `<br><em style="color:#aaa;font-style:italic">"${userComment}"</em>` : '');
  } else {
    // Estrellas interactivas
    let selectedVal = 0;

    starRow.innerHTML = Array.from({ length: 5 }, (_, i) =>
      `<button class="gs-star-btn" data-val="${i + 1}" aria-label="${i + 1} estrella${i > 0 ? 's' : ''}">★</button>`
    ).join('');

    commentEl.style.display = 'none';
    commentEl.value = '';
    submitBtn.style.display = 'none';
    msg.textContent = 'Toca las estrellas para valorar';

    const btns = starRow.querySelectorAll('.gs-star-btn');

    const highlight = (upTo) => {
      btns.forEach((b, i) => b.classList.toggle('lit', i < upTo));
    };

    btns.forEach(btn => {
      const val = parseInt(btn.dataset.val);
      btn.addEventListener('mouseover',  () => !selectedVal && highlight(val));
      btn.addEventListener('mouseleave', () => !selectedVal && highlight(0));
      btn.addEventListener('touchstart', () => !selectedVal && highlight(val), { passive: true });
      btn.addEventListener('click', () => {
        selectedVal = val;
        highlight(val);
        commentEl.style.display = 'block';
        submitBtn.style.display  = 'block';
        msg.textContent = val + ' estrella' + (val === 1 ? '' : 's') + ' seleccionada' + (val === 1 ? '' : 's');
      });
    });

    submitBtn.onclick = async () => {
      if (!selectedVal) return;
      const comentario = commentEl.value.trim();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando...';
      await doSubmitRating(producto, selectedVal, comentario);
      renderRatingWidget(producto);
      // Actualizar gsStars/gsRating del sheet
      const lr = ratingsCache[producto];
      if (lr) {
        document.getElementById('gsStars').textContent  = stars(lr.avg);
        document.getElementById('gsRating').textContent = '⭐ ' + lr.avg + '/5 (' + lr.count + ')';
      }
      refreshRatingsUI();
    };
  }
}

// Actualiza todos los elementos de rating en el DOM con datos reales del caché
function refreshRatingsUI() {
  // Actualizar tarjetas grandes (data-cardrating y data-cardstars)
  document.querySelectorAll('[data-cardrating]').forEach(el => {
    const nombre = el.dataset.cardrating;
    const lr = ratingsCache[nombre];
    el.textContent = lr && lr.count > 0 ? '⭐ ' + lr.avg : '';
  });
  document.querySelectorAll('[data-cardstars]').forEach(el => {
    const nombre = el.dataset.cardstars;
    const lr = ratingsCache[nombre];
    el.textContent = lr && lr.count > 0 ? stars(lr.avg) : '';
  });
  // Actualizar hero eyebrow
  document.querySelectorAll('[data-herorating]').forEach(el => {
    const nombre = el.dataset.herorating;
    const lr = ratingsCache[nombre];
    const g = G.find(x => x.t === nombre);
    el.textContent = g ? g.g + (lr && lr.count > 0 ? ' · ' + lr.avg + '/5' : '') : '';
  });
}

// ── MODAL DE RESEÑAS ──────────────────────────────────────────
let _revProducto   = null;
let _revOffset     = 0;
let _revHasMore    = false;
let _revFetching   = false;
const REV_PAGE     = 3;

function openReviews(producto) {
  if (!producto) return;
  _revProducto = producto;
  _revOffset   = 0;
  _revHasMore  = false;

  // Llenar cabecera con datos del caché (disponibles inmediatamente)
  const lr = ratingsCache[producto];
  document.getElementById('revProductName').textContent = producto;
  document.getElementById('revBody').innerHTML = '<div class="rev-loading">Cargando reseñas...</div>';

  if (lr && lr.count > 0) {
    document.getElementById('revBigNum').textContent   = lr.avg;
    document.getElementById('revBigStars').textContent = ratingToStars(lr.avg);
    const c = lr.count;
    document.getElementById('revBigTotal').textContent = c + ' valoraci' + (c === 1 ? 'ón' : 'ones');
    _renderRevBars(lr.dist || [0,0,0,0,0]);
  } else {
    document.getElementById('revBigNum').textContent   = '—';
    document.getElementById('revBigStars').textContent = '';
    document.getElementById('revBigTotal').textContent = 'Sin valoraciones';
    document.getElementById('revBars').innerHTML = '';
  }

  // Botón "Dejar valoración": redirige al widget de envío
  document.getElementById('revWriteBtn').onclick = () => {
    closeReviews();
    // Abrir el modal correspondiente
    if (_bRatingCurrent === producto) {
      // Ya está abierto el modal de bebida, no hacer nada
    } else if (_currentGameSheet === producto) {
      // Ya está abierto el sheet de pizza, scroll al widget
      const w = document.getElementById('gsRatingWidget');
      if (w) w.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  };

  // Mostrar overlay + panel
  document.getElementById('revOverlay').style.display = 'block';
  document.getElementById('revPanel').classList.add('open');

  // Cargar primera página de comentarios
  _loadRevComments(producto, 0, true);
}

function closeReviews() {
  document.getElementById('revOverlay').style.display = 'none';
  document.getElementById('revPanel').classList.remove('open');
  _revProducto = null;
}

function _renderRevBars(dist) {
  // dist = [n1★, n2★, n3★, n4★, n5★]
  const max = Math.max(...dist, 1);
  const el  = document.getElementById('revBars');
  // Mostrar de 5★ a 1★ (al revés)
  el.innerHTML = [5,4,3,2,1].map(s => {
    const n    = dist[s - 1] || 0;
    const pct  = Math.round((n / max) * 100);
    return `<div class="rev-bar-row">
      <span>${s}★</span>
      <div class="rev-bar-track"><div class="rev-bar-fill" style="width:${pct}%"></div></div>
      <span class="rev-bar-count">${n}</span>
    </div>`;
  }).join('');
}

async function _loadRevComments(producto, offset, clear) {
  if (_revFetching) return;
  _revFetching = true;

  const body = document.getElementById('revBody');

  if (!SCRIPT_URL) {
    body.innerHTML = '<div class="rev-no-comments">Sin conexión al servidor.</div>';
    _revFetching = false;
    return;
  }

  // Spinner al cargar más
  if (!clear) {
    const spinner = document.createElement('div');
    spinner.className = 'rev-loading';
    spinner.id = 'revSpinner';
    spinner.textContent = 'Cargando...';
    body.appendChild(spinner);
  }

  try {
    const url  = `${SCRIPT_URL}?action=comments&producto=${encodeURIComponent(producto)}&offset=${offset}&limit=${REV_PAGE}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (clear) body.innerHTML = '';
    document.getElementById('revSpinner')?.remove();
    document.getElementById('revLoadMoreBtn')?.remove();

    if (data.comments && data.comments.length > 0) {
      data.comments.forEach(c => {
        const div = document.createElement('div');
        div.className = 'rev-comment';
        const d  = c.date ? new Date(c.date) : null;
        const ds = d && !isNaN(d) ? d.toLocaleDateString('es-CU', { day:'numeric', month:'short', year:'numeric' }) : '';
        div.innerHTML = `
          <div class="rev-comment-stars">${'★'.repeat(Math.round(c.stars))}${'☆'.repeat(5 - Math.round(c.stars))}</div>
          <div class="rev-comment-text">${c.text.replace(/</g,'&lt;')}</div>
          ${ds ? `<div class="rev-comment-date">${ds}</div>` : ''}`;
        body.appendChild(div);
      });
      _revOffset  = offset + data.comments.length;
      _revHasMore = data.hasMore;
    } else if (clear) {
      body.innerHTML = '<div class="rev-no-comments">Aún no hay comentarios escritos para este producto.</div>';
    }

    // Botón "Cargar más"
    if (_revHasMore) {
      const btn = document.createElement('button');
      btn.className = 'rev-load-more';
      btn.id = 'revLoadMoreBtn';
      btn.textContent = 'Cargar más reseñas';
      btn.onclick = () => _loadRevComments(_revProducto, _revOffset, false);
      body.appendChild(btn);
    }

  } catch (err) {
    document.getElementById('revSpinner')?.remove();
    if (clear) body.innerHTML = '<div class="rev-no-comments">No se pudieron cargar las reseñas.</div>';
  }

  _revFetching = false;
}

}

function renderBebidaRatingWidget(producto) {
  const starRow   = document.getElementById('bStarBtns');
  const commentEl = document.getElementById('bRatingComment');
  const submitBtn = document.getElementById('bRatingSubmit');
  const msg       = document.getElementById('bRatingMsg');
  const avgLine   = document.getElementById('bRatingAvgLine');

  // Promedio actual del caché
  const sr = ratingsCache[producto];
  if (sr && sr.count > 0) {
    avgLine.textContent = ratingToStars(sr.avg) + ' ' + sr.avg + ' (' + sr.count + ' valoraci' + (sr.count === 1 ? 'ón' : 'ones') + ')';
  } else {
    avgLine.textContent = 'Sé el primero en valorar';
  }

  const userRating  = parseInt(localStorage.getItem('lapizzeria_rated_' + producto)) || 0;
  const userComment = localStorage.getItem('lapizzeria_comment_' + producto) || '';

  if (userRating > 0) {
    starRow.innerHTML = Array.from({ length: 5 }, (_, i) =>
      `<span class="gs-star-btn" style="color:${i < userRating ? '#FFD700' : '#3a3a3a'};cursor:default">★</span>`
    ).join('');
    commentEl.style.display = 'none';
    submitBtn.style.display  = 'none';
    msg.innerHTML = 'Valoraste con ' + userRating + ' estrella' + (userRating === 1 ? '' : 's') + '. ¡Gracias!'
      + (userComment ? `<br><em style="color:#aaa;font-style:italic">"${userComment}"</em>` : '');
    return;
  }

  // Interactivo
  let selectedVal = 0;
  starRow.innerHTML = Array.from({ length: 5 }, (_, i) =>
    `<button class="gs-star-btn" data-val="${i + 1}" aria-label="${i + 1} estrella${i > 0 ? 's' : ''}">★</button>`
  ).join('');
  commentEl.style.display = 'none';
  commentEl.value = '';
  submitBtn.style.display = 'none';
  submitBtn.disabled = false;
  submitBtn.textContent = 'Enviar valoración';
  msg.textContent = 'Toca las estrellas para valorar';

  const btns = starRow.querySelectorAll('.gs-star-btn');
  const highlight = (n) => btns.forEach((b, i) => b.classList.toggle('lit', i < n));

  btns.forEach(btn => {
    const val = parseInt(btn.dataset.val);
    btn.addEventListener('mouseover',  () => !selectedVal && highlight(val));
    btn.addEventListener('mouseleave', () => !selectedVal && highlight(0));
    btn.addEventListener('touchstart', () => !selectedVal && highlight(val), { passive: true });
    btn.addEventListener('click', () => {
      selectedVal = val;
      highlight(val);
      commentEl.style.display = 'block';
      submitBtn.style.display  = 'block';
      msg.textContent = val + ' estrella' + (val === 1 ? '' : 's') + ' seleccionada' + (val === 1 ? '' : 's');
    });
  });

  submitBtn.onclick = async () => {
    if (!selectedVal) return;
    const comentario = commentEl.value.trim();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';
    await doSubmitRating(producto, selectedVal, comentario);
    renderBebidaRatingWidget(producto);
    refreshRatingsUI();
  };
}

// ── INIT (carga por fases) ────────────────────────────────────
// FASE 1: Render crítico — lo que el usuario ve primero
updateCartBtn();
initHero();
render();
_updateStatusPill();

// FASE 2: Datos dinámicos — tras primer paint
requestAnimationFrame(function() {
  setTimeout(function() {
    loadInventory().then(function() {
      _processAutoLabels();
      render();
      loadHero();
    });
    loadRatings().then(function() {
      refreshRatingsUI();
      _processAutoLabels();
      render();
    });
  }, 0);
});

// FASE 3: Polling diferido — en idle
var _deferPolling = function() {
  _startPolling();
  setInterval(_updateStatusPill, 60000);
};
if ('requestIdleCallback' in window) {
  requestIdleCallback(_deferPolling, { timeout: 5000 });
} else {
  setTimeout(_deferPolling, 3000);
}

</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      setInterval(() => reg.update(), 30000);
      reg.addEventListener('updatefound', () => {
        const nuevo = reg.installing;
        nuevo.addEventListener('statechange', () => {
          if (nuevo.state === 'installed' && navigator.serviceWorker.controller) {
            nuevo.postMessage('skipWaiting');
          }
        });
      });
    }).catch(err => console.log(err));
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  });
}
</script>
