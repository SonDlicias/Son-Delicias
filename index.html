<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🍕 La Pizzería</title>
<meta property="og:title" content="🍕 La Pizzería"/>
<meta property="og:description" content="🍕 Menú digital · Delivery y pedidos en mesa. Pizzas artesanales, bebidas y más. ¡Pedí por WhatsApp!"/>
<meta property="og:image" content="og-image.png"/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#0f0a08"/>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0a08;color:#fff;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;background-image:radial-gradient(ellipse 120% 60% at 50% 0%,rgba(255,80,20,.06) 0%,transparent 70%),radial-gradient(ellipse 80% 40% at 50% 100%,rgba(255,122,0,.04) 0%,transparent 60%)}

/* ── HEADER ── */
header{background:rgba(15,10,8,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 14px 12px;position:sticky;top:0;z-index:99;border-bottom:1px solid rgba(255,255,255,.06);box-shadow:0 1px 0 rgba(255,255,255,.04)}
.hrow{display:flex;align-items:center;justify-content:space-between;max-width:720px;margin:0 auto 11px}
.hlogo{display:flex;align-items:center;gap:10px}
.hlogo img{height:42px;width:42px;border-radius:10px;object-fit:contain;background:#1a1208;padding:2px}
.htxt h1{font-size:18px;font-weight:900;line-height:1.1}
.htxt small{font-size:11px;opacity:.8}

/* ── BUTTONS ── */
.btnall{border:none;border-radius:10px;padding:0 14px;height:44px;color:#fff;font-weight:800;cursor:pointer;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:filter .2s,box-shadow .2s}
.btnall:active{filter:brightness(.85)}
.btn-lista{background:transparent;box-shadow:none}
.btncart{background:#25D366;box-shadow:0 2px 6px rgba(37,211,102,.3);position:relative;min-width:90px}
.btncart:hover{box-shadow:0 4px 12px rgba(37,211,102,.5)}
.btncart.has-items{box-shadow:0 0 10px rgba(37,211,102,.6),0 2px 6px rgba(37,211,102,.4)}
@keyframes hcartswing{0%{transform:rotate(0deg)}25%{transform:rotate(-18deg)}50%{transform:rotate(14deg)}75%{transform:rotate(-8deg)}100%{transform:rotate(0deg)}}
@keyframes hcartflash{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes badgebounce{0%{transform:scale(0.5)}60%{transform:scale(1.35)}80%{transform:scale(0.9)}100%{transform:scale(1)}}
.hcart-pulse{animation:hcartswing .4s cubic-bezier(.36,.07,.19,.97),hcartflash .4s ease;transform-origin:top center}
.badge-bounce{animation:badgebounce .35s cubic-bezier(.36,.07,.19,.97)}
#hcart-btn.empty svg{stroke:#f5ede4}
#hcart-btn.has-items svg{stroke:#ff7a00}
@keyframes cartnum{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.cart-num-pop{animation:cartnum .25s ease}

/* ── NAV TABS ── */
.navtabs{width:100%;background:rgba(15,10,8,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding:0;display:flex;position:fixed;bottom:0;left:0;z-index:98;height:64px;box-shadow:0 -1px 0 rgba(255,255,255,.04)}
.navtab{flex:1;border:none;background:transparent;color:#555;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;transition:color .2s}
.navtab.on{color:#D62828}
.navtab.off{color:#555}
.navtab svg{width:26px;height:26px}
.navtab span{font-size:10px;font-weight:700;letter-spacing:.3px}
#tab-juegos.on .pizza-fill{display:block}
#tab-juegos.on .pizza-outline{display:none}
#tab-juegos.off .pizza-fill{display:none}
#tab-juegos.off .pizza-outline{display:block}
#tab-bebidas.on .bebidas-fill{display:block}
#tab-bebidas.on .bebidas-outline{display:none}
#tab-bebidas.off .bebidas-fill{display:none}
#tab-bebidas.off .bebidas-outline{display:block}
#tab-noticias.on svg{stroke:#e6392e}
#tab-noticias.off svg{stroke:#fff8f0}
@keyframes springback{0%{transform:scale(.82)}60%{transform:scale(1.18)}80%{transform:scale(.95)}100%{transform:scale(1)}}
.navtab-spring svg,.navtab-spring img{animation:springback .35s cubic-bezier(.36,.07,.19,.97) forwards}

/* ── SEARCH ── */
.swrap{max-width:720px;margin:0 auto}
#si{width:100%;padding:11px 44px 11px 20px;border-radius:50px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:14px;outline:none;transition:border-color .25s,box-shadow .25s}
#si:focus{border-color:rgba(216,40,40,.8);box-shadow:0 0 0 2px rgba(216,40,40,.15),0 0 12px rgba(216,40,40,.2)}
#si::placeholder{color:rgba(255,255,255,.35)}

/* ── MAIN BODY ── */
.body{max-width:720px;margin:0 auto;padding:13px 11px 80px}

/* ── GENRE BAR ── */
.gbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:11px;scrollbar-width:none;position:sticky;top:var(--header-h,0px);z-index:97;background:rgba(15,10,8,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding-top:8px;margin-left:-11px;margin-right:-11px;padding-left:11px;padding-right:11px}
.gbar::-webkit-scrollbar{display:none}
.gb{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:#1a1208;color:#fff;font-weight:600;cursor:pointer;font-size:11px;transition:background .15s;overflow:hidden;-webkit-tap-highlight-color:transparent}
.gb.on{background:#D62828;border-color:#D62828}

/* ── SORT / TBAR ── */
.tbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.cnt{font-size:12px;color:#555}
.vista-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#777;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.vista-btn svg{width:15px;height:15px;fill:currentColor;pointer-events:none}
.vista-btn.on{background:rgba(214,40,40,.18);border-color:#D62828;color:#D62828;box-shadow:0 0 10px rgba(214,40,40,.2)}

/* ── GRID CARDS ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:10px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{border-radius:14px;overflow:hidden;cursor:pointer;background:linear-gradient(145deg,#1a1208,#140e04);box-shadow:0 4px 20px rgba(0,0,0,.65),0 0 0 1px var(--gcol-border,rgba(255,255,255,.06)),0 0 10px var(--gcol-glow-soft,transparent);border:1px solid var(--gcol-border,rgba(255,255,255,.06));transition:transform .18s,box-shadow .18s,border-color .18s;-webkit-tap-highlight-color:transparent;animation:fadeInUp .2s ease both}
.cimg{position:relative;padding-top:140%;overflow:hidden}
.cimg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.fall{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.fall img{width:55%;opacity:.65}
.fall p{font-size:10px;color:#bbb;margin-top:7px;font-weight:700;line-height:1.3}
.bg{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);padding:3px 8px;border-radius:18px;font-size:9px;font-weight:700}
.bg.con-ribbon{top:auto;bottom:7px}
.bp{position:absolute;top:7px;right:7px;background:#D62828;padding:3px 8px;border-radius:18px;font-size:10px;font-weight:900}
.ov{position:absolute;inset:0;background:rgba(0,0,0,.91);padding:11px;display:flex;flex-direction:column;justify-content:center;gap:5px;opacity:0;transition:opacity .22s;pointer-events:none}
.ov.on{opacity:1}
.ovt{font-size:12px;font-weight:800;line-height:1.3}
.ovd{font-size:10px;color:#aaa}
.ovs{color:#FFD700;font-size:12px}
.cfoot{padding:8px 8px 0}
.ctit{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:6px;min-height:28px}
.csize{font-size:12px;font-weight:500;color:#9CA3AF;margin-bottom:8px;margin-top:2px}
.cbtns{display:flex;gap:5px;padding-bottom:8px}
.bped{flex:1;background:#D62828;border:none;border-radius:7px;padding:7px 3px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,box-shadow .12s}
.bped:active,.bped.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.bcom{flex:1;background:transparent;border:1.5px solid rgba(232,160,32,.6);border-radius:7px;padding:7px 3px;color:#E8A020;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,border-color .15s,background .15s}
.bcom:active,.bcom.tap{transform:scale(.94);background:rgba(232,160,32,.1)}
.empty{grid-column:1/-1;text-align:center;padding:50px 20px;color:#444}
.empty p{font-size:15px;margin-top:10px}

/* ── RIBBONS ── */
.ribbon-wrap{position:absolute;top:0;left:0;width:72px;height:72px;overflow:hidden;z-index:5;pointer-events:none}
.ribbon{position:absolute;top:14px;left:-22px;width:96px;padding:5px 0;text-align:center;transform:rotate(-45deg);font-size:8px;font-weight:900;color:#fff;letter-spacing:1px;text-transform:uppercase;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.ribbon-estreno{background:linear-gradient(135deg,#7b2ff7,#f107a3)}
.ribbon-oferta{background:linear-gradient(135deg,#ff6a00,#ee0979)}
.ribbon-nuevo{background:linear-gradient(135deg,#00b09b,#96c93d)}

/* ── BEBIDAS SECTION ── */
.con-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-top:4px}
.con-card{background:#1a1208;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 4px 18px rgba(0,0,0,.55);transition:transform .18s;-webkit-tap-highlight-color:transparent}
.con-card:hover{transform:translateY(-3px)}
.con-img{width:100%;height:148px;object-fit:cover;object-position:center;display:block;background:#0f0a08}
.con-img-fall{height:148px;display:flex;align-items:center;justify-content:center;background:#0f0807;font-size:36px}
.con-info{padding:8px}
.con-name{font-size:12px;font-weight:900;margin-bottom:3px;line-height:1.3}
.con-price{font-size:13px;font-weight:900;color:#E8A020;margin-bottom:0}
.con-desc,.con-specs,.con-btns,.con-stock-si,.con-stock-no{display:none}
.con-loading{text-align:center;padding:40px;color:#555;font-size:14px}

/* ── WRAPPER DE IMAGEN BEBIDA ── */
.con-img-wrap{position:relative;display:block}
.con-bebida-cart-btn{position:absolute;bottom:8px;right:8px;z-index:8;background:#D62828;border:none;border-radius:50%;width:34px;height:34px;color:#fff;font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.55);transition:background .18s,transform .12s;-webkit-tap-highlight-color:transparent}
.con-bebida-cart-btn:active{transform:scale(.84)}
.con-bebida-cart-btn.in-cart{background:#25D366}
.con-bebida-cart-btn:disabled{background:#444;cursor:not-allowed;opacity:.5}

/* ── FAB CARRITO ── */
#cart-fab{position:fixed;top:auto;left:auto;bottom:90px;right:20px;width:56px;height:56px;background:#fff;border:3px solid #25D366;border-radius:50%;display:none;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.4);cursor:grab;z-index:200;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;will-change:transform}
#cart-fab:active{cursor:grabbing}
#cart-fab svg{width:26px;height:26px;fill:none;stroke:#25D366;stroke-width:1.5}
#cart-badge{position:absolute;top:-4px;right:-4px;background:#FF6B00;color:#fff;font-size:11px;font-weight:900;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
@keyframes fabIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fabShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.fab-shake{animation:fabShake .3s ease}

/* ── GAME / PIZZA SHEET ── */
.game-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.game-sheet-overlay.on{opacity:1;pointer-events:all}
.game-sheet{position:fixed;bottom:0;left:0;width:100%;max-height:85vh;background:rgba(15,10,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:24px 24px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto}
.game-sheet.on{transform:translateY(0)}
.game-sheet-img{width:100%;height:400px;object-fit:cover;flex-shrink:0}
.game-sheet-img-fall{width:100%;height:400px;display:flex;align-items:center;justify-content:center;font-size:72px}
.gs-carousel{width:100%;height:180px;position:relative;overflow:hidden;border-radius:10px;margin-top:8px}
.gs-carousel-track{display:flex;height:100%;width:100%;will-change:transform;transition:transform .35s cubic-bezier(.32,.72,0,1)}
.gs-carousel-slide{width:100%;min-width:100%;height:100%;flex-shrink:0;overflow:hidden}
.gs-carousel-slide img{width:100%;height:100%;object-fit:cover;display:block}
.gs-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:6px}
.gs-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .2s,transform .2s}
.gs-dot.on{background:#fff;transform:scale(1.3)}
.img-viewer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s;overflow:auto;-webkit-overflow-scrolling:touch}
.img-viewer-overlay.on{opacity:1;pointer-events:all}
.img-viewer-overlay img{max-width:100%;max-height:100vh;object-fit:contain;display:block;margin:auto;min-height:100vh}
.game-sheet-body{padding:20px;overflow-y:auto}
.game-sheet-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:8px}
.game-sheet-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.game-sheet-genre{background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.game-sheet-stars{color:#FFD700;font-size:15px}
.game-sheet-price{font-size:22px;font-weight:900;color:#D62828;margin-bottom:14px}
.game-sheet-desc{font-size:14px;color:#ccc;line-height:1.7;margin-bottom:22px}
.game-sheet-btns{display:flex;gap:10px;padding-bottom:24px}
.gs-btn-cart{flex:1;background:#D62828;border:none;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;transition:background .2s,transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent}
.gs-btn-cart:active,.gs-btn-cart.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}
.gs-btn-cart.added{background:#25D366}
.gs-btn-share{flex:1;background:#E8A020;border:none;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:900;cursor:pointer;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent}
.gs-btn-share:active,.gs-btn-share.tap{transform:scale(.94);box-shadow:inset 0 3px 6px rgba(0,0,0,.3)}

/* ── SIZE SELECTOR ── */
.size-btn{padding:8px 12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:#ccc;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;white-space:nowrap}
.size-btn.on{background:#D62828;border-color:#D62828;color:#fff}

/* ── CART SHEET ── */
.cart-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-sheet-overlay.on{opacity:1;pointer-events:all}
.cart-sheet{position:fixed;bottom:0;left:0;width:100%;max-height:85vh;background:rgba(15,10,8,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-bottom:none;border-radius:24px 24px 0 0;z-index:301;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding:20px}
.cart-sheet.on{transform:translateY(0)}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f0a08;border-radius:10px;margin-bottom:8px}

/* ── ORDER TYPE ── */
.otype-btn{flex:1;padding:9px 4px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#777;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;text-align:center}
.otype-btn.on{background:#D62828;border-color:#D62828;color:#fff}

/* ── GB NEW (Recién agregadas) ── */
@keyframes shine{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes borderflow{0%,100%{border-color:#E8A020}50%{border-color:#ffcc55}}
.gb-new{animation:shine 2.5s linear infinite,borderflow 2s ease-in-out infinite;border-color:#E8A020 !important;color:#E8A020 !important;border-radius:30px !important;padding:6px 16px !important;background:linear-gradient(90deg,#1a1208 30%,#E8A02020 50%,#1a1208 70%) !important;background-size:200% auto !important;box-shadow:0 0 8px rgba(232,160,32,.3),3px 3px 6px rgba(0,0,0,.5) !important;font-weight:800 !important;overflow:hidden !important;-webkit-tap-highlight-color:transparent !important}
.gb-new.on{background:linear-gradient(145deg,#E8A020,#c47a00) !important;color:#fff !important;animation:none !important;box-shadow:inset 2px 2px 5px rgba(0,0,0,.3) !important}

/* ── FEATURED BANNER ── */
#featured-banner-wrap,#featured-banner-wrap *{-webkit-tap-highlight-color:transparent}
#featured-banner-wrap:focus,#featured-banner-wrap:active,#featured-banner-wrap *:focus,#featured-banner-wrap *:active{outline:none}
.fb-arrows{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:3}
.fb-arrow{pointer-events:auto;width:30px;height:30px;margin:0 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.30);backdrop-filter:blur(6px);color:#fff;font-size:16px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent}
.fb-arrow:active{transform:scale(.92)}
.fb-dots-viewport{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:60px;overflow:hidden;pointer-events:none;z-index:3}
.fb-dots-track{display:flex;gap:6px;transition:transform .35s ease}
.fb-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.fb-dot.center{background:#fff;transform:scale(1.4)}

/* ── MISC ── */
footer{text-align:center;padding:20px;color:#1e1e2e;font-size:11px;margin-top:8px}
@media(min-width:768px){.body{max-width:100%;padding:16px 30px}.swrap{max-width:100%}.hrow{max-width:100%}}

/* ══════════════════════════════════════════════
   HERO SECTION
══════════════════════════════════════════════ */
.hero{margin:-13px -11px 0;width:calc(100% + 22px);position:relative;height:74vh;min-height:360px;max-height:600px;overflow:hidden;background:#0f0a08}
.hero-track{display:flex;height:100%;will-change:transform}
.hero-slide{min-width:100%;height:100%;position:relative;flex-shrink:0;transition:opacity .05s}
.hero-slide img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.hero-slide-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(15,10,8,.15) 0%,rgba(15,10,8,.45) 45%,rgba(15,10,8,.95) 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:22px 20px 30px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:rgba(214,40,40,.9);backdrop-filter:blur(6px);color:#fff;font-size:9px;font-weight:900;letter-spacing:1.8px;text-transform:uppercase;padding:5px 11px;border-radius:20px;margin-bottom:10px}
.hero-title{font-size:clamp(22px,6vw,32px);font-weight:900;line-height:1.13;margin-bottom:7px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.hero-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:20px;line-height:1.5}
.hero-actions{display:flex;align-items:center;gap:12px}
.hero-btn{display:inline-flex;align-items:center;gap:7px;background:#D62828;color:#fff;font-size:13px;font-weight:900;border:none;border-radius:50px;padding:12px 22px;cursor:pointer;box-shadow:0 4px 22px rgba(214,40,40,.55);transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.hero-btn:active{transform:scale(.95);box-shadow:0 2px 10px rgba(214,40,40,.4)}
.hero-dots{display:flex;gap:5px;align-items:center}
.hero-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .3s,width .3s,border-radius .3s}
.hero-dot.on{background:#fff;width:16px;border-radius:3px}
@keyframes heroKenBurns{0%{transform:scale(1)}100%{transform:scale(1.06)}}
.hero-slide.active img{animation:heroKenBurns 6s ease forwards}

/* ══════════════════════════════════════════════
   CATEGORY CAROUSEL ROWS
══════════════════════════════════════════════ */
.carousel-section{margin-top:22px}
.cat-row{margin-bottom:28px}
.cat-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;padding:0 2px}
.cat-row-title{font-size:16px;font-weight:900;color:#fff;display:flex;align-items:center;gap:7px}
.cat-row-title-dot{width:7px;height:7px;border-radius:50%;background:#D62828;flex-shrink:0}
.cat-row-link{font-size:11px;font-weight:700;color:#D62828;display:flex;align-items:center;gap:3px;cursor:pointer;-webkit-tap-highlight-color:transparent;opacity:.9}
.cat-scroll{display:flex;gap:11px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:6px}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-scroll.is-dragging{cursor:grabbing;scroll-snap-type:none;user-select:none}

/* ── EFECTO CALOR EN CARDS ── */
.cc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(to top,rgba(255,90,0,.13) 0%,transparent 100%);pointer-events:none;border-radius:0 0 16px 16px;z-index:1}
.cc-body{position:relative;z-index:2}
.cc-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,rgba(255,70,0,.22) 0%,transparent 100%);pointer-events:none;z-index:2}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(255,80,0,.1) 0%,transparent 100%);pointer-events:none;z-index:1;border-radius:0 0 14px 14px}
.card{position:relative}

/* ── BADGE FUEGO ── */
.fire-badge{position:absolute;top:8px;left:8px;font-size:13px;z-index:6;filter:drop-shadow(0 0 4px rgba(255,120,0,.8));animation:firePulse 2s ease-in-out infinite}
@keyframes firePulse{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.15) rotate(3deg)}}

/* ── ANIMACIÓN AGREGAR AL CARRITO ── */
@keyframes cartPop{0%{transform:scale(1)}30%{transform:scale(1.18)}60%{transform:scale(.93)}80%{transform:scale(1.07)}100%{transform:scale(1)}}
@keyframes addFlash{0%,100%{box-shadow:0 2px 6px rgba(37,211,102,.3)}50%{box-shadow:0 0 20px rgba(37,211,102,.7),0 0 40px rgba(37,211,102,.3)}}
.cart-add-pop{animation:cartPop .35s cubic-bezier(.36,.07,.19,.97)}
.cart-add-flash{animation:addFlash .6s ease}

/* ── CAROUSEL CARDS ── */
.cc{flex-shrink:0;border-radius:16px;overflow:hidden;cursor:pointer;background:linear-gradient(145deg,#1e1508,#140e04);border:1px solid var(--cc-border,rgba(255,255,255,.08));box-shadow:0 4px 22px rgba(0,0,0,.65),0 0 12px var(--cc-glow,transparent);transition:transform .18s ease,box-shadow .18s ease;-webkit-tap-highlight-color:transparent;scroll-snap-align:start;animation:fadeInUp .22s ease both;position:relative}
.cc:hover{transform:translateY(-4px) scale(1.025);box-shadow:0 10px 32px rgba(0,0,0,.75),0 0 16px var(--cc-glow,transparent)}
.cc:active{transform:scale(.97)}
.cc.feat{width:195px}
.cc.std{width:148px}
.cc-img{position:relative;overflow:hidden}
.cc.feat .cc-img{height:216px}
.cc.std .cc-img{height:155px}
.cc-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .32s ease}
.cc:hover .cc-img img{transform:scale(1.07) brightness(1.05)}
.cc-img-fall{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:46px}
.cc-ribbon-wrap{position:absolute;top:0;left:0;width:66px;height:66px;overflow:hidden;z-index:5;pointer-events:none}
.cc-ribbon{position:absolute;top:13px;left:-20px;width:88px;padding:4px 0;text-align:center;transform:rotate(-45deg);font-size:7.5px;font-weight:900;color:#fff;letter-spacing:.8px;text-transform:uppercase;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.cc-ribbon.estreno{background:linear-gradient(135deg,#7b2ff7,#f107a3)}
.cc-ribbon.oferta{background:linear-gradient(135deg,#ff6a00,#ee0979)}
.cc-ribbon.nuevo{background:linear-gradient(135deg,#00b09b,#96c93d)}
.cc-price-badge{position:absolute;top:9px;right:9px;background:#D62828;padding:3px 9px;border-radius:18px;font-size:10px;font-weight:900;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.cc-cat-badge{position:absolute;bottom:9px;left:9px;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);padding:3px 9px;border-radius:14px;font-size:9px;font-weight:700;color:#fff}
.cc-body{padding:9px 11px 10px}
.cc-name{font-weight:800;line-height:1.25;margin-bottom:3px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc.feat .cc-name{font-size:14px}
.cc.std .cc-name{font-size:12px}
.cc-sizes{font-size:10px;color:#9CA3AF;margin-bottom:8px;line-height:1.4}
.cc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px}
.cc-add{flex:1;background:#D62828;border:none;border-radius:8px;padding:7px 4px;color:#fff;font-size:10px;font-weight:900;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .12s,background .18s;white-space:nowrap}
.cc-add:active{transform:scale(.92)}
.cc-add.added{background:#25D366}
.cc-stars{font-size:9px;color:#FFD700;flex-shrink:0}

/* ── BOTÓN CARRITO EN TARJETA ── */
.card-cart-btn{position:absolute;bottom:8px;right:8px;z-index:8;background:#D62828;border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.55);transition:background .18s,transform .12s;-webkit-tap-highlight-color:transparent}
.card-cart-btn:active{transform:scale(.84)}
.card-cart-btn.in-cart{background:#25D366}
.card-agotada .card-cart-btn,.card-agotada .cc-cart-btn{display:none !important}
.cc-cart-btn{position:absolute;bottom:7px;right:7px;z-index:8;background:#D62828;border:none;border-radius:50%;width:30px;height:30px;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.55);transition:background .18s,transform .12s;-webkit-tap-highlight-color:transparent}
.cc-cart-btn:active{transform:scale(.84)}
.cc-cart-btn.in-cart{background:#25D366}
/* cfoot sin botones */
.cfoot{padding:8px 8px 8px}
.ccard-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.ccard-rating{font-size:10px;color:#FFD700;font-weight:700}

/* ── CONTROLES DE CANTIDAD EN CARRITO ── */
.qty-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.qty-btn{background:rgba(255,255,255,.11);border:none;border-radius:7px;color:#fff;width:27px;height:27px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.qty-btn:active{background:rgba(255,255,255,.28)}
.qty-num{font-size:13px;font-weight:800;min-width:20px;text-align:center;color:#fff}

/* ── CANTIDAD EN MODAL ── */
.modal-qty-wrap{display:flex;align-items:center;gap:12px;margin:10px 0 2px}
.modal-qty-lbl{font-size:10px;font-weight:800;color:#888;letter-spacing:.5px;text-transform:uppercase}
.modal-qty-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;width:34px;height:34px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;-webkit-tap-highlight-color:transparent}
.modal-qty-btn:active{background:rgba(255,255,255,.25)}
.modal-qty-num{font-size:17px;font-weight:900;min-width:28px;text-align:center;color:#fff}

/* ── SISTEMA DE PEDIDOS — FORM ── */
.oform-section{margin-bottom:14px}
.oform-label{display:block;font-size:10px;font-weight:800;color:#888;letter-spacing:.6px;margin-bottom:5px;text-transform:uppercase}
.ofield{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-weight:600;outline:none;margin-bottom:0;-webkit-appearance:none;transition:border-color .2s,background .2s;display:block}
.ofield:focus{border-color:rgba(214,40,40,.6);background:rgba(255,255,255,.09)}
.ofield::placeholder{color:rgba(255,255,255,.28);font-weight:400}
.ofield-opt::placeholder{font-style:italic}
.obtn-confirm{width:100%;margin-top:16px;padding:18px;font-weight:900;background:linear-gradient(135deg,#1a8a44,#25D366);border:none;border-radius:12px;color:#fff;font-size:15px;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.35);transition:opacity .2s,transform .15s,box-shadow .2s;letter-spacing:.2px;display:flex;align-items:center;justify-content:center;gap:10px}
.obtn-confirm:active{transform:scale(.97)}
.obtn-confirm:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.obtn-confirm.loading{background:linear-gradient(135deg,#333,#444);box-shadow:none}
.order-num-banner{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.35);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;animation:fadeInUp .3s ease}
.order-num-banner .pznum{font-size:26px;font-weight:900;color:#25D366;letter-spacing:1px;margin:6px 0 2px}
.order-num-banner .pzmsg{font-size:12px;color:#aaa}

/* ── INVENTARIO — ESTADOS ── */
.card-agotada .cimg img{opacity:.42;filter:grayscale(.5)}
.card-agotada .cc-img img{opacity:.42;filter:grayscale(.5)}
.card-agotada .bped,.card-agotada .cc-add{opacity:.38;cursor:not-allowed;background:#555 !important;pointer-events:none;color:#999 !important;border-color:transparent !important}
.agotada-tag{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.78);border:1px solid rgba(255,100,100,.4);color:#ff8080;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;z-index:7;letter-spacing:.3px;pointer-events:none}
.inv-loading{font-size:11px;color:#555;text-align:center;padding:8px;letter-spacing:.3px}
</style>
</head>

<!-- ═══════════════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════════════ -->
<header>
  <div class="hrow">
    <div class="hlogo">
      <img src="logo.png" alt="Logo" onerror="this.style.display='none'"/>
      <div class="htxt">
        <h1>🍕 La Pizzería</h1>
        <small id="hc"></small>
      </div>
    </div>
    <button class="btnall btn-lista empty" id="hcart-btn" onclick="openCart()" style="padding:0;width:44px;height:44px;border-radius:50%;background:transparent;-webkit-tap-highlight-color:transparent">
      <div style="position:relative;display:flex;align-items:center;justify-content:center">
        <svg id="hcart-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 11-1 9"/>
          <path d="m19 11-4-7"/>
          <path d="M2 11h20"/>
          <path d="m3.5 11 1.6 7.4a2 2 0 0 0 2 1.6h9.8a2 2 0 0 0 2-1.6l1.7-7.4"/>

      </div>

      <button id="clrbtn" onclick="document.getElementById('si').value='';render();toggleSearchIcon('')" style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(214,40,40,.15);border:1px solid rgba(214,40,40,.3);border-radius:50%;width:28px;height:28px;color:#D62828;font-size:14px;cursor:pointer;align-items:center;justify-content:center;line-height:1;transition:all .2s">✕</button>

          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

</header>

<!-- ═══════════════════════════════════════════════════════════
     MAIN BODY

  <div id="cart-fab" onclick="openCart()">
    <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>

    <button id="cartWapp" onclick="confirmOrder()" style="display:none" class="obtn-confirm">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013 7.82 19.79 19.79 0 016.07 3.18 2 2 0 018.07 1h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L12.09 9a16 16 0 006.29 6.29l1.14-1.14a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
      Confirmar pedido por WhatsApp
    </button>

// ── CARRITO ───────────────────────────────────────────────────
function toggleCart(game, btn) {
  const idx = cart.findIndex(x => x.t === game.t);
  if (idx === -1) {
    const defSize = game.sizes ? (game.sizes[1] || game.sizes[0]) : null;
    const unitPrice = defSize ? defSize.price : (game.price || 0);
    const size = defSize ? defSize.label : '';
    cart.push({ t: game.t, type: 'pizza', unitPrice, price: '$' + unitPrice.toFixed(2), size, qty: 1 });
    if (btn) {
      btn.textContent = '✅ Agregado';
      btn.style.background = '#25D366';
      btn.classList.remove('cart-add-pop','cart-add-flash');
      void btn.offsetWidth;
      btn.classList.add('cart-add-pop','cart-add-flash');
      if (navigator.vibrate) navigator.vibrate([40]);
      setTimeout(() => btn.classList.remove('cart-add-pop','cart-add-flash'), 600);
    }
  } else {
    cart.splice(idx, 1);
    if (btn) { btn.textContent = '🛒 Agregar'; btn.style.background = ''; }
  }
  updateCartBtn();
  _syncCartBtns();
}

// Sincronizar visualmente todos los botones de carrito de las tarjetas
function _syncCartBtns() {
  document.querySelectorAll('.card-cart-btn[data-t]').forEach(b => {

    b.classList.toggle('in-cart', inCart);
    b.textContent = inCart ? '✓' : '🛒';
  });

    const inCart = cart.some(x => x.t === b.dataset.t);
    b.classList.toggle('in-cart', inCart);
    b.textContent = inCart ? '✓' : '🛒';
  });
}

// Agregar/quitar producto desde botón circular de tarjeta
function quickAddToCart(game, btn) {
  const invState = getInventoryState(game.t);
  if (invState === 'Agotada') return;
  const idx = cart.findIndex(x => x.t === game.t);
  if (idx === -1) {
    const defSize = game.sizes ? (game.sizes[1] || game.sizes[0]) : null;
    const unitPrice = defSize ? defSize.price : (game.price || 0);
    const size = defSize ? defSize.label : '';
    cart.push({ t: game.t, type: 'pizza', unitPrice, price: '$' + unitPrice.toFixed(2), size, qty: 1 });

  updateCartBtn();
  _syncCartBtns();
}

  if (!cart[i]) return;

}

// ── GENERAR NÚMERO DE PEDIDO LOCAL ────────────────────────────
function genOrderNum() {
  let n = parseInt(localStorage.getItem('pz_order_counter') || '0') + 1;
  localStorage.setItem('pz_order_counter', n);
  return 'PZ-' + String(n).padStart(3, '0');
}

// ── CONFIRMAR PEDIDO ──────────────────────────────────────────
async function confirmOrder() {
  // Validación por tipo
  const nombre = document.getElementById('of-nombre')?.value?.trim();
  const ci = document.getElementById('of-ci')?.value?.trim();
  const dir = document.getElementById('of-dir')?.value?.trim();
  const mesa = document.getElementById('of-mesa')?.value?.trim();

  if (orderType === 'delivery') {
    if (!nombre) return alert('Introduce tu nombre para el delivery.');
    if (!dir) return alert('Introduce la dirección de entrega.');
  } else if (orderType === 'recoger') {
    if (!nombre) return alert('Introduce tu nombre para recoger.');
    if (!ci) return alert('Introduce tu número de Carnet de Identidad completo.');
  } else if (orderType === 'table') {
    if (!mesa) return alert('Introduce el número de mesa.');
  }

  const btn = document.getElementById('cartWapp');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<span style="font-size:18px;animation:firePulse 1s infinite">⏳</span> Guardando pedido…';

  // Calcular total y lista (con cantidades)
  let total = 0;
  const productosStr = cart.map((item, i) => {
    const qty = item.qty || 1;
    const unitPrice = item.unitPrice || parseFloat((item.price || '0').replace(/[^0-9.]/g, '')) || 0;
    const lineTotal = qty * unitPrice;
    total += lineTotal;
    const qtyStr = qty > 1 ? `${qty}x ` : '';
    return `${i + 1}. ${qtyStr}${item.t}${item.size ? ' (' + item.size + ')' : ''} — $${lineTotal.toFixed(2)}`;
  }).join('\n');

  // Intentar guardar en Google Sheets
  let orderNum = null;
  if (SCRIPT_URL) {
    try {
      const now = new Date();
      const payload = {
        tipo: orderType,
        nombre: nombre || '',
        ci: ci || '',
        mesa: mesa || '',
        direccion: dir || '',
        referencia: document.getElementById('of-ref')?.value?.trim() || '',
        productos: cart.map(x => { const qty = x.qty||1; const up = x.unitPrice||parseFloat((x.price||'0').replace(/[^0-9.]/g,''))||0; return (qty>1?qty+'x ':'')+x.t+(x.size?' ('+x.size+')':'')+' $'+(qty*up).toFixed(2); }).join('; '),
        total: total.toFixed(2),
        fecha: now.toLocaleDateString('es-CU'),
        hora: now.toLocaleTimeString('es-CU', { hour: '2-digit', minute: '2-digit' }),
        estado: 'Pendiente'
      };
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.orderNumber) orderNum = data.orderNumber;
    } catch (e) {
      console.warn('Google Sheets no disponible, usando número local:', e);
    }
  }

  if (!orderNum) orderNum = genOrderNum();
  lastOrderNum = orderNum;

  // Construir mensaje WhatsApp
  const typeLabel = { delivery: '🛵 Delivery', recoger: '🥡 Recoger', table: '🍽️ Mesa' }[orderType];
  let msg = `🍕 *Pedido — ${NOMBRE_LOCAL}*\n📋 *${typeLabel}*\n\n`;
  msg += `🆔 *Pedido: ${orderNum}*\n`;

  if (orderType === 'delivery') {
    msg += `👤 Nombre: ${nombre}\n`;
    msg += `📍 Dirección: ${dir}\n`;
    if (document.getElementById('of-ref')?.value?.trim()) msg += `📝 Referencia: ${document.getElementById('of-ref').value.trim()}\n`;
    if (ci) msg += `🪪 CI: ${ci}\n`;
  } else if (orderType === 'recoger') {
    msg += `👤 Nombre: ${nombre}\n`;
    msg += `🪪 CI: ${ci}\n`;
  } else if (orderType === 'table') {
    msg += `🪑 Mesa: ${mesa}\n`;
    if (nombre) msg += `👤 Nombre: ${nombre}\n`;
  }

  msg += `\n${productosStr}\n\n💰 *Total aprox: $${total.toFixed(2)}*`;

  // Mostrar número de pedido en el modal
  const container = document.getElementById('cartItems');
  container.insertAdjacentHTML('afterbegin', `
    <div class="order-num-banner">
      <div style="font-size:11px;color:#888;font-weight:700;letter-spacing:.5px">NÚMERO DE PEDIDO</div>
      <div class="pznum">${orderNum}</div>
      <div class="pzmsg">Guarda este número · Te lo pedirán al entregar</div>
    </div>`);

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013 7.82 19.79 19.79 0 016.07 3.18 2 2 0 018.07 1h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L12.09 9a16 16 0 006.29 6.29l1.14-1.14a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg> Enviar por WhatsApp`;

  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
  if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
}

function loadBebidas() {
  const cg = document.getElementById('congrid');
  const cl = document.getElementById('con-loading');
  if (cg.children.length > 0) { cl.style.display = 'none'; return; }

  if (typeof BEBIDAS === 'undefined') {
    cl.textContent = '⚠️ No se encontró bebidas.js';
    return;
  }

  cl.style.display = 'none';
  BEBIDAS.forEach(b => {
    const d = document.createElement('div');
    d.className = 'con-card';
    const disponible = b.disponible !== false;
    const inCart = cart.some(x => x.t === b.nombre);
    const safeName = b.nombre.replace(/'/g, "\\'");
    const safeImg  = (b.img || '').replace(/'/g, "\\'");
    d.innerHTML = `
      <div class="con-img-wrap">
        ${b.img
          ? `<img class="con-img" src="${b.img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${b.nombre}"/>
             <div class="con-img-fall" style="display:none">${b.emoji || '🥤'}</div>`
          : `<div class="con-img-fall">${b.emoji || '🥤'}</div>`
        }
        <button class="con-bebida-cart-btn${inCart?' in-cart':''}" data-bname="${b.nombre}"
          ${!disponible ? 'disabled' : ''}
          onclick="event.stopPropagation();_bebidaCartToggle('${safeName}','${b.precio}','${safeImg}',this)">
          ${inCart ? '✓' : '🛒'}
        </button>
      </div>
      <div class="con-info">
        <div class="con-name">${b.nombre}</div>

function compartirBebida(nombre, precio, e) {

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
}

  ['juegos', 'noticias', 'bebidas'].forEach(id => {
    const btn = document.getElementById('tab-' + id);
    btn.className = 'navtab ' + (t === id ? 'on' : 'off');
  });
  const active = document.getElementById('tab-' + t);
  active.classList.add('navtab-spring');
  setTimeout(() => active.classList.remove('navtab-spring'), 350);

  document.getElementById('sec-juegos').style.display = t === 'juegos' ? 'block' : 'none';
  document.getElementById('sec-bebidas').style.display = t === 'bebidas' ? 'block' : 'none';
  document.getElementById('sec-noticias').style.display = t === 'noticias' ? 'block' : 'none';
  document.getElementById('si').style.display = t === 'juegos' ? 'block' : 'none';

  if (t === 'bebidas') loadBebidas();
}

// ── SHEET DE DETALLE (PIZZA) ──────────────────────────────────
function openGameSheet(game) {
  // Bloquear si está agotada
  if (getInventoryState(game.t) === 'Agotada') return;

  history.pushState({ modal: 'gameSheet' }, '');
  const overlay = document.getElementById('gsOverlay');
  const sheet = document.getElementById('gameSheet');

  document.getElementById('gsTitle').textContent = game.t;
  document.getElementById('gsGenre').textContent = game.g;
  document.getElementById('gsStars').textContent = stars(game.r);
  document.getElementById('gsRating').textContent = '⭐ ' + game.r + '/5';
  document.getElementById('gsDesc').textContent = game.d || '';

  // Imagen principal
  const imgWrap = document.getElementById('gsImgWrap');
  imgWrap.innerHTML = game.c
    ? `<img class="game-sheet-img" src="${game.c}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="game-sheet-img-fall" style="display:none;background:${game.col}">🍕</div>`
    : `<div class="game-sheet-img-fall" style="background:${game.col}">🍕</div>`;

  // Fotos / carousel
  const allPhotos = (game.fotos || []).filter(Boolean);
  const capturas = document.getElementById('gsCapturas');
  if (allPhotos.length > 0) {
    const slides = allPhotos.map(url =>
      `<div class="gs-carousel-slide"><img src="${url}" onerror="this.style.display='none'" onclick="openImgViewer('${url}')" style="width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in"/></div>`
    ).join('');
    const dots = allPhotos.length > 1
      ? `<div class="gs-dots">${allPhotos.map((_, i) => `<div class="gs-dot${i === 0 ? ' on' : ''}"></div>`).join('')}</div>` : '';
    capturas.innerHTML = `<div style="font-size:13px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:.5px">FOTOS</div><div class="gs-carousel"><div class="gs-carousel-track">${slides}</div>${dots}</div>`;
    capturas.style.display = 'block';
    const track = capturas.querySelector('.gs-carousel-track');
    const dotEls = capturas.querySelectorAll('.gs-dot');
    let currentSlide = 0;
    const goToSlide = n => {
      currentSlide = Math.max(0, Math.min(n, allPhotos.length - 1));
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      dotEls.forEach((d, i) => d.classList.toggle('on', i === currentSlide));
    };
    let tsX = 0, tsY = 0;
    track.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; }, { passive: true });
    track.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tsX;
      const dy = e.changedTouches[0].clientY - tsY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) goToSlide(currentSlide + (dx < 0 ? 1 : -1));
    }, { passive: true });
  } else {
    capturas.style.display = 'none';
  }

  // ── Selector de tamaño ──
  const sizeWrap = document.getElementById('gsSizeWrap');
  const sizeBtns = document.getElementById('gsSizeBtns');
  sizeBtns.innerHTML = '';
  const cartBtn = document.getElementById('gsCartBtn');

  let selectedSize = null;
  let modalQty = 1;

  // Recuperar qty actual si ya está en carrito
  const existingItem = cart.find(x => x.t === game.t);
  if (existingItem) modalQty = existingItem.qty || 1;

  // ── Selector de cantidad en modal ──
  const qtyWrapId = 'gs-qty-wrap';
  let qtyWrapEl = document.getElementById(qtyWrapId);
  if (!qtyWrapEl) {
    qtyWrapEl = document.createElement('div');
    qtyWrapEl.id = qtyWrapId;
    cartBtn.parentNode.insertBefore(qtyWrapEl, cartBtn);
  }
  const renderModalQty = () => {
    qtyWrapEl.innerHTML = `
      <div class="modal-qty-wrap">
        <span class="modal-qty-lbl">Cantidad</span>
        <button class="modal-qty-btn" id="mqty-minus">−</button>
        <span class="modal-qty-num" id="mqty-num">${modalQty}</span>
        <button class="modal-qty-btn" id="mqty-plus">+</button>
      </div>`;
    document.getElementById('mqty-minus').onclick = () => { modalQty = Math.max(1, modalQty - 1); document.getElementById('mqty-num').textContent = modalQty; syncCartBtnLabel(); };
    document.getElementById('mqty-plus').onclick = () => { modalQty++; document.getElementById('mqty-num').textContent = modalQty; syncCartBtnLabel(); };
  };
  renderModalQty();

  const syncCartBtnLabel = () => {
    const idx = cart.findIndex(x => x.t === game.t);
    if (idx !== -1) {
      cartBtn.textContent = `✅ Actualizar (${modalQty})`;
      cartBtn.className = 'gs-btn-cart added';
    } else {
      cartBtn.textContent = `🛒 Agregar (${modalQty})`;
      cartBtn.className = 'gs-btn-cart';
    }
  };

  if (game.sizes && game.sizes.length > 0) {
    sizeWrap.style.display = 'block';
    // Si ya está en carrito, usar su tamaño; si no, default mediana
    if (existingItem && existingItem.size) {
      selectedSize = game.sizes.find(s => s.label === existingItem.size) || game.sizes[Math.min(1, game.sizes.length - 1)];
    } else {
      selectedSize = game.sizes[Math.min(1, game.sizes.length - 1)];
    }

    game.sizes.forEach((sz) => {
      const b = document.createElement('button');
      b.className = 'size-btn' + (sz === selectedSize ? ' on' : '');
      b.textContent = `${sz.label} ${sz.cm}cm · $${sz.price.toFixed(2)}`;
      b.onclick = () => {
        selectedSize = sz;
        sizeBtns.querySelectorAll('.size-btn').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        document.getElementById('gsPrice').textContent = `$${sz.price.toFixed(2)}`;
        // Si ya está en carrito, actualizar tamaño y precio en tiempo real
        const idx = cart.findIndex(x => x.t === game.t);
        if (idx !== -1) {
          cart[idx].size = sz.label;
          cart[idx].unitPrice = sz.price;
          cart[idx].price = '$' + sz.price.toFixed(2);
          updateCartBtn();
          _syncCartBtns();
        }
        syncCartBtnLabel();
      };
      sizeBtns.appendChild(b);
    });

    document.getElementById('gsPrice').textContent = `$${selectedSize.price.toFixed(2)}`;
  } else {
    sizeWrap.style.display = 'none';
    document.getElementById('gsPrice').textContent = game.price ? `$${game.price.toFixed(2)}` : '';
  }

  // Botón carrito
  syncCartBtnLabel();
  cartBtn.onclick = () => {
    const idx = cart.findIndex(x => x.t === game.t);
    if (idx === -1) {
      const unitPrice = selectedSize ? selectedSize.price : (game.price || 0);
      const size = selectedSize ? selectedSize.label : '';
      cart.push({ t: game.t, type: 'pizza', unitPrice, price: '$' + unitPrice.toFixed(2), size, qty: modalQty });
    } else {
      // Actualizar tamaño, precio y cantidad
      const unitPrice = selectedSize ? selectedSize.price : (cart[idx].unitPrice || 0);
      cart[idx].unitPrice = unitPrice;
      cart[idx].price = '$' + unitPrice.toFixed(2);
      if (selectedSize) cart[idx].size = selectedSize.label;
      cart[idx].qty = modalQty;
    }
    updateCartBtn();
    _syncCartBtns();
    syncCartBtnLabel();
  };

  document.getElementById('gsShareBtn').onclick = () => compartir(game, { stopPropagation: () => {} });
  overlay.classList.add('on');
  sheet.classList.add('on');
  document.body.style.overflow = 'hidden';
}

// ── FILTROS / SORT ────────────────────────────────────────────
function setSort(v) {
  aSort = v;
  ['az', 'rating', 'genre'].forEach(x => {
    document.getElementById('sbtn-' + x).classList.toggle('on', x === v);
  });
  render();
}

function stars(n) {
  const f = Math.floor(n), h = n % 1 >= .5;
  return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(5 - f - (h ? 1 : 0));
}

function filtered() {
  const q = document.getElementById('si').value.toLowerCase().trim();
  let list = [...G];

  if (aG === '__new__') list = G.slice(-6).reverse();
  else if (aG !== 'Todos') list = list.filter(x => x.g === aG);

  if (q) {
    const words = q.split(' ').filter(w => w.length > 0);
    list = list.filter(x => words.every(w =>
      x.t.toLowerCase().includes(w) ||
      x.g.toLowerCase().includes(w) ||
      (x.d && x.d.toLowerCase().includes(w))
    ));
  }

  if (aSort === 'az') list.sort((a, b) => a.t.localeCompare(b.t));
  else if (aSort === 'rating') list.sort((a, b) => b.r - a.r);
  else if (aSort === 'genre') list.sort((a, b) => a.g.localeCompare(b.g) || a.t.localeCompare(b.t));

  return list;
}

// ── GLOW POR RATING ───────────────────────────────────────────
function getCardGlowByRating(r) {
  const rating = Number(r) || 0;
  if (rating >= 4.8) return { border: 'rgba(0,255,159,.38)', glow: 'rgba(0,255,159,.28)' };
  if (rating >= 4.5) return { border: 'rgba(232,160,32,.34)', glow: 'rgba(232,160,32,.24)' };
  if (rating >= 4.2) return { border: 'rgba(214,40,40,.32)', glow: 'rgba(214,40,40,.22)' };
  if (rating >= 4.0) return { border: 'rgba(192,132,252,.30)', glow: 'rgba(192,132,252,.20)' };
  return { border: 'rgba(255,255,255,.06)', glow: 'transparent' };
}

// ── RENDER (carousel o grid según contexto) ───────────────────
function render() {
  const q = document.getElementById('si').value.trim();
  const isDefault = (aG === 'Todos' && q === '');
  const grid = document.getElementById('grid');
  const carouselView = document.getElementById('carousel-view');
  const filterTbar = document.getElementById('filter-tbar');

  if (isDefault) {
    grid.style.display = 'none';
    carouselView.style.display = '';
    if (filterTbar) filterTbar.style.display = 'none';
    renderCarousels();
    return;
  }

  // Grid view for filtered/search
  carouselView.style.display = 'none';
  grid.style.display = '';
  if (filterTbar) filterTbar.style.display = '';

  const list = filtered();
  const cntEl = document.getElementById('juegos-cnt');
  if (cntEl) cntEl.textContent = list.length < G.length
    ? list.length + ' de ' + G.length + ' pizzas'
    : G.length + ' pizzas';

  grid.innerHTML = '';

  if (!list.length) {
    const q = document.getElementById('si').value.trim();
    grid.innerHTML = `<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2" style="margin-bottom:12px">
        <path d="M12 2L3 21h18L12 2z"/>
        <circle cx="12" cy="16" r="1.2" fill="rgba(255,255,255,0.15)" stroke="none"/>
      </svg>
      <p style="font-size:14px;font-weight:700;color:#444;margin-bottom:6px">Sin resultados</p>
      <p style="font-size:12px;color:#333">${q ? 'No encontramos "' + q + '" — probá con otro nombre' : 'No hay pizzas en esta categoría'}</p>
    </div>`;
    return;
  }

  list.forEach(game => {
    const invState = getInventoryState(game.t);
    if (invState === 'Oculta') return; // no mostrar

    const card = document.createElement('div');
    card.className = 'card' + (invState === 'Agotada' ? ' card-agotada' : '');
    const glowCfg = getCardGlowByRating(game.r);
    card.style.setProperty('--gcol-border', glowCfg.border);
    card.style.setProperty('--gcol-glow-soft', glowCfg.glow);

    const priceDisplay = game.price ? 'Desde $' + game.price.toFixed(2) : '';
    const inCart = cart.some(x => x.t === game.t);
    const agotadaTag = invState === 'Agotada' ? `<div class="agotada-tag">Agotada hoy</div>` : '';
    const gameJson = JSON.stringify(game).replace(/"/g, '&quot;');

    card.innerHTML = `
      <div class="cimg" style="background:${game.col}">
        ${game.badge ? `<div class="ribbon-wrap"><div class="ribbon ribbon-${game.badge.toLowerCase()}">${game.badge}</div></div>` : ''}
        ${game.r >= 4.8 ? `<div class="fire-badge">🔥</div>` : ''}
        ${agotadaTag}
        ${game.c ? `<img src="${game.c}" alt="${game.t}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>` : ''}
        <div class="fall" style="${!game.c ? 'display:flex;' : ''}background:${game.col}">
          <img src="logo.png" alt="" onerror="this.outerHTML='<span style=font-size:38px>🍕</span>'"/>
          <p>${game.t}</p>
        </div>
        <div class="bg ${game.badge ? 'con-ribbon' : ''}">${game.g}</div>
        <div class="bp">${priceDisplay}</div>
        <div class="ov">
          <div class="ovt">${game.t}</div>
          <div class="ovd">⭐ ${game.r}/5 · ${game.g}</div>
          <div class="ovs">${stars(game.r)}</div>
          <div style="font-size:10px;color:#ccc;margin-top:4px;line-height:1.5">${game.d || ''}</div>
        </div>
        ${invState !== 'Agotada' ? `<button class="card-cart-btn${inCart?' in-cart':''}" data-t="${game.t.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();quickAddToCart(${gameJson},this)">${inCart?'✓':'🛒'}</button>` : ''}
      </div>
      <div class="cfoot">
        <div class="ctit">${game.t}</div>
        ${game.s ? `<div class="csize">${game.s}</div>` : ''}
        <div class="ccard-meta">
          <span class="ccard-rating">⭐ ${game.r}</span>
        </div>
      </div>`;

    if (invState !== 'Agotada') {
      card.style.cursor = 'pointer';
      card.onclick = (e) => { if (!e.target.closest('.card-cart-btn')) openGameSheet(game); };
    }
    grid.appendChild(card);
  });
}

// ── HERO PRINCIPAL ────────────────────────────────────────────
function initHero() {
  const hero = document.getElementById('hero-section');
  if (!hero || typeof G === 'undefined') return;

  const slides = G.filter(g => g.r >= 4.7).sort((a, b) => b.r - a.r).slice(0, 6);
  if (!slides.length) { hero.style.display = 'none'; return; }

  let cur = 0, paused = false, autoTimer = null;

  const track = document.createElement('div');
  track.className = 'hero-track';

  slides.forEach((g, i) => {
    const sl = document.createElement('div');
    sl.className = 'hero-slide' + (i === 0 ? ' active' : '');
    sl.style.cssText = `position:absolute;inset:0;opacity:${i===0?1:0};transition:opacity .65s ease;pointer-events:${i===0?'all':'none'}`;
    sl.innerHTML = g.c
      ? `<img src="${g.c}" alt="${g.t}" loading="${i===0?'eager':'lazy'}" onerror="this.style.display='none'">`
      : `<div class="hero-slide-fallback" style="background:${g.col}">🍕</div>`;
    sl.innerHTML += `<div class="hero-overlay"></div>`;
    sl.innerHTML += `
      <div class="hero-content">
        <div class="hero-eyebrow">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l2.47 7.6H22l-6.47 4.7 2.47 7.6L12 17.2l-6 4.7 2.47-7.6L2 9.24l7.53-.64z"/></svg>
          ${g.g} · ${g.r}/5
        </div>
        <div class="hero-title">${g.t}</div>
        <div class="hero-sub">${g.d ? g.d.slice(0,72)+'…' : (g.s || '')}</div>
        <div class="hero-actions">
          <button class="hero-btn" onclick="event.stopPropagation();openGameSheet(window.__heroSlides[${i}])">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.56L23 6H6"/></svg>
            Ordenar ahora
          </button>
        </div>
      </div>`;
    sl.onclick = () => openGameSheet(slides[cur]);
    track.appendChild(sl);
  });

  hero.appendChild(track);
  window.__heroSlides = slides;

  // Dots — single container appended directly to hero
  const dotsWrap = document.createElement('div');
  dotsWrap.style.cssText = 'position:absolute;bottom:16px;right:20px;display:flex;gap:5px;align-items:center;z-index:10';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'hero-dot' + (i === 0 ? ' on' : '');
    dotsWrap.appendChild(d);
  });
  hero.appendChild(dotsWrap);

  function goTo(n) {
    const sEls = track.children;
    sEls[cur].style.opacity = '0';
    sEls[cur].style.pointerEvents = 'none';
    sEls[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    sEls[cur].style.opacity = '1';
    sEls[cur].style.pointerEvents = 'all';
    sEls[cur].classList.add('active');
    hero.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('on', i === cur));
  }

  function startAuto() {
    autoTimer = setInterval(() => { if (!paused) goTo(cur + 1); }, 5000);
  }
  startAuto();

  // Touch swipe
  let tsx = 0;
  hero.addEventListener('touchstart', e => { tsx = e.touches[0].clientX; paused = true; }, { passive: true });
  hero.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tsx;
    if (Math.abs(dx) > 45) goTo(cur + (dx < 0 ? 1 : -1));
    setTimeout(() => { paused = false; }, 3000);
  }, { passive: true });

  // Stop auto on btn tap, resume after
  hero.querySelectorAll('.hero-btn').forEach(b => {
    b.addEventListener('click', e => { e.stopPropagation(); paused = true; setTimeout(() => { paused = false; }, 4000); });
  });
}

// ── RENDER CAROUSELES POR CATEGORÍA ──────────────────────────
function renderCarousels() {
  const container = document.getElementById('carousel-view');
  container.innerHTML = '';

  const CAT_ORDER = ['Promos', 'Especiales', 'Clásicas', 'Carnes', 'Mariscos', 'Vegetarianas'];
  const grouped = {};
  G.forEach(g => { if (!grouped[g.g]) grouped[g.g] = []; grouped[g.g].push(g); });

  const orderedCats = [...CAT_ORDER.filter(c => grouped[c]), ...Object.keys(grouped).filter(c => !CAT_ORDER.includes(c))];

  orderedCats.forEach(cat => {
    const items = grouped[cat];
    if (!items || !items.length) return;

    const row = document.createElement('div');
    row.className = 'cat-row';

    // Header
    row.innerHTML = `
      <div class="cat-row-header">
        <div class="cat-row-title">
          <div class="cat-row-title-dot"></div>
          ${cat}
        </div>
        <div class="cat-row-link" onclick="filterByCat('${cat}')">
          Ver todas
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>`;

    const scroll = document.createElement('div');
    scroll.className = 'cat-scroll';

    // Sort: highest rated first
    const sorted = [...items].sort((a, b) => b.r - a.r);

    sorted.forEach((g, idx) => {
      const invState = getInventoryState(g.t);
      if (invState === 'Oculta') return; // no mostrar

      const isFeat = idx < 2;
      const glow = getCardGlowByRating(g.r);
      const priceLabel = g.price ? `$${g.price.toFixed(2)}` : '';
      const inCart = cart.some(x => x.t === g.t);

      const card = document.createElement('div');
      card.className = `cc ${isFeat ? 'feat' : 'std'}${invState === 'Agotada' ? ' card-agotada' : ''}`;
      card.style.setProperty('--cc-border', glow.border);
      card.style.setProperty('--cc-glow', glow.glow);
      card.style.animationDelay = `${idx * 40}ms`;

      const ribbonBadge = g.badge ? `<div class="cc-ribbon-wrap"><div class="cc-ribbon ${g.badge.toLowerCase()}">${g.badge}</div></div>` : '';
      const fireBadge = g.r >= 4.8 ? `<div class="fire-badge">🔥</div>` : '';
      const agotadaTag = invState === 'Agotada' ? `<div class="agotada-tag">Agotada hoy</div>` : '';
      const imgHtml = g.c
        ? `<img src="${g.c}" alt="${g.t}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="cc-img-fall" style="background:${g.col}">🍕</div>`;

      const gJson = JSON.stringify(g).replace(/"/g,'&quot;');
      card.innerHTML = `
        <div class="cc-img" style="background:${g.col}">
          ${ribbonBadge}
          ${fireBadge}
          ${agotadaTag}
          ${imgHtml}
          ${priceLabel ? `<div class="cc-price-badge">${priceLabel}</div>` : ''}
          <div class="cc-cat-badge">${g.g}</div>
          ${invState !== 'Agotada' ? `<button class="cc-cart-btn${inCart?' in-cart':''}" data-t="${g.t.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();quickAddToCart(${gJson},this)">${inCart?'✓':'🛒'}</button>` : ''}
        </div>
        <div class="cc-body">
          <div class="cc-name">${g.t}</div>
          <div class="cc-sizes">${g.s || ''}</div>
          <div style="font-size:9px;color:#FFD700;font-weight:700;margin-top:3px">⭐ ${g.r}</div>
        </div>`;

      if (invState !== 'Agotada') {
        card.style.cursor = 'pointer';
        card.onclick = (e) => { if (!e.target.closest('.cc-cart-btn')) openGameSheet(g); };
      }
      scroll.appendChild(card);
    });

    // Drag-to-scroll (mouse)
    let isDragging = false, startScrollX = 0, startX = 0;
    scroll.addEventListener('mousedown', e => {
      isDragging = true; startX = e.pageX; startScrollX = scroll.scrollLeft;
      scroll.classList.add('is-dragging');
    });
    scroll.addEventListener('mousemove', e => {
      if (!isDragging) return;
      scroll.scrollLeft = startScrollX - (e.pageX - startX);
    });
    scroll.addEventListener('mouseup', () => { isDragging = false; scroll.classList.remove('is-dragging'); });
    scroll.addEventListener('mouseleave', () => { isDragging = false; scroll.classList.remove('is-dragging'); });

    row.appendChild(scroll);
    container.appendChild(row);
  });
}

// ── FAB DRAGGABLE ─────────────────────────────────────────────
(function () {
  const fab = document.getElementById('cart-fab');
  let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0, moved = false, activePointerId = null, suppressClick = false;

  function finishDrag() {
    if (!dragging) return;
    dragging = false;
    if (!moved) return;
    const r = fab.getBoundingClientRect();
    const sw = window.innerWidth, sh = window.innerHeight;
    const snapLeft = r.left + r.width / 2 < sw / 2;
    const nextLeft = snapLeft ? 12 : sw - r.width - 12;
    const nextTop = Math.min(Math.max(r.top, 12), sh - r.height - 12);
    fab.style.transition = 'left .25s ease, top .25s ease';
    fab.style.left = nextLeft + 'px';
    fab.style.top = nextTop + 'px';
    suppressClick = true;
    setTimeout(() => { suppressClick = false; }, 250);
  }

  fab.addEventListener('pointerdown', e => {
    activePointerId = e.pointerId; dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY;
    const r = fab.getBoundingClientRect();
    origX = r.left; origY = r.top;
    fab.style.transition = 'none'; fab.style.right = 'auto'; fab.style.bottom = 'auto';
    fab.style.left = origX + 'px'; fab.style.top = origY + 'px';
    if (fab.setPointerCapture) fab.setPointerCapture(e.pointerId);
  });
  fab.addEventListener('pointermove', e => {
    if (!dragging || e.pointerId !== activePointerId) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (Math.abs(dx) > 12 || Math.abs(dy) > 12) moved = true;
    if (moved) {
      fab.style.left = Math.min(Math.max(origX + dx, 12), window.innerWidth - fab.offsetWidth - 12) + 'px';
      fab.style.top = Math.min(Math.max(origY + dy, 12), window.innerHeight - fab.offsetHeight - 12) + 'px';
    }
  });
  fab.addEventListener('pointerup', e => { if (e.pointerId !== activePointerId) return; finishDrag(); activePointerId = null; });
  fab.addEventListener('pointercancel', e => { if (e.pointerId !== activePointerId) return; finishDrag(); activePointerId = null; });
  fab.addEventListener('click', e => { if (suppressClick) { e.preventDefault(); e.stopPropagation(); } }, true);
})();

// ── INVENTARIO DINÁMICO (Google Sheets) ───────────────────────
async function loadInventory() {
  if (!SCRIPT_URL) return;
  try {
    const res = await fetch(SCRIPT_URL + '?action=inventory', { method: 'GET' });
    const data = await res.json();
    if (!data || !Array.isArray(data)) return;
    data.forEach(row => {
      if (row.nombre && row.estado) {
        inventoryMap[row.nombre.toLowerCase().trim()] = row.estado;
      }
    });
    render();
  } catch (e) {
    console.warn('Inventario no disponible:', e);
  }
}

function getInventoryState(nombre) {
  return inventoryMap[nombre.toLowerCase().trim()] || 'Disponible';
}

          }
        });

  });
}
